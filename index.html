<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설국 인트라넷</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; color: #e2e8f0; }
        .font-black { font-weight: 900; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module" data-type="babel">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, doc, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp } from "firebase/firestore";
        
        // Lucide 아이콘은 전역 변수로 사용하거나 아래와 같이 처리 가능합니다.
        // 편의를 위해 아이콘은 이모지로 대체하거나 기본 텍스트로 처리하겠습니다.

        const firebaseConfig = {
            apiKey: "AIzaSyBAWsHBAAFXzf5dCETcE6b8rvA2vmkJB08",
            authDomain: "seolguk-net.firebaseapp.com",
            projectId: "seolguk-net",
            storageBucket: "seolguk-net.firebasestorage.app",
            messagingSenderId: "108374145265",
            appId: "1:108374145265:web:3541eeddd6bc90ac289150"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "seolguk-v1";

        const { useState, useEffect, useMemo } = React;

        // --- 여기에 이전 대화에서 드린 App 컴포넌트 로직이 들어갑니다 ---
        // (지면상 핵심 로그인/장부 로직만 포함하여 수정함)

        function App() {
            const [user, setUser] = useState(null);
            const [records, setRecords] = useState([]);
            const [authMode, setAuthMode] = useState('login');
            const [allUsers, setAllUsers] = useState([]);

            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onSnapshot(collection(db, 'seolguk', appId, 'users'), (snap) => {
                    setAllUsers(snap.docs.map(d => ({ uid: d.id, ...d.data() })));
                });
                const unsubRec = onSnapshot(collection(db, 'seolguk', appId, 'records'), (snap) => {
                    const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setRecords(list.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });
                return () => { unsub(); unsubRec(); };
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const found = allUsers.find(u => u.sn === fd.get('sn') && u.password === fd.get('password'));
                if (found) {
                    if (!found.approved) return alert('승인 대기 중');
                    setUser(found);
                } else alert('정보 오류');
            };

            const handleSignup = async (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                await setDoc(doc(db, 'seolguk', appId, 'users', `user_${fd.get('sn')}`), {
                    sn: fd.get('sn'), nickname: fd.get('nickname'), password: fd.get('password'),
                    role: '사원', approved: false, createdAt: serverTimestamp()
                });
                alert('가입 신청 완료!');
                setAuthMode('login');
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-[#0f172a] p-8 rounded-3xl w-full max-w-md shadow-2xl text-center border border-slate-800">
                            <h1 className="text-3xl font-black mb-8 italic">❄️ 설국 인트라넷</h1>
                            <div className="flex justify-center gap-4 mb-6 border-b border-slate-800 pb-2">
                                <button onClick={() => setAuthMode('login')} className={authMode === 'login' ? "text-blue-500" : "text-slate-500"}>로그인</button>
                                <button onClick={() => setAuthMode('signup')} className={authMode === 'signup' ? "text-blue-500" : "text-slate-500"}>가입신청</button>
                            </div>
                            <form onSubmit={authMode === 'login' ? handleLogin : handleSignup} className="space-y-4">
                                <input name="sn" placeholder="고유번호" className="w-full p-4 rounded-xl bg-[#020617] border border-slate-800 text-center font-bold" required />
                                {authMode === 'signup' && <input name="nickname" placeholder="닉네임" className="w-full p-4 rounded-xl bg-[#020617] border border-slate-800 text-center font-bold" required />}
                                <input name="password" type="password" placeholder="비밀번호" className="w-full p-4 rounded-xl bg-[#020617] border border-slate-800 text-center font-bold" required />
                                <button className="w-full bg-blue-600 p-4 rounded-xl font-black text-xl">입장</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-8 max-w-4xl mx-auto">
                    <header className="flex justify-between items-center mb-8 bg-slate-900 p-6 rounded-2xl border border-slate-800">
                        <div>
                            <h1 className="text-2xl font-black">설국 인트라넷</h1>
                            <p className="text-blue-500 text-sm">{user.nickname} ({user.sn})님 환영합니다</p>
                        </div>
                        <button onClick={() => setUser(null)} className="text-xs bg-slate-800 px-3 py-1 rounded">로그아웃</button>
                    </header>
                    <div className="grid gap-6">
                        <div className="bg-[#0f172a] p-6 rounded-2xl border border-slate-800">
                            <h2 className="text-xl font-black mb-4">최근 판매 내역</h2>
                            {records.map(r => (
                                <div key={r.id} className="border-b border-slate-800 py-3 flex justify-between">
                                    <span>{r.buyerNickname} ({r.buyerSn})</span>
                                    <span className="text-blue-400 font-bold">{r.totalAmount.toLocaleString()}원</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
