                                <div className="bg-blue-900/15 border border-blue-700/30 rounded-2xl p-5 space-y-3">
                                    <h4 className="text-lg font-heavy text-blue-400 flex items-center gap-2"><Icon name="list-ordered" size={20}/> 장부 작성 순서</h4>
                                    {((config.guideContent?.steps) || [
                                        '전체 장부 > 오늘의 판매건에서 구매자 고번 또는 닉네임으로 중복 구매 여부를 먼저 확인합니다.',
                                        '구매자 닉네임과 고유번호를 입력합니다.',
                                        '판매한 품목의 수량을 각 칸에 입력합니다.',
                                        '특이사항이 있을 경우 비고란에 기재합니다.',
                                        '우측에서 공계 입금액(50%)을 확인합니다.',
                                        '금액 복사 버튼으로 입금액을, 사유 복사 버튼으로 입금 사유를 복사합니다.',
                                        '공동계좌에 입금 후 장부 제출하기를 눌러 등록합니다.',
                                    ]).map((text, i) => (
                                        <div key={i} className={`flex items-start gap-3 ${i===0 ? 'bg-blue-900/20 border border-blue-700/30 rounded-xl p-3 -mx-1' : ''}`}>
                                            <span className="text-blue-400 font-heavy text-base flex-shrink-0">{'①②③④⑤⑥⑦⑧⑨'[i]}</span>
                                            <p className={`text-base leading-relaxed ${i===0 ? 'text-blue-200 font-heavy' : 'text-slate-200'}`}>{text}</p>
                                        </div>
                                    ))}
                                </div>

                                {/* 장부 수정 방법 */}
                                <div className="bg-indigo-900/15 border border-indigo-700/30 rounded-2xl p-5 space-y-3">
                                    <h4 className="text-lg font-heavy text-indigo-400 flex items-center gap-2"><Icon name="edit-2" size={20}/> 장부 수정 방법</h4>
                                    {[
                                        '대시보드 하단 "이번 주 나의 판매 내역"에서 수정할 건의 ✏️ 버튼을 클릭합니다.',
                                        '수정이 필요한 수량을 변경하고 수정 사유를 필수로 입력합니다.',
                                        '재제출하면 해당 건은 자동으로 감사대기 상태로 돌아가 재감사가 진행됩니다.',
                                    ].map((text, i) => (
                                        <div key={i} className="flex items-start gap-3">
                                            <span className="text-indigo-400 font-heavy text-base flex-shrink-0">{'①②③'[i]}</span>
                                            <p className="text-slate-200 text-base leading-relaxed">{text}</p>
                                        </div>
                                    ))}
                                    <div className="bg-slate-900 rounded-xl p-3 border border-yellow-700/30 mt-1">
                                        <p className="text-sm text-yellow-400 font-heavy">⚠️ 감사 완료된 건(🟢)은 수정 불가 — 감사대기·보류 건만 수정 가능합니다.</p>
                                    </div>
                                </div>

                                <button onClick={()=>setShowGuide(false)} className="btn btn-blue w-full py-4 text-lg font-heavy shadow-lg">확인했습니다</button>
                            </div>
                        </Modal>
                    )}

                    {editing && (
                        <Modal title="장부 수정" onClose={()=>setEditing(null)}>
                            <form onSubmit={handleEditSave} className="space-y-5 font-bold">
                                {/* 구매자 정보 수정 */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1.5">
                                        <label className="text-xs text-slate-500 uppercase font-heavy block">구매자 닉네임</label>
                                        <input type="text" className="input-base font-bold" value={editing.buyerNickname||''}
                                            onChange={e=>setEditing({...editing, buyerNickname: e.target.value})} placeholder="닉네임"/>
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-xs text-slate-500 uppercase font-heavy block">구매자 고유번호</label>
                                        <input type="text" className="input-base font-bold" value={editing.buyerSn||''}
                                            onChange={e=>setEditing({...editing, buyerSn: e.target.value.replace(/[^0-9]/g,'')})} placeholder="0000"/>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 font-bold">
                                    {itemKeys.map(k => (
                                        <div key={k} className="space-y-1">
                                            <label className="text-[10px] text-slate-500 font-bold uppercase">{items[k].emoji} {items[k].label}</label>
                                            <input type="number" className="input-base font-heavy text-lg py-3" value={editing[k]||0} onChange={e=>setEditing({...editing, [k]: parseInt(e.target.value)||0})} />
                                        </div>
                                    ))}
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs text-slate-400 uppercase font-heavy block">비고 (특이사항)</label>
                                    <input type="text" className="input-base font-bold" value={editing.note||''} onChange={e=>setEditing({...editing, note: e.target.value})}
                                        placeholder={config.notePlaceholder || "특이사항 기재"} />
                                </div>
                                <div className="p-5 bg-red-950/20 rounded-2xl border border-red-900/30 font-bold space-y-3">
                                    <div className="flex items-start gap-2 bg-red-900/20 border border-red-700/30 rounded-xl px-3 py-2.5">
                                        <Icon name="alert-triangle" size={14} className="text-red-400 flex-shrink-0 mt-0.5"/>
                                        <p className="text-xs text-red-300 font-heavy leading-relaxed">보류건은 반드시 처리 내용이나 수정 사유를 작성해야 재감사를 받을 수 있습니다.</p>
                                    </div>
                                    <label className="text-xs text-red-500 uppercase font-heavy block">수정 사유 (필수)</label>
                                    <textarea className="input-base h-28 font-bold" value={reason} onChange={e=>setReason(e.target.value)} required
                                        placeholder="예) 수량 오기입으로 수정 / 구매자 확인 후 재작성 / 보류 사유 확인 후 처리 완료 등" />
                                </div>
                                <button type="submit" className="btn btn-blue w-full py-5 text-xl font-heavy shadow-xl">재제출</button>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        }

        // --- Ledger View ---
        function LedgerView({ records, range, offset, setOffset, allRecords, allUsers, config }) {
            const items = getEffectiveItems(config);
            const itemKeys = Object.keys(items);

            const [searchDraft, setSearchDraft] = useState('');
            const [searchQuery, setSearchQuery] = useState('');
            const [ledgerTab, setLedgerTab] = useState('all'); // all / employee / event

            const handleSearch = (e) => {
                if (e.key === 'Enter') setSearchQuery(searchDraft.trim());
            };

            // 검색어를 , 또는 공백으로 분리
            const searchTerms = useMemo(() => {
                if (!searchQuery.trim()) return [];
                return searchQuery.split(/[,\s]+/).map(s => s.trim()).filter(Boolean);
            }, [searchQuery]);

            // 오늘 범위
            const todayStart = useMemo(() => { const d = new Date(); d.setHours(0,0,0,0); return d; }, []);
            const todayEnd   = useMemo(() => { const d = new Date(todayStart); d.setDate(d.getDate()+1); return d; }, [todayStart]);

            // 이벤트용 uid 목록
            const eventUids = useMemo(() => new Set(allUsers.filter(u => u.role === ROLES.EVENT).map(u => u.uid)), [allUsers]);

            // 오늘 전체 판매건
            const todayAll = useMemo(() => allRecords.filter(r => { const d = new Date(r.timestamp); return d >= todayStart && d < todayEnd; }), [allRecords, todayStart, todayEnd]);

            // 탭 필터 함수
            const applyTabFilter = (arr) => {
                if (ledgerTab === 'employee') return arr.filter(r => !eventUids.has(r.sellerUid));
                if (ledgerTab === 'event')    return arr.filter(r =>  eventUids.has(r.sellerUid));
                return arr;
            };

            const todayFiltered = useMemo(() => applyTabFilter(todayAll), [todayAll, ledgerTab, eventUids]);

            // 검색 결과 — 다중 검색어 지원
            const searchResult = useMemo(() => {
                if (!searchTerms.length) return [];
                return todayAll.filter(r =>
                    searchTerms.some(q =>
                        /^[0-9]+$/.test(q)
                            ? (r.buyerSn === q || r.sellerSn === q)
                            : (r.buyerNickname?.includes(q) || r.sellerNickname?.includes(q))
                    )
                );
            }, [todayAll, searchTerms]);

            // 구매자별 품목 합계 (중복구매 확인용) — 다중 검색어
            const buyerSummary = useMemo(() => {
                if (!searchTerms.length) return {};
                const matched = todayAll.filter(r =>
                    searchTerms.some(q => /^[0-9]+$/.test(q) ? r.buyerSn === q : r.buyerNickname?.includes(q))
                );
                const summary = {};
                matched.forEach(r => {
                    const key = r.buyerSn || r.buyerNickname;
                    if (!summary[key]) summary[key] = { nickname: r.buyerNickname, sn: r.buyerSn, items: {} };
                    itemKeys.forEach(k => { summary[key].items[k] = (summary[key].items[k] || 0) + (parseInt(r[k]) || 0); });
                });
                return summary;
            }, [searchTerms, todayAll, itemKeys]);

            // 주간 필터 (탭 적용)
            const filtered = useMemo(() => {
                const base = allRecords.filter(r => { const d = new Date(r.timestamp); return d >= range.start && d <= range.end; });
                return applyTabFilter(base);
            }, [allRecords, range, ledgerTab, eventUids]);

            // 통계
            const todayTotal   = useMemo(() => todayAll.reduce((s,r)=>s+(r.totalAmount||0),0), [todayAll]);
            const weekTotal    = useMemo(() => allRecords.filter(r=>{ const d=new Date(r.timestamp); return d>=range.start&&d<=range.end; }).reduce((s,r)=>s+(r.totalAmount||0),0), [allRecords,range]);
            const monthTotal   = useMemo(() => { const ms=new Date(new Date().getFullYear(),new Date().getMonth(),1); return allRecords.filter(r=>new Date(r.timestamp)>=ms).reduce((s,r)=>s+(r.totalAmount||0),0); }, [allRecords]);

            // 30일 차트
            const chartData = useMemo(() => {
                const today = new Date(); today.setHours(0,0,0,0);
                return Array.from({length:30},(_,i)=>{
                    const d = new Date(today); d.setDate(today.getDate()-(29-i));
                    const next = new Date(d); next.setDate(d.getDate()+1);
                    const amount = allRecords.filter(r=>{ const rd=new Date(r.timestamp); return rd>=d&&rd<next; }).reduce((s,r)=>s+(r.totalAmount||0),0);
                    const mm=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
                    return { label:`${mm}/${dd}`, fullLabel:`${String(d.getFullYear()).slice(2)}-${mm}-${dd}`, amount, eok:Math.floor(amount/100000000), isToday:i===29 };
                });
            }, [allRecords, eventUids]);
            const maxEok = Math.max(...chartData.map(d=>d.eok),1);
            const avg30Eok = (()=>{ const h=chartData.filter(d=>d.eok>0&&!d.isToday); return h.length>0?h.reduce((s,d)=>s+d.eok,0)/h.length:0; })();

            // 탭 버튼 공통
            const TabBtn = ({k, label}) => (
                <button onClick={()=>setLedgerTab(k)}
                    className={`px-4 py-2 rounded-lg text-xs font-heavy transition-all ${ledgerTab===k ? 'bg-blue-600 text-white' : 'text-slate-500 hover:text-slate-300'}`}>
                    {label}
                </button>
            );

            return (
                <div className="space-y-5 font-bold">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                        <h2 className="text-2xl text-white flex items-center gap-3 font-heavy"><Icon name="layers" className="text-blue-500" size={24}/> 전체 장부 현황</h2>
                        {/* 탭 */}
                        <div className="flex items-center gap-1 bg-slate-900 p-1 rounded-xl border border-slate-800">
                            <TabBtn k="all" label="전체"/>
                            <TabBtn k="employee" label="사원"/>
                            <TabBtn k="event" label="이벤트"/>
                        </div>
                    </div>

                    {/* ── 2열 통계 카드 ── */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="card shadow-xl space-y-3">
                            <h3 className="text-base font-heavy flex items-center gap-2"><Icon name="book-open" className="text-green-400" size={17}/> 장부 통계</h3>
                            {[
                                { label:'오늘 매출',    value: formatKRW(todayTotal),  color:'text-green-400' },
                                { label:'이번 주 매출', value: formatKRW(weekTotal),   color:'text-white'     },
                                { label:'이번 달 매출', value: formatKRW(monthTotal),  color:'text-blue-400'  },
                            ].map((item,i) => (
                                <div key={i} className="flex justify-between items-center py-2.5 border-b border-slate-800 last:border-0">
                                    <span className="text-slate-400 font-bold text-sm">{item.label}</span>
                                    <span className={`${item.color} font-heavy text-xl`}>{item.value}</span>
                                </div>
                            ))}
                        </div>
                        <div className="card shadow-xl space-y-3">
                            <div className="flex items-center justify-between">
                                <h3 className="text-base font-heavy flex items-center gap-2"><Icon name="bar-chart-2" className="text-blue-400" size={17}/> 최근 30일 거래 추이</h3>
                                <span className="text-xs text-slate-500 font-bold">일평균 <span className="text-white font-heavy">{avg30Eok.toFixed(1)}억</span></span>
                            </div>
                            <div className="chart-wrap relative" style={{height:'160px'}}>
                                {avg30Eok > 0 && (
                                    <div className="absolute left-0 right-0 pointer-events-none" style={{top:`${(1-avg30Eok/maxEok)*100}%`, borderTop:'1px dashed rgba(239,68,68,0.5)'}}>
                                        <span className="absolute right-0 -top-3.5 text-[9px] text-red-400 font-bold bg-slate-900 px-1">avg</span>
                                    </div>
                                )}
                                <div className="flex items-end gap-[2px] h-full">
                                    {chartData.map((d,i) => (
                                        <div key={i} className="flex flex-col items-center flex-1 h-full justify-end group relative">
                                            <div className="absolute bottom-full mb-1 bg-slate-800 border border-slate-700 rounded-lg px-2 py-1 text-[9px] font-bold text-white whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity z-10 pointer-events-none text-center">
                                                {d.fullLabel}<br/><span className="text-orange-400">{d.eok>0?`${d.eok}억`:'0'}</span>
                                            </div>
                                            <div className="w-full rounded-t-[2px]" style={{height:d.eok>0?`${Math.max((d.eok/maxEok)*100,3)}%`:'2px', background:d.eok>0?(d.isToday?'#3b82f6':'#f97316'):'rgba(255,255,255,0.05)'}}/>
                                            <span className="text-[7px] font-heavy leading-none mt-0.5 truncate w-full text-center" style={{color:d.eok>0?(d.isToday?'#93c5fd':'#fb923c'):'transparent'}}>{d.eok>0?d.eok:''}</span>
                                            <span className="text-[7px] text-slate-600 leading-none mt-0.5 truncate w-full text-center font-bold">{(i%5===0||d.isToday)?d.label:''}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="flex items-center gap-4 text-[9px] text-slate-600 font-bold border-t border-slate-800 pt-2">
                                <span className="flex items-center gap-1"><span className="inline-block w-2 h-2 rounded-sm" style={{background:'#f97316'}}/>과거</span>
                                <span className="flex items-center gap-1"><span className="inline-block w-2 h-2 rounded-sm bg-blue-500"/>오늘</span>
                                <span className="flex items-center gap-1"><span className="inline-block w-6 border-t border-dashed border-red-400"/>일평균</span>
                            </div>
                        </div>
                    </div>

                    {/* ── 오늘의 판매건 ── */}
                    <div className="card p-0 overflow-hidden shadow-2xl border border-blue-900/30">
                        <div className="px-5 py-3.5 border-b border-slate-800 flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
                            <div className="flex items-center gap-2">
                                <Icon name="sun" className="text-yellow-400" size={18}/>
                                <span className="font-heavy text-white text-sm">오늘의 판매건</span>
                                <span className="text-[10px] text-slate-500 font-bold">{todayFiltered.length}건 · {formatKRW(todayFiltered.reduce((s,r)=>s+(r.totalAmount||0),0))}</span>
                            </div>
                            {/* 중복구매 검색 */}
                            <div className="flex gap-2 w-full sm:w-auto">
                                <div className="relative flex-1 sm:w-56">
                                    <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"/>
                                    <input type="text" value={searchDraft} onChange={e=>setSearchDraft(e.target.value)} onKeyDown={handleSearch}
                                        placeholder="닉네임/고번 (쉼표·공백으로 여러명)"
                                        className="input-base pl-8 py-2 text-xs w-full"/>
                                </div>
                                <button onClick={()=>setSearchQuery(searchDraft.trim())} className="px-3 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl text-xs font-heavy flex-shrink-0 flex items-center gap-1">
                                    <Icon name="search" size={13}/> 검색
                                </button>
                                {searchQuery && <button onClick={()=>{setSearchDraft('');setSearchQuery('');}} className="px-2.5 py-2 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-xl flex-shrink-0"><Icon name="x" size={13}/></button>}
                            </div>
                        </div>

                        {/* 검색 결과 — 구매자 구매 현황 */}
                        {searchTerms.length > 0 && Object.keys(buyerSummary).length > 0 && (
                            <div className="px-4 py-3 bg-blue-900/10 border-b border-blue-800/30 space-y-2">
                                <p className="text-[10px] text-blue-400 font-heavy uppercase">구매자 오늘 구매 현황</p>
                                {Object.values(buyerSummary).map((b,i) => {
                                    const itemList = itemKeys.filter(k=>(b.items[k]||0)>0);
                                    return (
                                        <div key={i} className="flex flex-wrap items-center gap-2 bg-slate-900 rounded-xl px-3 py-2.5 border border-slate-800">
                                            <span className="text-sm font-heavy text-white">{b.nickname}</span>
                                            <span className="text-[10px] text-slate-500">#{b.sn}</span>
                                            <span className="text-slate-700">|</span>
                                            {itemList.length > 0 ? itemList.map(k => {
                                                const qty = b.items[k];
                                                const max = items[k]?.max || 999;
                                                const isFull = qty >= max;
                                                return (
                                                    <span key={k} className={`text-sm font-heavy px-2 py-0.5 rounded-lg ${isFull ? 'bg-red-500/20 text-red-400 border border-red-700/30' : 'bg-green-500/10 text-green-400 border border-green-700/20'}`}>
                                                        {items[k]?.emoji}{qty}
                                                        {isFull && <span className="ml-1 text-[9px]">MAX</span>}
                                                    </span>
                                                );
                                            }) : <span className="text-slate-600 text-xs">구매 내역 없음</span>}
                                        </div>
                                    );
                                })}
                                {searchQuery.trim() && Object.keys(buyerSummary).length === 0 && (
                                    <p className="text-xs text-green-400 font-heavy">✅ 오늘 구매 이력 없음</p>
                                )}
                            </div>
                        )}
                        {searchTerms.length > 0 && Object.keys(buyerSummary).length === 0 && (
                            <div className="px-4 py-2.5 bg-green-900/10 border-b border-green-800/20">
                                <p className="text-xs text-green-400 font-heavy">✅ "{searchQuery}" — 오늘 구매 이력 없음</p>
                            </div>
                        )}

                        <div className="overflow-x-auto">
                            <table className="w-full text-left font-heavy">
                                <thead className="bg-slate-800 text-slate-400 text-[10px] uppercase tracking-wider">
                                    <tr className="border-b border-slate-700">
                                        <th className="p-3 whitespace-nowrap">시간</th>
                                        <th className="p-3 whitespace-nowrap">판매 사원</th>
                                        <th className="p-3 whitespace-nowrap">구매자</th>
                                        <th className="p-3 text-center whitespace-nowrap">품목</th>
                                        <th className="p-3 text-right whitespace-nowrap">매출</th>
                                        <th className="p-3 text-center whitespace-nowrap">상태</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800 text-white font-heavy">
                                    {todayFiltered.length === 0 ? (
                                        <tr><td colSpan="6" className="p-8 text-center text-slate-600 font-bold">오늘 판매 기록이 없습니다.</td></tr>
                                    ) : todayFiltered.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(r => {
                                        const itemSummary = itemKeys.filter(k=>parseInt(r[k])>0).map(k=>`${items[k]?.emoji||''}${r[k]}`).join(' ');
                                        const isMatch = searchTerms.length > 0 && searchTerms.some(q => /^[0-9]+$/.test(q) ? r.buyerSn === q : r.buyerNickname?.includes(q));
                                        return (
                                            <tr key={r.id} className={`hover:bg-slate-800/50 transition-colors ${isMatch ? 'bg-blue-900/20 border-l-2 border-l-blue-500' : ''}`}>
                                                <td className="p-3 text-xs text-slate-500 font-mono whitespace-nowrap">{new Date(r.timestamp).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</td>
                                                <td className="p-3 whitespace-nowrap"><div className="text-sm">{r.sellerNickname}</div><div className="text-[10px] text-slate-600">({r.sellerSn})</div></td>
                                                <td className="p-3 whitespace-nowrap"><div className="text-sm">{r.buyerNickname}</div><div className="text-[10px] text-slate-600">({r.buyerSn})</div></td>
                                                <td className="p-3 text-center text-sm whitespace-nowrap">{itemSummary || '-'}</td>
                                                <td className="p-3 text-right font-heavy text-sm whitespace-nowrap">{formatKRW(r.totalAmount)}</td>
                                                <td className="p-3 text-center whitespace-nowrap"><StatusBadge record={r}/></td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* ── 주간 장부 테이블 ── */}
                    <div className="card p-0 overflow-hidden shadow-2xl">
                        <div className="px-5 py-3 border-b border-slate-800 flex flex-col sm:flex-row gap-2 sm:items-center justify-between">
                            <span className="text-sm font-heavy text-slate-400">주간 {filtered.length}건 · 매출 {formatKRW(filtered.reduce((s,r)=>s+(r.totalAmount||0),0))}</span>
                            <div className="flex items-center gap-3 bg-slate-900 px-4 py-2 rounded-xl border border-slate-800 font-heavy w-fit">
                                <button onClick={()=>setOffset(offset-1)} className="hover:text-blue-500 transition-all"><Icon name="chevron-left" size={18}/></button>
                                <span className="text-blue-400 whitespace-nowrap text-xs font-heavy">{range.start.toLocaleDateString()} ~ {range.end.toLocaleDateString()}</span>
                                <button onClick={()=>setOffset(offset+1)} className="hover:text-blue-500 transition-all"><Icon name="chevron-right" size={18}/></button>
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left font-heavy">
                                <thead className="bg-slate-800 text-slate-400 text-[10px] uppercase tracking-wider">
                                    <tr className="border-b border-slate-700">
                                        <th className="p-4 whitespace-nowrap">날짜</th>
                                        <th className="p-4 whitespace-nowrap">판매 사원</th>
                                        <th className="p-4 whitespace-nowrap">구매자</th>
                                        <th className="p-4 text-center whitespace-nowrap">품목</th>
                                        <th className="p-4 text-right whitespace-nowrap">매출액</th>
                                        <th className="p-4 text-right whitespace-nowrap">입금액</th>
                                        <th className="p-4 text-center whitespace-nowrap">상태</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800 text-white font-heavy">
                                    {filtered.map(r => {
                                        const itemSummary = itemKeys.filter(k=>parseInt(r[k])>0).map(k=>`${items[k]?.emoji||''}${r[k]}`).join(' ');
                                        return (
                                        <tr key={r.id} className="hover:bg-slate-800/50 transition-colors">
                                            <td className="p-4 text-xs text-slate-500 font-mono whitespace-nowrap">{formatDate(r.timestamp)}</td>
                                            <td className="p-4 whitespace-nowrap"><div className="text-sm">{r.sellerNickname}</div><div className="text-[10px] text-slate-600">({r.sellerSn})</div></td>
                                            <td className="p-4 whitespace-nowrap"><div className="text-sm">{r.buyerNickname}</div><div className="text-[10px] text-slate-600">({r.buyerSn})</div></td>
                                            <td className="p-4 text-center text-sm whitespace-nowrap">{itemSummary || '-'}</td>
                                            <td className="p-4 text-right font-heavy text-sm whitespace-nowrap">{formatKRW(r.totalAmount)}</td>
                                            <td className="p-4 text-right text-blue-400 font-heavy text-sm whitespace-nowrap">{formatKRW(r.totalAmount * 0.5)}</td>
                                            <td className="p-4 text-center whitespace-nowrap"><StatusBadge record={r}/></td>
                                        </tr>
                                        );
                                    })}
                                    {filtered.length === 0 && (
                                        <tr><td colSpan="7" className="p-10 text-center text-slate-600 font-bold">기록이 없습니다.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Audit View ---
        function AuditView({ records, user, allUsers, showToast, config, sendNotification, blacklist }) {
            const [tab, setAuditTab] = useState('queue');
            const [viewItem, setViewItem] = useState(null);
            const [rsnModal, setRsnModal] = useState(null);
            const [penaltyDetailUser, setPenaltyDetailUser] = useState(null);
            const [reasonText, setReasonText] = useState("");
            const [penaltyInput, setPenaltyInput] = useState(0);
            const [editMemo, setEditMemo] = useState("");
            const [editPenalty, setEditPenalty] = useState(0);
            const [historyFilter, setHistoryFilter] = useState('all'); 
            const [historyOffset, setHistoryOffset] = useState(0);
            const [historyPage, setHistoryPage] = useState(0);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [userSalesModal, setUserSalesModal] = useState(null);
            const [salesTab, setSalesTab] = useState('all');
            const [salesDetailRecord, setSalesDetailRecord] = useState(null);
            const [manualPenaltyUser, setManualPenaltyUser] = useState(null);
            const [manualPenaltyReason, setManualPenaltyReason] = useState("");
            const [manualPenaltyPts, setManualPenaltyPts] = useState(1);

            const historyRange = useMemo(() => {
                const now = new Date();
                now.setDate(now.getDate() + (historyOffset * 7));
                const day = now.getDay();
                const diff = (day < config.weekStartDay) ? (day + 7 - config.weekStartDay) : (day - config.weekStartDay);
                const start = new Date(now);
                start.setDate(now.getDate() - diff); start.setHours(0,0,0,0);
                const end = new Date(start);
                end.setDate(start.getDate() + 6); end.setHours(23,59,59,999);
                return { start, end };
            }, [historyOffset, config.weekStartDay]);

            const pending = records.filter(r => r.status === 'pending' && !r.auditReason);
            
            const history = useMemo(() => {
                return records.filter(r => (r.status === 'completed' || r.auditReason)).filter(r => {
                    const d = new Date(r.auditedAt || r.timestamp);
                    const matchRange = d >= historyRange.start && d <= historyRange.end;
                    const matchFilter =
                        historyFilter === 'all' ||
                        (historyFilter === 'onhold'    && r.status === 'pending'   && r.auditReason) ||
                        (historyFilter === 'holdDone'  && r.status === 'completed' && r.auditReason);
                    return matchRange && matchFilter;
                });
            }, [records, historyRange, historyFilter]);

            useEffect(() => { setHistoryPage(0); }, [historyRange, historyFilter]);

            // 날짜별 그룹핑
            const historyByDate = useMemo(() => {
                const groups = {};
                history.forEach(r => {
                    const d = formatDate(r.auditedAt || r.timestamp);
                    if (!groups[d]) groups[d] = [];
                    groups[d].push(r);
                });
                // 최신 날짜 순 정렬
                return Object.entries(groups).sort((a, b) => b[0].localeCompare(a[0]));
            }, [history]);

            const historyTotalPages = historyByDate.length;
            const currentDateGroup = historyByDate[historyPage];
            const historyPaged = currentDateGroup ? currentDateGroup[1] : [];

            const warningSortedUsers = useMemo(() => {
                const result = allUsers
                    .filter(u => u.uid && u.nickname && u.role !== ROLES.EVENT && u.role !== ROLES.PENDING && u.sn !== '0000')
                    .map(u => {
                        const score = records.filter(r => r.sellerUid === u.uid).reduce((s, r) => s + (parseInt(r.penaltyPoints) || 0), 0);
                        return { ...u, warningSum: score };
                    });
                return {
                    punished: result.filter(u => u.warningSum > 0).sort((a,b) => b.warningSum - a.warningSum),
                    clean: result.filter(u => u.warningSum === 0).sort((a,b) => a.nickname.localeCompare(b.nickname, 'ko'))
                };
            }, [allUsers, records]);

            const auditorRanking = useMemo(() => {
                // 전체 처리건수
                const totalCounts = {};
                records.forEach(r => { if (r.auditorName) totalCounts[r.auditorName] = (totalCounts[r.auditorName] || 0) + 1; });
                // 이번 주 처리건수
                const weekCounts = {};
                records.filter(r => {
                    if (!r.auditorName || !r.auditedAt) return false;
                    const d = new Date(r.auditedAt);
                    return d >= historyRange.start && d <= historyRange.end;
                }).forEach(r => { weekCounts[r.auditorName] = (weekCounts[r.auditorName] || 0) + 1; });
                // 감사 권한자 전원
                const auditUsers = allUsers.filter(u => u.role === ROLES.AUDIT || u.role === ROLES.ADMIN);
                const result = auditUsers.map(u => ({
                    name: u.nickname, sn: u.sn, role: u.role,
                    weekCount: weekCounts[u.nickname] || 0,
                    totalCount: totalCounts[u.nickname] || 0,
                }));
                return result.sort((a, b) => b.weekCount - a.weekCount || b.totalCount - a.totalCount);
            }, [records, allUsers, historyRange]);

            return (
                <div className="space-y-8 animate-fade-in font-bold">
                    <div className="flex flex-wrap gap-4 border-b border-slate-800 pb-4">
                        <button onClick={()=>setAuditTab('queue')} className={`px-6 py-3 rounded-2xl transition-all font-bold ${tab === 'queue' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>감사 대기열 ({pending.length})</button>
                        <button onClick={()=>setAuditTab('history')} className={`px-6 py-3 rounded-2xl transition-all font-bold ${tab === 'history' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>처리 기록</button>
                        <button onClick={()=>setAuditTab('warning')} className={`px-6 py-3 rounded-2xl transition-all font-bold ${tab === 'warning' ? 'bg-red-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>경고 현황</button>
                        <button onClick={()=>setAuditTab('team')} className={`px-6 py-3 rounded-2xl transition-all font-bold ${tab === 'team' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>감사팀 랭킹</button>
                        <button onClick={()=>setAuditTab('blacklist')} className={`px-6 py-3 rounded-2xl transition-all font-bold flex items-center gap-2 ${tab === 'blacklist' ? 'bg-red-700 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>
                            🚫 블랙리스트 관리
                        </button>
                    </div>

                    {tab === 'queue' && (
                        <div className="grid grid-cols-1 gap-6">
                            {pending.map(r => {
                                const qItems = getEffectiveItems(config);
                                const qItemKeys = Object.keys(qItems);
                                const qSummary = qItemKeys.filter(k=>parseInt(r[k])>0).map(k=>(
                                    <span key={k} className="inline-flex items-center gap-1 bg-blue-600/15 border border-blue-700/30 text-blue-300 px-2.5 py-1 rounded-lg text-sm font-heavy">
                                        {qItems[k].emoji} {qItems[k].label} <span className="text-blue-400 font-black">×{r[k]}</span>
                                    </span>
                                ));

                                // 오늘 같은 구매자(buyerSn)의 다른 장부건 확인
                                const todayStart = new Date(); todayStart.setHours(0,0,0,0);
                                const todayEnd = new Date(todayStart); todayEnd.setDate(todayStart.getDate()+1);
                                const todayBuyerRecs = records.filter(rec =>
                                    rec.buyerSn === r.buyerSn &&
                                    rec.id !== r.id &&
                                    new Date(rec.timestamp) >= todayStart &&
                                    new Date(rec.timestamp) < todayEnd
                                );
                                // 품목별 오늘 누적 수량 (이 건 포함)
                                const allTodayRecs = [...todayBuyerRecs, r];
                                const accumulated = {};
                                qItemKeys.forEach(k => {
                                    accumulated[k] = allTodayRecs.reduce((s, rec) => s + (parseInt(rec[k]) || 0), 0);
                                });
                                const overMaxItems = qItemKeys.filter(k => accumulated[k] > 0 && accumulated[k] > (qItems[k].max || 9999));
                                const isDuplicate = todayBuyerRecs.length > 0;

                                return (
                                <div key={r.id} className={`card border-l-8 shadow-xl ${isDuplicate ? 'border-l-orange-500 bg-orange-950/10' : r.resubmitted ? 'border-l-green-500 bg-green-950/10' : 'border-l-blue-600'}`}>
                                    <div className="flex flex-col gap-4">
                                        {/* 재제출 배너 */}
                                        {r.resubmitted && !isDuplicate && (
                                            <div className="bg-green-900/25 border border-green-600/40 rounded-2xl px-4 py-2.5 flex items-center gap-3">
                                                <Icon name="refresh-cw" className="text-green-400 flex-shrink-0" size={16}/>
                                                <div>
                                                    <span className="text-green-300 font-heavy text-sm">보류 후 재제출된 건입니다.</span>
                                                    {r.resubmittedAt && <span className="text-green-600 text-xs ml-2">{formatFullDateTime(r.resubmittedAt)}</span>}
                                                </div>
                                            </div>
                                        )}
                                        {r.resubmitted && isDuplicate && (
                                            <div className="bg-green-900/25 border border-green-600/40 rounded-xl px-3 py-1.5 flex items-center gap-2">
                                                <Icon name="refresh-cw" className="text-green-400" size={13}/>
                                                <span className="text-green-300 font-heavy text-xs">보류 후 재제출</span>
                                            </div>
                                        )}
                                        {isDuplicate && (
                                            <div className="bg-orange-900/30 border border-orange-600/50 rounded-2xl px-4 py-3 flex items-start gap-3">
                                                <Icon name="alert-triangle" className="text-orange-400 flex-shrink-0 mt-0.5" size={18}/>
                                                <div className="flex-1">
                                                    <p className="text-orange-300 font-heavy text-sm">⚠️ 중복 구매 의심 — 오늘 이미 {todayBuyerRecs.length}건의 구매 이력이 있습니다. 확인이 필요합니다.</p>
                                                    <div className="flex flex-wrap gap-2 mt-2">
                                                        {qItemKeys.filter(k => accumulated[k] > 0).map(k => {
                                                            const isOver = accumulated[k] > (qItems[k].max || 9999);
                                                            return (
                                                                <span key={k} className={`text-xs font-heavy px-2 py-0.5 rounded-lg ${isOver ? 'bg-red-500/20 text-red-400 border border-red-600/30' : 'bg-slate-800 text-slate-400 border border-slate-700'}`}>
                                                                    {qItems[k].emoji} 누적 {accumulated[k]}{isOver ? ' ⚡MAX초과' : ''}
                                                                </span>
                                                            );
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex flex-wrap gap-3 items-center">
                                            <div className="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700">
                                                <p className="text-[10px] text-slate-500 uppercase font-heavy">판매 사원</p>
                                                <p className="text-lg font-heavy text-white">{r.sellerNickname} <span className="text-xs text-slate-400">({r.sellerSn})</span></p>
                                            </div>
                                            <div className={`px-5 py-3 rounded-xl border-2 ${isDuplicate ? 'bg-orange-900/30 border-orange-500' : 'bg-blue-900/40 border-blue-600 shadow-[0_0_15px_rgba(37,99,235,0.2)]'}`}>
                                                <p className={`text-[10px] uppercase font-black mb-1 ${isDuplicate ? 'text-orange-400' : 'text-blue-400'}`}>🔍 구매자 확인 (대조 필수)</p>
                                                <p className="text-xl font-black text-white tracking-tight">{r.buyerNickname} <span className={`text-sm font-bold ${isDuplicate ? 'text-orange-300' : 'text-blue-400'}`}>#{r.buyerSn}</span></p>
                                            </div>
                                            <div className="text-xs text-slate-400 bg-slate-950/50 px-3 py-1.5 rounded-lg border border-slate-800">
                                                <Icon name="clock" size={12} className="inline mr-1 mb-0.5"/>
                                                작성: <span className="text-white">{formatFullDateTime(r.timestamp)}</span>
                                            </div>
                                        </div>
                                        {qSummary.length > 0 && <div className="flex flex-wrap gap-2">{qSummary}</div>}
                                        {r.note && (
                                            <div className="bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 flex items-start gap-2">
                                                <Icon name="message-square" size={14} className="text-slate-500 flex-shrink-0 mt-0.5"/>
                                                <p className="text-sm text-slate-300 font-bold leading-snug">{r.note}</p>
                                            </div>
                                        )}
                                        <div className="flex gap-10 font-heavy">
                                            <div>
                                                <p className="text-[10px] text-slate-600 uppercase mb-1">매출액</p>
                                                <p className="text-2xl font-heavy">{formatKRW(r.totalAmount)}</p>
                                                <p className="text-[10px] text-slate-600 mt-0.5">({r.totalAmount.toLocaleString()}원)</p>
                                            </div>
                                            <div>
                                                <p className="text-[10px] text-blue-500 uppercase mb-1">입금액</p>
                                                <p className="text-2xl text-blue-400 font-heavy">{formatKRW(r.totalAmount * 0.5)}</p>
                                                <p className="text-[10px] text-blue-700 mt-0.5">({(r.totalAmount * 0.5).toLocaleString()}원)</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-3">
                                            <button onClick={async ()=>{ await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', r.id), { status: 'completed', auditedAt: new Date().toISOString(), auditorName: user.nickname }); showToast("감사 승인 완료"); }} className="btn btn-blue flex-1 py-4 text-lg font-heavy shadow-lg"><Icon name="check-circle" size={18}/> 감사 승인</button>
                                            <button onClick={()=>setRsnModal(r)} className="btn btn-red flex-1 py-3 text-base font-heavy"><Icon name="alert-triangle" size={18}/> 보류/경고</button>
                                        </div>
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    )}

                    {tab === 'history' && (
                        <div className="space-y-6">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-2 bg-slate-900 lm-pill-wrap p-1 rounded-xl border border-slate-800">
                                    <button onClick={()=>setHistoryFilter('all')}      className={`px-4 py-2 rounded-lg text-xs transition-all font-heavy ${historyFilter==='all'      ? 'bg-blue-600 text-white'   : 'text-slate-500 hover:text-slate-300 lm-pill-inactive'}`}>전체 내역</button>
                                    <button onClick={()=>setHistoryFilter('onhold')}   className={`px-4 py-2 rounded-lg text-xs transition-all font-heavy ${historyFilter==='onhold'   ? 'bg-yellow-600 text-white'  : 'text-slate-500 hover:text-slate-300 lm-pill-inactive'}`}>보류건</button>
                                    <button onClick={()=>setHistoryFilter('holdDone')} className={`px-4 py-2 rounded-lg text-xs transition-all font-heavy ${historyFilter==='holdDone' ? 'bg-green-600 text-white'   : 'text-slate-500 hover:text-slate-300 lm-pill-inactive'}`}>보류 후 완료건</button>
                                </div>
                                <div className="flex items-center gap-4 bg-slate-900 px-6 py-3 rounded-2xl border border-slate-800 shadow-xl font-heavy">
                                    <button onClick={()=>setHistoryOffset(historyOffset-1)} className="hover:text-blue-500 transition-all font-heavy"><Icon name="chevron-left" size={24}/></button>
                                    <span className="text-blue-400 whitespace-nowrap text-sm font-heavy">{historyRange.start.toLocaleDateString()} ~ {historyRange.end.toLocaleDateString()}</span>
                                    <button onClick={()=>setHistoryOffset(historyOffset+1)} className="hover:text-blue-500 transition-all font-heavy"><Icon name="chevron-right" size={24}/></button>
                                </div>
                            </div>
                            <div className="card p-0 overflow-hidden font-heavy shadow-2xl">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left font-heavy">
                                        <thead className="bg-slate-800 text-slate-400 text-xs uppercase tracking-wider font-heavy"><tr className="border-b border-slate-700"><th className="px-5 py-4 whitespace-nowrap">처리일</th><th className="px-5 py-4 whitespace-nowrap">판매자</th><th className="px-5 py-4 whitespace-nowrap">구매자</th><th className="px-5 py-4 whitespace-nowrap">판매 품목</th><th className="px-5 py-4 text-right whitespace-nowrap">매출액</th><th className="px-5 py-4 text-right whitespace-nowrap text-blue-400">공계 입금</th><th className="px-5 py-4 text-center whitespace-nowrap">상태</th><th className="px-5 py-4 text-center whitespace-nowrap">감사관</th><th className="px-5 py-4 text-center whitespace-nowrap">상세</th></tr></thead>
                                        <tbody className="divide-y divide-slate-800 text-white font-heavy">
                                            {(() => {
                                                const effectiveItems = getEffectiveItems(config);
                                                return historyPaged.map(r => {
                                                const itemSummary = Object.keys(effectiveItems).filter(k => parseInt(r[k]) > 0).map(k => `${effectiveItems[k].emoji}${r[k]}`).join(' ');
                                                return (
                                                <tr key={r.id} className="hover:bg-slate-800/40 transition-colors">
                                                    <td className="px-5 py-4 text-sm text-slate-400 font-mono whitespace-nowrap">{formatDate(r.auditedAt || r.timestamp)}</td>
                                                    <td className="px-5 py-4 whitespace-nowrap"><div className="text-base font-heavy">{r.sellerNickname}</div><div className="text-xs text-slate-500 mt-0.5">#{r.sellerSn}</div></td>
                                                    <td className="px-5 py-4 whitespace-nowrap"><div className="text-base font-heavy">{r.buyerNickname}</div><div className="text-xs text-blue-500 mt-0.5">#{r.buyerSn}</div></td>
                                                    <td className="px-5 py-4 whitespace-nowrap">
                                                        <span className="text-base tracking-wide">{itemSummary || <span className="text-slate-600">—</span>}</span>
                                                    </td>
                                                    <td className="px-5 py-4 text-right whitespace-nowrap">
                                                        <span className="text-base font-heavy">{formatKRW(r.totalAmount)}</span>
                                                    </td>
                                                    <td className="px-5 py-4 text-right whitespace-nowrap">
                                                        <span className="text-base font-heavy text-blue-400">{formatKRW(r.totalAmount * 0.5)}</span>
                                                    </td>
                                                    <td className="px-5 py-4 text-center whitespace-nowrap">
                                                        <StatusBadge record={r} />
                                                    </td>
                                                    <td className="px-5 py-4 text-center text-sm text-blue-400 font-heavy whitespace-nowrap">{r.auditorName || '-'}</td>
                                                    <td className="px-5 py-4 text-center whitespace-nowrap">
                                                        <button onClick={()=>{ setViewItem({...r}); setEditMemo(r.auditMemo||''); setEditPenalty(r.penaltyPoints||0); }} className="p-2.5 bg-slate-800 hover:bg-indigo-600 rounded-xl transition-all"><Icon name="zoom-in" size={18}/></button>
                                                    </td>
                                                </tr>
                                                );
                                            });
                                            })()}
                                            </tbody>
                                        </table>
                                    </div>
                            </div>
                            {historyTotalPages > 1 && (
                                <div className="flex items-center justify-between px-2">
                                    <span className="text-xs text-slate-500 font-bold">
                                        {currentDateGroup ? `${currentDateGroup[0]} (${historyPaged.length}건)` : ''}
                                        <span className="ml-2 text-slate-600">전체 {history.length}건</span>
                                    </span>
                                    <div className="flex items-center gap-2">
                                        <button onClick={()=>setHistoryPage(p=>Math.max(p-1,0))} disabled={historyPage===0}
                                            className={`px-3 py-1.5 rounded-xl text-xs font-heavy transition-all ${historyPage===0 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-700 text-slate-300'}`}>
                                            <Icon name="chevron-left" size={14} className="inline"/> 이전날
                                        </button>
                                        <span className="text-xs text-slate-400 font-heavy">{historyPage+1} / {historyTotalPages}</span>
                                        <button onClick={()=>setHistoryPage(p=>Math.min(p+1,historyTotalPages-1))} disabled={historyPage===historyTotalPages-1}
                                            className={`px-3 py-1.5 rounded-xl text-xs font-heavy transition-all ${historyPage===historyTotalPages-1 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-slate-800 hover:bg-slate-700 text-slate-300'}`}>
                                            다음날 <Icon name="chevron-right" size={14} className="inline"/>
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {tab === 'warning' && (
                        <div className="space-y-6">
                            {/* 집중 관리 사원 */}
                            <section className="card shadow-2xl border border-red-900/30">
                                <h2 className="text-lg text-red-400 font-heavy mb-4 flex items-center gap-2"><Icon name="alert-circle" size={20}/> 집중 관리 사원 <span className="text-sm text-red-600 font-bold">(경고 1점 이상)</span></h2>
                                {warningSortedUsers.punished.length === 0 ? (
                                    <p className="text-slate-600 text-sm font-bold text-center py-6">경고 보유 사원이 없습니다 ✅</p>
                                ) : (
                                <div className="space-y-3">
                                    {warningSortedUsers.punished.map(u => {
                                        const userRecs = records.filter(r => r.sellerUid === u.uid);
                                        const totalCount    = userRecs.length;
                                        const holdCount     = userRecs.filter(r => r.status === 'pending' && r.auditReason).length;
                                        const holdDoneCount = userRecs.filter(r => r.status === 'completed' && r.auditReason).length;
                                        return (
                                        <div key={u.uid} className="bg-slate-950 p-4 rounded-2xl border border-red-900/20 flex flex-wrap justify-between items-center gap-3">
                                            <div>
                                                <div className="flex items-center gap-2 mb-1.5">
                                                    <p className="text-base text-white font-heavy">{u.nickname}</p>
                                                    <span className="text-xs text-slate-500">#{u.sn}</span>
                                                    <span className="text-xs text-red-400 font-heavy bg-red-500/10 border border-red-700/20 px-2 py-0.5 rounded-md">경고 {u.warningSum}점</span>
                                                </div>
                                                <div className="flex items-center gap-2 flex-wrap">
                                                    <span className="text-[10px] font-heavy bg-slate-800 text-slate-400 px-2 py-0.5 rounded-md">총 {totalCount}건</span>
                                                    {holdCount > 0 && <span className="text-[10px] font-heavy bg-red-500/15 text-red-400 border border-red-700/20 px-2 py-0.5 rounded-md">보류 {holdCount}</span>}

                                                </div>
                                            </div>
                                            <div className="flex gap-2 flex-shrink-0">
                                                <button onClick={()=>setUserSalesModal(u)} className="p-2 rounded-xl text-xs font-heavy bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 border border-blue-700/20 transition-all"><Icon name="bar-chart-2" size={14}/></button>

                                            </div>
                                        </div>
                                        );
                                    })}
                                </div>
                                )}
                            </section>

                                            : idx === 2

                                                    <div className="relative flex-shrink-0">
                                                        <div className={`w-11 h-11 rounded-xl flex items-center justify-center font-heavy text-lg ${rankStyle.numBg} shadow-lg`}>{idx+1}</div>

                                                        <div className="flex items-center gap-2">
                                                            <span className="text-base font-heavy text-white">{auditor.name}</span>
                                                            <span className={`text-[10px] px-2 py-0.5 rounded-md font-heavy ${auditor.role === ROLES.ADMIN ? 'bg-amber-500/20 text-amber-400' : 'bg-indigo-500/20 text-indigo-400'}`}>{auditor.role}</span>

                                                        <span className="text-[10px] text-slate-600 font-bold">#{auditor.sn}</span>

                                            </div>

                                </div>

                                {/* 0건 멤버 — 간단한 목록 */}
                                {auditorRanking.filter(a => a.weekCount === 0).length > 0 && (
                                    <div className="border-t border-slate-800 pt-4">

                                                    <span className="text-sm text-slate-400 font-heavy">{auditor.name}</span>
                                                    <span className={`text-[9px] px-1.5 py-0.5 rounded font-heavy ${auditor.role === ROLES.ADMIN ? 'bg-amber-500/15 text-amber-600' : 'bg-indigo-500/15 text-indigo-500'}`}>{auditor.role}</span>
                                                    {auditor.totalCount > 0 && <span className="text-[9px] text-slate-600 font-bold">누적 {auditor.totalCount}</span>}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </>)}
                        </div>
                    )}

                    {tab === 'blacklist' && <AuditBlacklistTab blacklist={blacklist} user={user} showToast={showToast}/>}

                    {rsnModal && (

                            <div className="space-y-6 font-heavy">
                                <div className="space-y-2"><label className="text-sm text-red-400 font-heavy uppercase">보류 사유</label><textarea className="input-base h-32 font-heavy" value={reasonText} onChange={e=>setReasonText(e.target.value)} required /></div>
                                <div className="space-y-2"><label className="text-sm text-red-500 font-heavy uppercase">경고 점수 부여</label><input type="number" className="input-base text-2xl font-heavy text-red-500" value={penaltyInput} onChange={e=>setPenaltyInput(parseInt(e.target.value||0))} /></div>
                                <button onClick={async ()=>{
                                    if(!reasonText.trim()) return alert("사유를 입력해 주세요.");
                                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', rsnModal.id), { status:'pending', auditReason:reasonText, penaltyPoints:penaltyInput, auditedAt:new Date().toISOString(), auditorName:user.nickname });
                                    if (sendNotification) {
                                        const msg = `📋 장부 보류 처리\n구매자: ${rsnModal.buyerNickname} (#${rsnModal.buyerSn})\n매출: ${formatKRW(rsnModal.totalAmount)}\n\n[보류 사유]\n${reasonText}${penaltyInput > 0 ? `\n\n⚠️ 경고 ${penaltyInput}점 부여` : ''}`;
                                        await sendNotification(rsnModal.sellerUid, rsnModal.sellerNickname, 'hold', msg, rsnModal.id);
                                    }
                                    setRsnModal(null); setReasonText(""); setPenaltyInput(0); showToast("보류 및 경고 처리되었습니다.");

                            </div>
                        </Modal>
                    )}

                        <Modal title="장부 상세 분석 리포트" onClose={()=>setViewItem(null)}>
                            <div className="space-y-6 font-heavy">
                                <div className="grid grid-cols-3 gap-4 font-heavy">
                                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-inner font-heavy"><p className="text-[10px] text-slate-600 uppercase mb-1">작성 시각</p><p className="text-sm font-heavy">{formatFullDateTime(viewItem.timestamp)}</p></div>
                                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-inner font-heavy"><p className="text-[10px] text-blue-600 uppercase mb-1 font-heavy">감사관</p><p className="text-sm text-blue-400 font-heavy">{viewItem.auditorName || '미지정'}</p></div>
                                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-inner font-heavy"><p className="text-[10px] text-slate-600 uppercase mb-1">상태</p><p className="text-sm font-heavy">{viewItem.status === 'completed' ? '감사완료' : '진행중'}</p></div>

                                <div className="bg-slate-950 p-6 rounded-2xl border border-slate-800 font-heavy"><p className="text-[10px] text-slate-500 uppercase mb-2">사원 기재 비고</p><p className="text-lg font-heavy leading-relaxed">{viewItem.note || '내용 없음'}</p></div>

                                <div className="bg-slate-950 p-8 rounded-3xl border border-indigo-900/30 space-y-6 font-heavy shadow-inner font-heavy">
                                    <h4 className="text-sm text-indigo-500 uppercase font-heavy tracking-widest border-b border-indigo-900/20 pb-3">감사팀 후속 조치 및 메모</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-end">
                                        <div className="space-y-2"><label className="text-xs text-slate-500 font-heavy">감사팀 전용 메모</label><textarea className="input-base h-24 text-indigo-100 font-heavy" value={editMemo} onChange={e=>setEditMemo(e.target.value)} /></div>
                                        <div className="space-y-4">
                                            <div className="space-y-2 font-heavy"><label className="text-xs text-red-500 font-heavy uppercase tracking-widest">경고 점수 수정</label><input type="number" className="input-base text-2xl text-red-500 font-heavy" value={editPenalty} onChange={e=>setEditPenalty(parseInt(e.target.value||0))} /></div>
                                            <button onClick={async ()=>{ await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', viewItem.id), { auditMemo: editMemo, penaltyPoints: editPenalty }); showToast("정보가 저장되었습니다."); }} className="btn btn-indigo w-full py-4 text-lg font-heavy shadow-lg">메모/경고 저장</button>
                                        </div>
                                    </div>
                                    <div className="pt-6 flex gap-4 border-t border-indigo-900/20 font-heavy">
                                        <button onClick={async ()=>{ await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', viewItem.id), { status:'completed', auditedAt: new Date().toISOString(), auditMemo:editMemo, penaltyPoints:editPenalty, auditorName:user.nickname }); setViewItem(null); showToast("감사 승인 완료"); }} className="flex-1 bg-green-600 hover:bg-green-500 text-white py-6 rounded-2xl font-heavy text-2xl shadow-xl transition-all">최종 감사 승인</button>
                                        <button onClick={async ()=>{ await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', viewItem.id), { status:'pending', auditorName:user.nickname }); setViewItem(null); showToast("보류 상태로 전환됨"); }} className="flex-1 bg-red-900/40 hover:bg-red-600 text-red-500 hover:text-white py-6 rounded-2xl font-heavy text-xl border border-red-600/30 transition-all">감사 보류로 전환</button>

                                <div className="border-t border-red-900/30 pt-4 space-y-3">
                                    {/* 보류 후 완료건 → 일반 완료로 복구 */}
                                    {viewItem.status === 'completed' && viewItem.auditReason && (
                                        <button onClick={async ()=>{
                                            if(!window.confirm('보류 기록을 제거하고 일반 감사완료 건으로 복구하시겠습니까?')) return;
                                            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', viewItem.id), { auditReason:'', auditMemo:'', penaltyPoints:0 });
                                            setViewItem(null); showToast("일반 감사완료 건으로 복구되었습니다.");
                                        }} className="w-full flex items-center justify-center gap-2 py-3.5 bg-green-900/20 hover:bg-green-600/30 border border-green-700/30 text-green-400 hover:text-green-200 rounded-2xl font-heavy text-base transition-all">
                                            <Icon name="rotate-ccw" size={17}/> 보류 해제 — 일반 완료건으로 복구
                                        </button>
                                    )}
                                    <button onClick={()=>setDeleteConfirm(viewItem)} className="w-full flex items-center justify-center gap-2 py-4 bg-red-900/10 hover:bg-red-900/30 border border-red-800/40 text-red-500 hover:text-red-300 rounded-2xl font-heavy text-lg transition-all">
                                        <Icon name="trash-2" size={20}/> 장부 기입건 삭제
                                    </button>
                                </div>
                                <button onClick={()=>setViewItem(null)} className="btn bg-slate-800 w-full py-4 text-lg font-heavy mt-2 font-heavy">닫기</button>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                                            <p className="text-[10px] text-slate-600 uppercase mb-1">날짜</p>
                                            <p className="text-sm text-white font-heavy">{formatFullDateTime(deleteConfirm.timestamp)}</p>
                                        </div>
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                                            <p className="text-[10px] text-slate-600 uppercase mb-1">매출액</p>
                                            <p className="text-sm text-white font-heavy">{formatKRW(deleteConfirm.totalAmount)}</p>
                                        </div>
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                                            <p className="text-[10px] text-blue-600 uppercase mb-1">판매자</p>
                                            <p className="text-sm text-white font-heavy">{deleteConfirm.sellerNickname} <span className="text-slate-500 text-xs">#{deleteConfirm.sellerSn}</span></p>
                                        </div>
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                                            <p className="text-[10px] text-blue-600 uppercase mb-1">구매자</p>
                                            <p className="text-sm text-white font-heavy">{deleteConfirm.buyerNickname} <span className="text-slate-500 text-xs">#{deleteConfirm.buyerSn}</span></p>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={()=>setDeleteConfirm(null)} className="flex-1 py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-heavy text-lg transition-all">취소</button>
                                    <button onClick={async ()=>{
                                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', deleteConfirm.id));
                                        setDeleteConfirm(null); setViewItem(null); showToast("장부 기입건이 삭제되었습니다.");
                                    }} className="flex-1 py-4 bg-red-600 hover:bg-red-500 rounded-2xl font-heavy text-lg text-white transition-all flex items-center justify-center gap-2">
                                        <Icon name="trash-2" size={18}/> 삭제 확정
                                    </button>
                                </div>
                            </div>
                        </Modal>
                    )}

                    {penaltyDetailUser && (
                        <Modal title={`${penaltyDetailUser.nickname} 사원 경고 상세 이력`} onClose={()=>setPenaltyDetailUser(null)}>
                            <div className="space-y-4 font-heavy">
                                {records.filter(r => r.sellerUid === penaltyDetailUser.uid && (parseInt(r.penaltyPoints) > 0)).map(r => (
                                    <div key={r.id} className="bg-slate-950 p-6 rounded-[2rem] border border-slate-800 font-heavy shadow-inner">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="space-y-1">
                                                <div className="text-[10px] text-slate-600 uppercase tracking-widest">{formatFullDateTime(r.timestamp)} / 감사관: {r.auditorName || '미지정'}</div>
                                                <div className="text-xl text-white font-heavy">상태: <StatusBadge record={r} /></div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-3xl text-red-500 font-black">{r.penaltyPoints || 0}점</div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-900/50 p-4 rounded-xl border border-red-900/20 mt-4">
                                            <span className="text-[10px] text-red-500 block mb-1 uppercase font-bold">Warning Reason</span>
                                            <p className="text-red-400 font-heavy leading-relaxed">{r.auditReason || '사유 없음'}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </Modal>
                    )}

                    {/* 판매현황 모달 */}
                    {userSalesModal && (() => {
                        const auditItems = getEffectiveItems(config);
                        const auditItemKeys = Object.keys(auditItems);
                        const userRecords = records.filter(r => r.sellerUid === userSalesModal.uid);
                        const totalAmt = userRecords.reduce((s, r) => s + (r.totalAmount||0), 0);
                        const itemTotals = {};
                        auditItemKeys.forEach(k => { itemTotals[k] = userRecords.reduce((s,r) => s + (parseInt(r[k])||0), 0); });

                        const holdRecords     = userRecords.filter(r => r.status === 'pending'   && r.auditReason);
                        const holdDoneRecords = userRecords.filter(r => r.status === 'completed' && r.auditReason);
                        const shownRecords    = salesTab === 'onhold' ? holdRecords : salesTab === 'holdDone' ? holdDoneRecords : userRecords;

                        return (
                        <Modal title={`${userSalesModal.nickname} 판매현황`} onClose={()=>{ setUserSalesModal(null); setSalesTab('all'); }}>
                            <div className="space-y-5 font-heavy">

                                {/* 요약 카드 */}
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 text-center">
                                        <p className="text-[10px] text-slate-500 uppercase mb-1">총 판매건</p>
                                        <p className="text-3xl font-heavy text-white">{userRecords.length}<span className="text-sm text-slate-500 ml-1">건</span></p>
                                    </div>
                                    <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 text-center">
                                        <p className="text-[10px] text-slate-500 uppercase mb-1">총 매출</p>
                                        <p className="text-xl font-heavy text-white">{formatKRW(totalAmt)}</p>

                                    <div className="bg-blue-900/20 border border-blue-700/30 rounded-2xl p-4 text-center">

                                        {[
                                            { key:'all',      label:`전체 (${userRecords.length})`,      color:'bg-blue-600'   },
                                            { key:'onhold',   label:`보류건 (${holdRecords.length})`,    color:'bg-yellow-600' },
                                            { key:'holdDone', label:`보류 후 완료 (${holdDoneRecords.length})`, color:'bg-green-600'  },

                                            <button key={t.key} onClick={()=>setSalesTab(t.key)}

                                            </button>
