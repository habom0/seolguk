                                className="btn btn-green px-8 py-3 font-heavy shadow-lg flex items-center gap-2"
                            >
                                <Icon name={itemSaving ? 'loader' : 'save'} size={16}/> {itemSaving ? '저장 중...' : '품목 설정 저장'}
                            </button>
                        </div>
                    </section>
                    {/* 사원 명단 관리 */}
                    <section className="space-y-5">
                        <div className="flex items-center justify-between px-2">
                            <h2 className="text-2xl text-white flex items-center gap-3 font-heavy"><Icon name="users" className="text-blue-500"/> 사원 명단 관리</h2>
                            {!isAdmin && <span className="text-xs text-slate-500 bg-slate-900 px-3 py-1 rounded-full border border-slate-800">읽기 전용 모드</span>}
                        </div>

                        {/* 가입 승인 대기 보드 */}
                        {(() => {
                            const pendingUsers = allUsers.filter(u => u.role === ROLES.PENDING);
                            if (pendingUsers.length === 0) return null;
                            return (
                                <div className="card border border-yellow-700/40 bg-yellow-900/10 shadow-xl space-y-3">
                                    <h3 className="text-base font-heavy flex items-center gap-2 text-yellow-400"><Icon name="clock" size={18}/> 가입 승인 대기 ({pendingUsers.length}명)</h3>
                                    <div className="space-y-2">
                                        {pendingUsers.map(u => (
                                            <div key={u.uid} className="bg-slate-950 border border-yellow-800/30 rounded-2xl p-4 flex flex-wrap justify-between items-center gap-3">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 bg-yellow-600/15 rounded-full flex items-center justify-center font-black text-yellow-500 border border-yellow-700/30 text-sm flex-shrink-0">{u.sn.slice(-2)}</div>
                                                    <div>
                                                        <p className="text-base font-heavy text-white">{u.nickname} <span className="text-xs text-slate-500 ml-1">#{u.sn}</span></p>
                                                        <p className="text-xs text-yellow-600 font-bold">가입신청 {formatDate(u.joinDate)}</p>
                                                    </div>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button onClick={() => isAdmin && updateUser(u.uid, {role: ROLES.EMPLOYEE})}
                                                        className="px-4 py-2 rounded-xl text-xs font-heavy bg-green-600 hover:bg-green-500 text-white transition-all flex items-center gap-1">
                                                        <Icon name="check" size={13}/> 사원 승인
                                                    </button>
                                                    <button onClick={async () => { if(window.confirm(`${u.nickname}님의 가입을 거절하시겠습니까?`)) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid)); }}
                                                        className="px-4 py-2 rounded-xl text-xs font-heavy bg-red-600/15 hover:bg-red-600 text-red-400 hover:text-white border border-red-700/30 transition-all flex items-center gap-1">
                                                        <Icon name="x" size={13}/> 거절
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        })()}

                        {/* 필터 탭 + 사원 테이블 */}
                        {(() => {
                            const [memberFilter, setMemberFilter] = React.useState('all');
                            const FILTERS = [
                                { key:'all', label:'전체' },
                                { key:'사원', label:'사원' },
                                { key:'감사팀', label:'감사팀' },
                                { key:'관리자', label:'관리자' },
                                { key:'이벤트용', label:'이벤트용' },
                            ];
                            const filtered = allUsers
                                .filter(u => u.role !== ROLES.PENDING)
                                .filter(u => memberFilter === 'all' || u.role === memberFilter)
                                .sort((a,b) => a.nickname.localeCompare(b.nickname, 'ko'));
                            return (
                                <div className="space-y-4">
                                    <div className="flex flex-wrap items-center gap-2 bg-slate-900 lm-pill-wrap p-1 rounded-xl border border-slate-800 w-fit">
                                        {FILTERS.map(f => (
                                            <button key={f.key} onClick={()=>setMemberFilter(f.key)}
                                                className={`px-4 py-2 rounded-lg text-xs font-heavy transition-all ${memberFilter===f.key ? 'bg-blue-600 text-white' : 'text-slate-500 hover:text-slate-300 lm-pill-inactive'}`}>
                                                {f.label}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="card p-0 overflow-hidden shadow-2xl">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left font-heavy">
                                                <thead className="bg-slate-800/50 text-slate-400 text-[10px] uppercase tracking-widest">
                                                    <tr className="border-b border-slate-700">
                                                        <th className="p-4 whitespace-nowrap">고유번호</th>
                                                        <th className="p-4 whitespace-nowrap">닉네임 / 가입일</th>
                                                        <th className="p-4 text-center whitespace-nowrap">비밀번호</th>
                                                        <th className="p-4 text-center whitespace-nowrap">부여 권한</th>
                                                        {isAdmin && <th className="p-4 text-right whitespace-nowrap">제명</th>}
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-800 text-white font-heavy">
                                                    {filtered.map(u => (
                                                        <tr key={u.uid} className="hover:bg-slate-800/40 transition-colors">
                                                            <td className="p-4">
                                                                <div className="bg-slate-950 px-3 py-2 rounded-xl border border-slate-800 text-center font-mono text-blue-500 text-base shadow-inner w-fit mx-auto">{u.sn}</div>
                                                            </td>
                                                            <td className="p-4 whitespace-nowrap">
                                                                <div className="text-base font-black">{u.nickname}</div>
                                                                <div className="text-[10px] text-slate-600 mt-0.5">Joined: {formatDate(u.joinDate)}</div>
                                                            </td>
                                                            <td className="p-4 text-center">
                                                                {u.sn === '0000' ? (
                                                                    <div className="flex items-center justify-center bg-slate-950 px-3 py-2 rounded-xl border border-slate-800 w-max mx-auto shadow-inner">
                                                                        <span className="text-base tracking-[0.4em] font-mono text-slate-600">••••</span>
                                                                        <span className="text-[10px] text-slate-700 ml-2">관리자 전용</span>
                                                                    </div>
                                                                ) : (
                                                                    <div className="flex items-center justify-center gap-2 bg-slate-950 px-3 py-2 rounded-xl border border-slate-800 w-max mx-auto shadow-inner">
                                                                        <span className="text-base tracking-[0.4em] font-mono text-slate-400">{showPw[u.uid] ? u.password : '****'}</span>
                                                                        <button onClick={()=>setShowPw({...showPw, [u.uid]: !showPw[u.uid]})} className="text-slate-600 hover:text-white transition-colors">
                                                                            <Icon name={showPw[u.uid] ? 'eye-off' : 'eye'} size={16}/>
                                                                        </button>
                                                                    </div>
                                                                )}
                                                            </td>
                                                            <td className="p-4 text-center">
                                                                <div className="flex flex-wrap justify-center gap-1.5 max-w-[340px] mx-auto">
                                                                    {[ROLES.EMPLOYEE, ROLES.AUDIT, ROLES.ADMIN, ROLES.EVENT].map(role => (
                                                                        <button key={role} onClick={() => isAdmin && updateUser(u.uid, {role})} disabled={!isAdmin}
                                                                            className={`px-3 py-1.5 rounded-xl text-[11px] font-black transition-all ${u.role === role ? getRoleStyles(role) + ' shadow-lg scale-105' : 'bg-slate-950 text-slate-600 border border-slate-800 hover:border-slate-600 role-btn-inactive'} ${!isAdmin ? 'cursor-default' : 'cursor-pointer'}`}>
                                                                            {role}
                                                                        </button>
                                                                    ))}
                                                                </div>
                                                            </td>
                                                            {isAdmin && (
                                                                <td className="p-4 text-right">
                                                                    <button onClick={async ()=>{if(window.confirm(`${u.nickname}님을 정말 삭제하시겠습니까?`)) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid));}}
                                                                        disabled={u.sn === '0000'}
                                                                        className={`p-2.5 rounded-xl transition-colors ${u.sn === '0000' ? 'opacity-20 cursor-not-allowed text-slate-700' : 'text-red-900 hover:text-red-500 hover:bg-red-500/10 bg-red-500/5'}`}>
                                                                        <Icon name="trash-2" size={16}/>
                                                                    </button>
                                                                </td>
                                                            )}
                                                        </tr>
                                                    ))}
                                                    {filtered.length === 0 && (
                                                        <tr><td colSpan="5" className="p-8 text-center text-slate-600 font-bold">해당 권한의 사원이 없습니다.</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}
                    </section>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
