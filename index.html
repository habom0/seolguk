            );
        }

        // --- Blacklist View ---
        function BlacklistView({ blacklist, user, showToast }) {
            const now = new Date();
            const active   = (blacklist||[]).filter(b => !b.releasedAt && new Date(b.endDate) >= now);
            const expired  = (blacklist||[]).filter(b => !b.releasedAt && new Date(b.endDate) < now);
            const released = (blacklist||[]).filter(b => b.releasedAt);

            const RULES = [
                { icon:'🚨', period:'7일', color:'border-orange-600/40 bg-orange-950/10', textColor:'text-orange-400',
                  items:['허위콜 / 중복콜 / 사유 없는 콜','사유지 무단 침입','팩션 사업 물품 소량 개인거래','경미한 영업방해'] },
                { icon:'⚠️', period:'14일', color:'border-yellow-600/40 bg-yellow-950/10', textColor:'text-yellow-400',
                  items:['팩션원 대상 배드RP','사업장 내 팩션원 폭행','팩션 사업 물품 대량 개인거래','사유지 반복 침입 (2회 이상 경고 후 불응)','콜 후 잠수 / 지시 무시 후 도주','팩션 비하 발언'] },
                { icon:'⛔', period:'15일', color:'border-red-700/40 bg-red-950/15', textColor:'text-red-400',
                  items:['허위 정보 유포','팩션 혼란 조성 행위'] },
                { icon:'💀', period:'30일', color:'border-red-900/60 bg-red-950/25', textColor:'text-red-300',
                  items:['사업장 내 팩션원 살인','사유지 반복 침입 + 무기 사용','팩션 전체 비방 / 이미지 훼손','팩션에 막대한 피해를 주는 행위','팩션 판매 활동 방해','이중구매 (온라인 마켓 + 콜 구매)'] },
                { icon:'👮', period:'관리자 처벌', color:'border-purple-700/40 bg-purple-950/15', textColor:'text-purple-400',
                  items:['물품 500개 이상 개인거래'] },
            ];

            const POLICIES = [
                { icon:'💰', label:'해제 비용', text:'1일당 10억' },
                { icon:'📍', label:'해제 방법', text:'사유지 방문 후 고위직 문의 (영상 증거 필수)' },
                { icon:'🚫', label:'해제 거부', text:'팩션 판단에 따라 거부 가능' },
                { icon:'📋', label:'이의제기', text:'스태프를 통해 신청 가능' },
                { icon:'⏱️', label:'기간 연장', text:'블랙리스트 기간 중 추가 피해 발생 시 연장 가능' },
                { icon:'♾️', label:'영구 등재', text:'블랙 상태에서 지속적 콜 시 영구 블랙리스트 등재' },
            ];

            const EXCEPTIONS = [
                { icon:'✅', text:'실수로 거래 발생 → 2시간 이내 고위직 신고 시 면제' },
                { icon:'✅', text:'소매넣기 피해 → 12시간 이내 신고 + 영상 필수' },
                { icon:'⚡', text:'블랙리스트 대상과 거래 시 → 거래 상대방도 7일 블랙 등재 (같은 조직 / 공무원 포함)' },
            ];

            return (
                <div className="space-y-8 font-bold animate-fade-in">
                    <div className="flex items-center gap-3">
                        <h2 className="text-2xl text-white flex items-center gap-3 font-heavy"><Icon name="shield-off" className="text-red-500" size={24}/> 블랙리스트</h2>
                        {active.length > 0 && <span className="bg-red-600 text-white text-xs font-heavy px-2.5 py-1 rounded-full">적용중 {active.length}명</span>}
                    </div>

                    {/* 현재 적용 중 — 흰 보드 */}
                    <div className="card shadow-xl space-y-4">
                        <h3 className="text-base font-heavy text-red-400 flex items-center gap-2"><Icon name="alert-circle" size={16}/> 현재 적용 중 ({active.length}명)</h3>
                        {active.length === 0 ? (
                            <div className="text-center py-8 text-slate-600 font-bold"><Icon name="check-circle" size={32} className="mx-auto mb-2 opacity-30"/>현재 블랙리스트 등재 고객이 없습니다.</div>
                        ) : <div className="space-y-3">{active.map(b => {
                            const days = calcDays(b.startDate, b.endDate);
                            return (
                            <div key={b.id} className="rounded-2xl border border-red-800/40 bg-red-950/15 p-4 space-y-2.5">
                                <div className="flex flex-wrap justify-between items-start gap-2">
                                    <div className="flex items-center gap-2">
                                        <Icon name="shield-off" size={16} className="text-red-500 flex-shrink-0"/>
                                        <span className="text-white font-heavy text-lg">{b.buyerNickname}</span>
                                        <span className="text-slate-500 text-sm font-bold">#{b.buyerSn}</span>
                                    </div>
                                    <span className="text-red-400 text-xs font-heavy bg-red-900/30 border border-red-700/30 px-2.5 py-1.5 rounded-xl">
                                        {b.startDate} ~ {b.endDate}{days?` (${days}일)`:''}
                                    </span>
                                </div>
                                <p className="text-sm text-slate-200 font-bold leading-relaxed pl-6">{b.reason}</p>
                                <p className="text-[10px] text-slate-600 font-bold pl-6">등록: {b.registeredBy} · {formatDate(b.createdAt)}</p>
                            </div>
                            );
                        })}</div>}
                    </div>

                    {/* 등재 사유 규정 — 흰 보드로 전체 감싸기 */}
                    <div className="card shadow-xl space-y-6">
                        <h3 className="text-lg font-heavy text-white flex items-center gap-2">❄️ 설국 블랙리스트 등재 사유 안내</h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                            {RULES.map((r, i) => (
                                <div key={i} className={`rounded-2xl border p-5 space-y-3 ${r.color}`}>
                                    <div className="flex items-center gap-3">
                                        <span className="text-2xl w-9 h-9 flex items-center justify-center flex-shrink-0">{r.icon}</span>
                                        <span className={`font-heavy text-lg ${r.textColor}`}>{r.period} 제재</span>
                                    </div>
                                    <ul className="space-y-2 pl-1">
                                        {r.items.map((item, j) => (
                                            <li key={j} className="text-sm text-slate-300 font-bold flex items-start gap-2">
                                                <span className="text-slate-500 flex-shrink-0 mt-0.5">•</span>{item}
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </div>

                        {/* 블랙리스트 규정 + 예외/연관 처벌 — 하나의 보드, 구분선으로 분리 */}
                        <div className="card border border-slate-700/50 space-y-5">
                            {/* 블랙리스트 규정 */}
                            <div className="space-y-3">
                                <h4 className="text-base font-heavy text-slate-200 flex items-center gap-2"><span>🚫</span> 블랙리스트 규정</h4>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2.5">
                                    {POLICIES.map((p, i) => (
                                        <div key={i} className="bg-slate-900/60 rounded-xl px-4 py-3 flex items-center gap-3 border border-slate-800">
                                            <span className="text-xl w-8 h-8 flex items-center justify-center flex-shrink-0">{p.icon}</span>
                                            <div>
                                                <p className="text-xs text-slate-500 font-heavy uppercase mb-0.5">{p.label}</p>
                                                <p className="text-sm text-slate-200 font-bold leading-snug">{p.text}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="border-t border-slate-700"/>

                            {/* 예외/연관 처벌 */}
                            <div className="space-y-3">
                                <h4 className="text-base font-heavy text-slate-200 flex items-center gap-2"><span>📍</span> 예외 규정 / 연관 처벌</h4>
                                <div className="space-y-2">
                                    {EXCEPTIONS.map((e, i) => (
                                        <div key={i} className="flex items-start gap-3 bg-slate-900/40 rounded-xl px-4 py-3 border border-slate-800">
                                            <span className="text-lg w-6 flex-shrink-0 text-center">{e.icon}</span>
                                            <p className="text-sm text-slate-300 font-bold leading-relaxed">{e.text}</p>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-xs text-slate-600 font-bold">⚠️ 모든 규정은 상황에 따라 관리자 판단 하에 추가 조치가 이루어질 수 있습니다.</p>
                            </div>
                        </div>
                    </div>

                    {/* 만료/해제 기록 */}
                    {(expired.length > 0 || released.length > 0) && (
                        <div className="space-y-2">
                            <h3 className="text-sm font-heavy text-slate-600 uppercase tracking-widest">과거 기록</h3>
                            {[...released, ...expired].map(b => {
                                const days = calcDays(b.startDate, b.endDate);
                                return (
                                <div key={b.id} className="card border border-slate-800 opacity-60 space-y-1.5 py-3">
                                    <div className="flex flex-wrap justify-between items-center gap-2">
                                        <div>
                                            <span className="text-slate-400 font-heavy">{b.buyerNickname}</span>
                                            <span className="text-slate-600 text-xs ml-2">#{b.buyerSn}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <span className="text-slate-600 text-xs">{b.startDate} ~ {b.endDate}{days?` (${days}일)`:''}</span>
                                            {b.releasedAt && <span className="text-[10px] text-green-700 bg-green-900/20 border border-green-800/30 px-2 py-0.5 rounded-md font-bold">해제됨</span>}
                                            {!b.releasedAt && <span className="text-[10px] text-slate-600 bg-slate-800 px-2 py-0.5 rounded-md font-bold">만료</span>}
                                        </div>
                                    </div>
                                    {b.releasedAt && <p className="text-[10px] text-green-700 font-bold">해제: {b.releasedBy} — {b.releaseReason}</p>}
                                </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        // --- Payroll View ---
        function PayrollView({ records, allUsers, config, weekRange, weekOffset, setWeekOffset, showToast }) {
            const BONUS = { 0: 10000000000, 1: 5000000000, 2: 3000000000 }; // 1등 100억, 2등 50억, 3등 30억
            const PAYRATE = 0.1;

            const isCurrentWeek = weekOffset === 0;
            const weekLabel = isCurrentWeek ? '이번 주' : weekOffset === -1 ? '지난 주' : `${Math.abs(weekOffset)}주 전`;

            // 이벤트·가입신청 제외 사원 목록
            const employees = useMemo(() => allUsers.filter(u =>
                u.role !== ROLES.EVENT && u.role !== ROLES.PENDING && u.sn !== '0000'
            ), [allUsers]);

            // 주간 판매 집계
            const payrollData = useMemo(() => {
                const eventUids = new Set(allUsers.filter(u => u.role === ROLES.EVENT).map(u => u.uid));
                const weekRecs = records.filter(r => {
                    if (eventUids.has(r.sellerUid)) return false;
                    if (r.status === 'pending' && r.auditReason) return false;
                    const d = new Date(r.timestamp);
                    return d >= weekRange.start && d <= weekRange.end;
                });

                const map = {};
                employees.forEach(u => {
                    map[u.uid] = { uid: u.uid, name: u.nickname, sn: u.sn, role: u.role, count: 0, total: 0 };
                });
                weekRecs.forEach(r => {
                    if (map[r.sellerUid]) {
                        map[r.sellerUid].count++;
                        map[r.sellerUid].total += r.totalAmount || 0;
                    }
                });

                return Object.values(map)
                    .sort((a, b) => b.count - a.count || b.total - a.total);
            }, [records, employees, allUsers, weekRange]);

            // 실제 판매 있는 사람만 순위 부여 (0건은 순위 없음)
            const rankedData = useMemo(() => {
                return payrollData.map((d, idx) => {
                    const rankIdx = d.count > 0 ? idx : null; // 0건이면 순위 없음
                    // 동점 처리: 앞 사람과 count 같으면 같은 순위
                    let rank = null;
                    if (d.count > 0) {
                        rank = payrollData.filter((x, i) => i < payrollData.indexOf(d) && x.count > d.count || (x.count === d.count && x.total > d.total)).length;
                    }
                    const base = Math.round(d.total * PAYRATE);
                    const bonus = (rank !== null && BONUS[rank]) ? BONUS[rank] : 0;
                    const weekly = base + bonus;
                    return { ...d, rank, base, bonus, weekly };
                });
            }, [payrollData]);

            const totalPayout = rankedData.reduce((s, d) => s + d.weekly, 0);

            const rankStyles = [
                { bg:'bg-yellow-900/20 border-yellow-600/40', num:'bg-yellow-500 text-black', label:'👑 1위', bonusColor:'text-yellow-400' },
                { bg:'bg-slate-700/20 border-slate-500/40',   num:'bg-slate-400 text-black',  label:'🥈 2위', bonusColor:'text-slate-300' },
                { bg:'bg-amber-900/15 border-amber-700/40',   num:'bg-amber-700 text-white',  label:'🥉 3위', bonusColor:'text-amber-400' },
            ];

            return (
                <div className="space-y-6 font-bold animate-fade-in">
                    {/* 헤더 */}
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <h2 className="text-2xl text-white flex items-center gap-3 font-heavy">
                            <Icon name="banknote" className="text-green-400" size={24}/> 주급 정산
                        </h2>
                        <div className="flex items-center gap-3 bg-slate-900 px-4 py-2.5 rounded-xl border border-slate-800 font-heavy">
                            <button onClick={()=>setWeekOffset(w=>w-1)} className="hover:text-blue-400 transition-all text-slate-400"><Icon name="chevron-left" size={18}/></button>
                            <div className="text-center min-w-[180px]">
                                <span className={`text-sm font-heavy ${isCurrentWeek?'text-blue-400':'text-slate-300'}`}>{weekLabel}</span>
                                <span className="text-slate-600 text-xs ml-2">{weekRange.start.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})} ~ {weekRange.end.toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})}</span>
                            </div>
                            <button onClick={()=>setWeekOffset(w=>Math.min(w+1,0))} disabled={isCurrentWeek}
                                className={`transition-all ${isCurrentWeek?'text-slate-700 cursor-not-allowed':'text-slate-400 hover:text-blue-400'}`}>
                                <Icon name="chevron-right" size={18}/>
                            </button>
                        </div>
                    </div>

                    {/* 요약 카드 */}
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <div className="card space-y-1">
                            <p className="text-xs text-slate-500 font-heavy uppercase">정산 인원</p>
                            <p className="text-2xl font-heavy text-white">{rankedData.filter(d=>d.count>0).length}<span className="text-sm text-slate-500 ml-1">명</span></p>
                        </div>
                        <div className="card space-y-1">
                            <p className="text-xs text-slate-500 font-heavy uppercase">주간 총 매출</p>
                            <p className="text-2xl font-heavy text-white">{formatKRW(rankedData.reduce((s,d)=>s+d.total,0))}</p>
                        </div>
                        <div className="card space-y-1">
                            <p className="text-xs text-slate-500 font-heavy uppercase">총 지급액 (주급+보너스)</p>
                            <p className="text-2xl font-heavy text-green-400">{formatKRW(totalPayout)}</p>
                        </div>
                    </div>

                    {/* 정산 테이블 */}
                    <div className="card p-0 overflow-hidden shadow-2xl">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left font-heavy">
                                <thead className="bg-slate-800/50 text-slate-500 text-[10px] uppercase tracking-widest">
                                    <tr className="border-b border-slate-800">
                                        <th className="px-5 py-4 whitespace-nowrap">순위</th>
                                        <th className="px-5 py-4 whitespace-nowrap">사원명</th>
                                        <th className="px-5 py-4 text-center whitespace-nowrap">판매건수</th>
                                        <th className="px-5 py-4 text-right whitespace-nowrap">주간 총매출</th>
                                        <th className="px-5 py-4 text-right whitespace-nowrap">공계 입금액</th>
                                        <th className="px-5 py-4 text-right whitespace-nowrap">기본 주급 (10%)</th>
                                        <th className="px-5 py-4 text-right whitespace-nowrap">보너스</th>
                                        <th className="px-5 py-4 text-right whitespace-nowrap">최종 주급</th>
                                        <th className="px-5 py-4 text-center whitespace-nowrap">복사</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800 text-white font-heavy">
                                    {rankedData.map((d, idx) => {
                                        const rs = d.rank !== null && rankStyles[d.rank] ? rankStyles[d.rank] : null;
                                        return (
                                        <tr key={d.uid} className={`transition-colors ${rs ? `${rs.bg} border-l-4` : 'hover:bg-slate-800/30'}`}>
                                            <td className="px-5 py-4 whitespace-nowrap">
                                                {rs ? (
                                                    <div className={`w-9 h-9 rounded-xl flex items-center justify-center font-heavy text-sm ${rs.num} shadow-lg`}>{d.rank+1}</div>
                                                ) : (
                                                    <div className="w-9 h-9 rounded-xl flex items-center justify-center font-heavy text-sm bg-slate-800 text-slate-500">{d.count > 0 ? idx+1 : '-'}</div>
                                                )}
                                            </td>
                                            <td className="px-5 py-4 whitespace-nowrap">
                                                <div className="font-heavy text-base">{d.name}</div>
                                                <div className="text-[10px] text-slate-600">#{d.sn}</div>
                                            </td>
                                            <td className="px-5 py-4 text-center whitespace-nowrap">
                                                <span className={`font-black text-xl ${d.count > 0 ? 'text-blue-400' : 'text-slate-700'}`}>{d.count}</span>
                                                <span className="text-[10px] text-slate-600 ml-1">건</span>
                                            </td>
                                            <td className="px-5 py-4 text-right whitespace-nowrap">
                                                <span className={d.total > 0 ? 'text-white' : 'text-slate-700'}>{d.total > 0 ? formatKRW(d.total) : '-'}</span>
                                            </td>
                                            <td className="px-5 py-4 text-right whitespace-nowrap">
                                                <span className={d.total > 0 ? 'text-blue-400' : 'text-slate-700'}>{d.total > 0 ? formatKRW(d.total * 0.5) : '-'}</span>
                                            </td>
                                            <td className="px-5 py-4 text-right whitespace-nowrap">
                                                <span className={d.base > 0 ? 'text-green-400 font-heavy' : 'text-slate-700'}>{d.base > 0 ? formatKRW(d.base) : '-'}</span>
                                            </td>
                                            <td className="px-5 py-4 text-right whitespace-nowrap">
                                                {d.bonus > 0 ? (
                                                    <span className={`font-heavy ${rs?.bonusColor || 'text-yellow-400'}`}>+{formatKRW(d.bonus)}</span>
                                                ) : <span className="text-slate-700">-</span>}
                                            </td>
                                            <td className="px-5 py-4 text-right whitespace-nowrap">
                                                <span className={`text-lg font-heavy ${d.weekly > 0 ? 'text-white' : 'text-slate-700'}`}>{d.weekly > 0 ? formatKRW(d.weekly) : '-'}</span>
                                            </td>
                                            <td className="px-5 py-4 text-center whitespace-nowrap">
                                                {d.weekly > 0 ? (
                                                    <button onClick={()=>{ copyToClipboard(String(d.weekly)); showToast(`${d.name} 주급 복사됨`); }}
                                                        className="p-2 bg-green-600/10 hover:bg-green-600/25 text-green-400 rounded-lg transition-all"
                                                        title="주급 복사 (숫자만)">
                                                        <Icon name="copy" size={15}/>
                                                    </button>
                                                ) : <span className="text-slate-700">-</span>}
                                            </td>
                                        </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* 보너스 안내 */}
                    <div className="card border border-slate-700/50 space-y-3">
                        <h3 className="text-sm font-heavy text-slate-300 flex items-center gap-2"><Icon name="info" size={14}/> 주급 산정 기준</h3>
                        <div className="flex flex-wrap gap-3">
                            <div className="bg-slate-900 rounded-xl px-4 py-2.5 border border-slate-800 text-sm font-bold">
                                <span className="text-slate-500">기본 주급</span> <span className="text-green-400 ml-2">주간 총매출 × 10%</span>
                            </div>
                            <div className="bg-yellow-900/20 rounded-xl px-4 py-2.5 border border-yellow-700/30 text-sm font-bold flex items-center gap-2">
                                <span>👑</span> <span className="text-slate-400">1위 보너스</span> <span className="text-yellow-400 ml-1">+{formatKRW(BONUS[0])}</span>
                            </div>
                            <div className="bg-slate-700/20 rounded-xl px-4 py-2.5 border border-slate-500/30 text-sm font-bold flex items-center gap-2">
                                <span>🥈</span> <span className="text-slate-400">2위 보너스</span> <span className="text-slate-300 ml-1">+{formatKRW(BONUS[1])}</span>
                            </div>
                            <div className="bg-amber-900/15 rounded-xl px-4 py-2.5 border border-amber-700/30 text-sm font-bold flex items-center gap-2">
                                <span>🥉</span> <span className="text-slate-400">3위 보너스</span> <span className="text-amber-400 ml-1">+{formatKRW(BONUS[2])}</span>
                            </div>
                        </div>
                        <p className="text-[10px] text-slate-600 font-bold">* 판매건수 기준 정렬 · 0건 사원은 순위 및 주급 미지급 · 이벤트 계정 제외</p>
                    </div>
                </div>
            );
        }

        // --- Admin/Audit Member Management View ---
        function AdminView({ allUsers, config, setConfig, currentUser, records, showToast }) {
            const [showPw, setShowPw] = useState({});
            const isAdmin = currentUser.role === ROLES.ADMIN;
            const [noticeText, setNoticeText] = useState(config.eventNotice || "");
            const [notePlaceholder, setNotePlaceholder] = useState(config.notePlaceholder || "특이사항 기재");
            const [adminTab, setAdminTab] = useState('settings'); // settings / members
            const [memberFilter, setMemberFilter] = useState('all');

            // 필독 모달 내용 편집
            const DEFAULT_GUIDE = {
                warnings: [
                    '판매 전 반드시 전체 장부 > 오늘의 판매건에서 해당 구매자의 당일 구매 이력을 검색하여 중복 여부를 확인하세요.',
                    '장부를 누락한 경우, 이후 발생하는 중복 구매 사고에 대한 경고 및 사후 처리는 장부를 누락한 사원이 책임집니다.',
                    '중복 판매가 확인된 경우 즉시 회수하고 감사팀에 보고하세요.',
                    '구매자 고유번호와 닉네임을 반드시 정확하게 확인 후 기재하세요.',
                    '당일 장부는 반드시 당일 제출해야 합니다.',
                    '처리 방법을 모르거나 애매한 상황은 임의 처리하지 말고 반드시 감사팀에 문의 후 처리하세요.',
                ],
                steps: [
                    '전체 장부 > 오늘의 판매건에서 구매자 고번 또는 닉네임으로 중복 구매 여부를 먼저 확인합니다.',
                    '구매자 닉네임과 고유번호를 입력합니다.',
                    '판매한 품목의 수량을 각 칸에 입력합니다.',
                    '특이사항이 있을 경우 비고란에 기재합니다.',
                    '우측에서 공계 입금액(50%)을 확인합니다.',
                    '금액 복사 버튼으로 입금액을, 사유 복사 버튼으로 입금 사유를 복사합니다.',
                    '공동계좌에 입금 후 장부 제출하기를 눌러 등록합니다.',
                ],
            };
            const savedGuide = config.guideContent || DEFAULT_GUIDE;
            const [guideWarnings, setGuideWarnings] = useState(savedGuide.warnings.join('\n'));
            const [guideSteps, setGuideSteps] = useState(savedGuide.steps.join('\n'));
            const guideWarningsRef = React.useRef(null);
            const guideStepsRef = React.useRef(null);
            useEffect(() => {
                [guideWarningsRef, guideStepsRef].forEach(ref => {
                    if (ref.current) { ref.current.style.height = 'auto'; ref.current.style.height = ref.current.scrollHeight + 'px'; }
                });
            }, [guideWarnings, guideSteps, adminTab]);
            useEffect(() => {
                const g = config.guideContent || DEFAULT_GUIDE;
                setGuideWarnings(g.warnings.join('\n'));
                setGuideSteps(g.steps.join('\n'));
            }, [config.guideContent]);

            const saveGuideContent = async () => {
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, {
                    guideContent: {
                        warnings: guideWarnings.split('\n').map(s=>s.trim()).filter(Boolean),
                        steps: guideSteps.split('\n').map(s=>s.trim()).filter(Boolean),
                    }
                });
                showToast("장부 작성 방법 안내가 저장되었습니다.");
            };

            useEffect(() => { setNoticeText(config.eventNotice || ""); }, [config.eventNotice]);
            useEffect(() => { setNotePlaceholder(config.notePlaceholder || "특이사항 기재"); }, [config.notePlaceholder]);

            const saveNotice = async () => {
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, { eventNotice: noticeText });
                showToast("공지사항이 반영되었습니다.");
            };

            const saveNotePlaceholder = async () => {
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, { notePlaceholder: notePlaceholder });
                showToast("비고 안내 문구가 저장되었습니다.");
            };

            const [itemDraft, setItemDraft] = useState(null); // 편집 중인 품목 초안
            const [itemOrder, setItemOrder] = useState([]); // 품목 순서
            const [itemSaving, setItemSaving] = useState(false);

            // 편집 초안 초기화 (config.items 변경 시 동기화)
            useEffect(() => {
                const eff = getEffectiveItems(config);
                setItemDraft(JSON.parse(JSON.stringify(eff)));
                setItemOrder(Object.keys(eff));
            }, [config.items, config.itemOrder]);

            const saveItems = async () => {
                if (!itemDraft) return;
                setItemSaving(true);
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, { items: itemDraft, itemOrder: itemOrder });
                setItemSaving(false);
                showToast("품목 설정이 저장되었습니다.");
            };

            const resetItemsToDefault = async () => {
                if (!window.confirm("품목 설정을 기본값으로 초기화하시겠습니까?")) return;
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, { items: DEFAULT_ITEMS, itemOrder: DEFAULT_ORDER });
                showToast("품목 설정이 기본값으로 초기화되었습니다.");
            };

            const moveItem = (key, dir) => {
                const idx = itemOrder.indexOf(key);
                const newOrder = [...itemOrder];
                const swap = idx + dir;
                if (swap < 0 || swap >= newOrder.length) return;
                [newOrder[idx], newOrder[swap]] = [newOrder[swap], newOrder[idx]];
                setItemOrder(newOrder);
            };

            const saveWeekStartDay = async (day) => {
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, { weekStartDay: day });
                showToast("정산 기준 요일이 변경되었습니다.");
            };

            const updateItemField = (key, field, value) => {
                setItemDraft(prev => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
            };

            const updateUser = async (uid, data) => {
                if(!isAdmin) return alert("관리자만 수정할 수 있습니다.");
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid), data);
            };

            const getRoleStyles = (role) => {
                switch(role) {
                    case ROLES.ADMIN:    return "bg-amber-500 text-black";
                    case ROLES.AUDIT:    return "bg-indigo-600 text-white";
                    case ROLES.EVENT:    return "bg-purple-600 text-white";
                    case ROLES.PENDING:  return "bg-yellow-600 text-white";
                    default:             return "bg-slate-700 text-slate-200";
                }
            };



            return (
                <div className="space-y-6 animate-fade-in font-bold">

                    {/* 상단 탭 */}
                    <div className="flex items-center gap-2 bg-slate-900 p-1 rounded-xl border border-slate-800 w-fit">
                        {[
                            { k:'settings', icon:'settings', label:'시스템 설정' },
                            { k:'members',  icon:'users',    label:'사원 명단' },
                        ].map(t => (
                            <button key={t.k} onClick={()=>setAdminTab(t.k)}
                                className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-heavy transition-all ${adminTab===t.k ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>
                                <Icon name={t.icon} size={15}/> {t.label}
                            </button>
                        ))}
                    </div>

                    {adminTab === 'settings' && (<>

                    {/* 공지사항 + 주간요일 — 2열 */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="card shadow-2xl space-y-3">
                            <h2 className="text-base text-white flex items-center gap-2 font-heavy"><Icon name="megaphone" className="text-blue-400" size={18}/> 메인 공지사항</h2>
                            <input type="text" className="input-base font-bold" value={noticeText} onChange={e=>setNoticeText(e.target.value)} placeholder="대시보드 상단에 표시할 공지사항..."/>
                            <button onClick={saveNotice} className="btn btn-blue w-full py-2.5 text-sm font-heavy">반영하기</button>
                        </div>
                        <div className="card shadow-2xl space-y-3">
                            <h2 className="text-base text-white flex items-center gap-2 font-heavy"><Icon name="calendar" className="text-indigo-400" size={18}/> 주간 정산 기준 요일</h2>
                            <div className="flex flex-wrap gap-2">
                                {WEEK_DAYS.map((label, idx) => (
                                    <button key={idx} onClick={() => saveWeekStartDay(idx)}
                                        className={`px-3 py-2 rounded-xl font-heavy text-xs transition-all ${config.weekStartDay === idx ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 border border-slate-700'}`}>
                                        매주 {label}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* 품목 설정 */}
                    <section className="card shadow-2xl space-y-5">
                        <div className="flex items-center justify-between">
                            <h2 className="text-xl flex items-center gap-3 font-heavy"><Icon name="package" className="text-green-400"/> 품목 설정</h2>
                            <button onClick={resetItemsToDefault} className="text-xs text-slate-500 hover:text-slate-300 underline underline-offset-2 font-bold transition-all">기본값 초기화</button>
                        </div>
                        <p className="text-xs text-slate-500 font-bold">품목명, 일일 최대 수량, 가격을 수정합니다. 저장 전에는 적용되지 않습니다.</p>
                        {itemDraft && (
                        <div className="space-y-3">
                            <div className="grid grid-cols-12 gap-2 px-1">
                                <div className="col-span-1 text-[10px] text-slate-600 uppercase font-heavy text-center">순서</div>
                                <div className="col-span-1 text-[10px] text-slate-600 uppercase font-heavy text-center">아이콘</div>
                                <div className="col-span-4 text-[10px] text-slate-600 uppercase font-heavy">품목명</div>
                                <div className="col-span-2 text-[10px] text-slate-600 uppercase font-heavy">일일 최대</div>
                                <div className="col-span-4 text-[10px] text-slate-600 uppercase font-heavy">단가 (원)</div>
                            </div>
                            {itemOrder.filter(k => itemDraft[k]).map((k, idx) => (
                                <div key={k} className="grid grid-cols-12 gap-2 items-center bg-slate-950 border border-slate-800 rounded-2xl p-3 hover:border-slate-700 transition-all">
                                    <div className="col-span-1 flex flex-col items-center gap-0.5">
                                        <button type="button" onClick={()=>moveItem(k,-1)} disabled={idx===0} className="p-1 rounded text-slate-600 hover:text-white disabled:opacity-20 transition-colors"><Icon name="chevron-up" size={14}/></button>
                                        <button type="button" onClick={()=>moveItem(k,1)} disabled={idx===itemOrder.length-1} className="p-1 rounded text-slate-600 hover:text-white disabled:opacity-20 transition-colors"><Icon name="chevron-down" size={14}/></button>
                                    </div>
                                    <div className="col-span-1 text-center">
                                        <input type="text" value={itemDraft[k].emoji} onChange={e => updateItemField(k, 'emoji', e.target.value)} className="w-10 h-10 text-center text-xl bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:border-blue-500" maxLength={2}/>
                                    </div>
                                    <div className="col-span-4"><input type="text" value={itemDraft[k].label} onChange={e => updateItemField(k, 'label', e.target.value)} className="input-base py-2 text-sm font-heavy" placeholder="품목명"/></div>
                                    <div className="col-span-2"><input type="text" value={itemDraft[k].max} onChange={e => updateItemField(k, 'max', parseInt(e.target.value.replace(/[^0-9]/g,''))||1)} className="input-base py-2 text-sm font-heavy text-center"/></div>
                                    <div className="col-span-4">
                                        <div className="relative">
                                            <input type="text" value={itemDraft[k].price} onChange={e => updateItemField(k, 'price', parseInt(e.target.value.replace(/[^0-9]/g,''))||0)} className="input-base py-2 text-sm font-heavy pr-16"/>
                                            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] text-blue-400 font-bold pointer-events-none whitespace-nowrap">{formatKRW(itemDraft[k].price)}</span>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        )}
                        {/* 비고란 안내 문구 — 품목설정 안에 통합 */}
                        <div className="border-t border-slate-800 pt-4 space-y-2">
                            <label className="text-xs text-slate-500 font-heavy uppercase flex items-center gap-2"><Icon name="message-square" size={14}/> 비고란 안내 문구</label>
                            <div className="flex gap-3 items-center">
                                <input type="text" value={notePlaceholder} onChange={e=>setNotePlaceholder(e.target.value)} className="input-base font-bold flex-1 py-2 text-sm" placeholder="특이사항 기재" maxLength={60}/>
                            </div>
                        </div>
                        <div className="flex gap-3 justify-end pt-1">
                            <button onClick={saveNotePlaceholder} className="btn bg-slate-700 hover:bg-slate-600 text-white px-5 py-2.5 text-sm font-heavy">비고 문구 저장</button>
                            <button onClick={saveItems} disabled={itemSaving} className="btn btn-green px-8 py-2.5 font-heavy shadow-lg flex items-center gap-2 text-sm">
                                <Icon name={itemSaving ? 'loader' : 'save'} size={15}/> {itemSaving ? '저장 중...' : '품목 설정 저장'}
                            </button>
                        </div>
                    </section>

                    {/* 필독 모달 내용 편집 */}
                    <section className="card shadow-2xl space-y-4">
                        <h2 className="text-xl flex items-center gap-3 font-heavy"><Icon name="book-open" className="text-yellow-400"/> 장부 작성 방법 안내 편집</h2>
                        <p className="text-xs text-slate-500 font-bold">각 항목을 줄바꿈으로 구분하여 입력하세요. 저장 즉시 모든 사원의 필독 모달에 반영됩니다.</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-2">
                                <label className="text-xs text-red-400 font-heavy uppercase">⚠️ 유의사항 (줄바꿈으로 구분)</label>
                                <textarea ref={guideWarningsRef} className="input-base font-bold resize-none text-sm" style={{minHeight:'120px', overflow:'hidden'}}
                                    value={guideWarnings} onChange={e=>{ setGuideWarnings(e.target.value); e.target.style.height='auto'; e.target.style.height=e.target.scrollHeight+'px'; }}
                                    placeholder={"유의사항 1줄\n유의사항 2줄\n..."}/>
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs text-blue-400 font-heavy uppercase">① 장부 작성 순서 (줄바꿈으로 구분)</label>
                                <textarea ref={guideStepsRef} className="input-base font-bold resize-none text-sm" style={{minHeight:'120px', overflow:'hidden'}}
                                    value={guideSteps} onChange={e=>{ setGuideSteps(e.target.value); e.target.style.height='auto'; e.target.style.height=e.target.scrollHeight+'px'; }}
                                    placeholder={"순서 1\n순서 2\n..."}/>
                            </div>
                        </div>
                        <div className="flex justify-end">
                            <button onClick={saveGuideContent} className="btn btn-blue px-8 py-2.5 text-sm font-heavy flex items-center gap-2">
                                <Icon name="save" size={15}/> 저장 및 반영
                            </button>
                        </div>
                    </section>

                    </>)}

                    {adminTab === 'members' && (<>

                    {/* 가입 승인 대기 */}
                    {(() => {
                        const pendingUsers = allUsers.filter(u => u.role === ROLES.PENDING);
                        if (pendingUsers.length === 0) return null;
                        return (
                            <div className="card border border-yellow-700/40 bg-yellow-900/10 shadow-xl space-y-3">
                                <h3 className="text-base font-heavy flex items-center gap-2 text-yellow-400"><Icon name="clock" size={18}/> 가입 승인 대기 ({pendingUsers.length}명)</h3>
                                <div className="space-y-2">
                                    {pendingUsers.map(u => (
                                        <div key={u.uid} className="bg-slate-950 border border-yellow-800/30 rounded-2xl p-4 flex flex-wrap justify-between items-center gap-3">
                                            <div>
                                                <p className="text-base font-heavy text-white">{u.nickname} <span className="text-xs text-slate-500 ml-1">#{u.sn}</span></p>
                                                <p className="text-xs text-yellow-600 font-bold">가입신청 {formatDate(u.joinDate)}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => isAdmin && updateUser(u.uid, {role: ROLES.EMPLOYEE})} className="px-4 py-2 rounded-xl text-xs font-heavy bg-green-600 hover:bg-green-500 text-white transition-all flex items-center gap-1"><Icon name="check" size={13}/> 사원 승인</button>
                                                <button onClick={async () => { if(window.confirm(`${u.nickname}님의 가입을 거절하시겠습니까?`)) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid)); }} className="px-4 py-2 rounded-xl text-xs font-heavy bg-red-600/15 hover:bg-red-600 text-red-400 hover:text-white border border-red-700/30 transition-all flex items-center gap-1"><Icon name="x" size={13}/> 거절</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    })()}

                    {/* 사원 명단 */}
                    <div className="flex items-center justify-between">
                        <h2 className="text-xl text-white flex items-center gap-3 font-heavy"><Icon name="users" className="text-blue-500"/> 사원 명단 관리</h2>
                        {!isAdmin && <span className="text-xs text-slate-500 bg-slate-900 px-3 py-1 rounded-full border border-slate-800">읽기 전용 모드</span>}
                    </div>

                    {(() => {
                        const FILTERS = [
                            { key:'all', label:'전체' }, { key:'사원', label:'사원' },
                            { key:'감사팀', label:'감사팀' }, { key:'관리자', label:'관리자' }, { key:'이벤트용', label:'이벤트용' },
                        ];
                        const filtered = allUsers.filter(u => u.role !== ROLES.PENDING).filter(u => memberFilter === 'all' || u.role === memberFilter).sort((a,b) => a.nickname.localeCompare(b.nickname, 'ko'));
                        return (
                            <div className="space-y-4">
                                <div className="flex flex-wrap gap-1 bg-slate-900 p-1 rounded-xl border border-slate-800 w-fit">
                                    {FILTERS.map(f => (
                                        <button key={f.key} onClick={()=>setMemberFilter(f.key)}
                                            className={`px-4 py-2 rounded-lg text-xs font-heavy transition-all ${memberFilter===f.key ? 'bg-blue-600 text-white' : 'text-slate-500 hover:text-slate-300'}`}>
                                            {f.label}
                                        </button>
                                    ))}
                                </div>
                                <div className="card p-0 overflow-hidden shadow-2xl">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left font-heavy">
                                            <thead className="bg-slate-800/50 text-slate-400 text-[10px] uppercase tracking-widest">
                                                <tr className="border-b border-slate-700">
                                                    <th className="p-4 whitespace-nowrap">고유번호</th>
                                                    <th className="p-4 whitespace-nowrap">닉네임 / 가입일</th>
                                                    <th className="p-4 text-center whitespace-nowrap">비밀번호</th>
                                                    <th className="p-4 text-center whitespace-nowrap">부여 권한</th>
                                                    {isAdmin && <th className="p-4 text-right whitespace-nowrap">제명</th>}
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800 text-white font-heavy">
                                                {filtered.map(u => (
                                                    <tr key={u.uid} className="hover:bg-slate-800/40 transition-colors">
                                                        <td className="p-4"><div className="bg-slate-950 px-3 py-2 rounded-xl border border-slate-800 text-center font-mono text-blue-500 text-base shadow-inner w-fit mx-auto">{u.sn}</div></td>
                                                        <td className="p-4 whitespace-nowrap"><div className="text-base font-black">{u.nickname}</div><div className="text-[10px] text-slate-600 mt-0.5">Joined: {formatDate(u.joinDate)}</div></td>
                                                        <td className="p-4 text-center">
                                                            {u.sn === '0000' ? (
                                                                <div className="flex items-center justify-center bg-slate-950 px-3 py-2 rounded-xl border border-slate-800 w-max mx-auto"><span className="text-base tracking-[0.4em] font-mono text-slate-600">••••</span></div>
                                                            ) : (
                                                                <div className="flex items-center justify-center gap-2 bg-slate-950 px-3 py-2 rounded-xl border border-slate-800 w-max mx-auto">
                                                                    <span className="text-base tracking-[0.4em] font-mono text-slate-400">{showPw[u.uid] ? u.password : '****'}</span>
                                                                    <button onClick={()=>setShowPw({...showPw, [u.uid]: !showPw[u.uid]})} className="text-slate-600 hover:text-white transition-colors"><Icon name={showPw[u.uid] ? 'eye-off' : 'eye'} size={16}/></button>
                                                                </div>
                                                            )}
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            <div className="flex flex-wrap justify-center gap-1.5 max-w-[340px] mx-auto">
                                                                {[ROLES.EMPLOYEE, ROLES.AUDIT, ROLES.ADMIN, ROLES.EVENT].map(role => (
                                                                    <button key={role} onClick={() => isAdmin && updateUser(u.uid, {role})} disabled={!isAdmin}
                                                                        className={`px-3 py-1.5 rounded-xl text-[11px] font-black transition-all ${u.role === role ? getRoleStyles(role) + ' shadow-lg scale-105' : 'bg-slate-950 text-slate-600 border border-slate-800 hover:border-slate-600'} ${!isAdmin ? 'cursor-default' : 'cursor-pointer'}`}>
                                                                        {role}
                                                                    </button>
                                                                ))}
                                                            </div>
                                                        </td>
                                                        {isAdmin && (
                                                            <td className="p-4 text-right">
                                                                <button onClick={async ()=>{if(window.confirm(`${u.nickname}님을 정말 삭제하시겠습니까?`)) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', u.uid));}}
                                                                    disabled={u.sn === '0000'}
                                                                    className={`p-2.5 rounded-xl transition-colors ${u.sn === '0000' ? 'opacity-20 cursor-not-allowed text-slate-700' : 'text-red-900 hover:text-red-500 hover:bg-red-500/10 bg-red-500/5'}`}>
                                                                    <Icon name="trash-2" size={16}/>
                                                                </button>
                                                            </td>
                                                        )}
                                                    </tr>
                                                ))}
                                                {filtered.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-600 font-bold">해당 권한의 사원이 없습니다.</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}

                    </>)}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
