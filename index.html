                                    </div>

                                    <div className="max-h-64 overflow-y-auto space-y-2 pr-1">
                                        {shownRecords.length === 0 ? (
                                            <p className="text-center text-slate-600 text-sm py-6 font-bold">해당 내역이 없습니다.</p>
                                        ) : shownRecords.map(r => {
                                            const itemSummary = auditItemKeys.filter(k=>parseInt(r[k])>0).map(k=>`${auditItems[k].emoji}${r[k]}`).join(' ');
                                            return (
                                            <div key={r.id} className="bg-slate-950 border border-slate-800 rounded-xl p-3 space-y-2">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-slate-400 font-mono text-xs">{formatFullDateTime(r.timestamp)}</span>
                                                    <StatusBadge record={r} />
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <span className="font-heavy text-sm text-white">{r.buyerNickname}</span>
                                                        <span className="text-slate-500 text-xs ml-1">#{r.buyerSn}</span>
                                                    </div>
                                                    <span className="text-blue-400 font-heavy text-sm">{formatKRW(r.totalAmount)}</span>
                                                </div>
                                                {itemSummary && <p className="text-sm tracking-wide">{itemSummary}</p>}
                                                <div className="flex justify-between items-center pt-1 border-t border-slate-800">
                                                    <span className="text-[10px] text-slate-600">감사관: {r.auditorName || '미지정'}</span>
                                                    <button onClick={()=>{ setUserSalesModal(null); setSalesTab('all'); setViewItem({...r}); setEditMemo(r.auditMemo||''); setEditPenalty(r.penaltyPoints||0); }}
                                                        className="px-3 py-1 rounded-lg text-[11px] font-heavy bg-indigo-600/20 hover:bg-indigo-600 text-indigo-400 hover:text-white border border-indigo-700/30 transition-all flex items-center gap-1">
                                                        <Icon name="zoom-in" size={12}/> 상세보기
                                                    </button>
                                                </div>
                                            </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </Modal>
                        );
                    })()}

                    {/* 수동 경고 부여 모달 */}
                    {manualPenaltyUser && (
                        <Modal title={`경고 부여 — ${manualPenaltyUser.nickname}`} onClose={()=>{ setManualPenaltyUser(null); setManualPenaltyReason(""); setManualPenaltyPts(1); }}>
                            <div className="space-y-5 font-heavy">
                                <div className="bg-orange-950/30 border border-orange-700/30 rounded-2xl p-4 flex items-center gap-3">
                                    <Icon name="alert-triangle" className="text-orange-400 flex-shrink-0" size={20}/>
                                    <div>
                                        <p className="text-orange-300 font-heavy text-sm">{manualPenaltyUser.nickname} <span className="text-slate-400 font-bold">#{manualPenaltyUser.sn}</span></p>
                                        <p className="text-[11px] text-orange-500 font-bold">현재 누적 경고: {manualPenaltyUser.warningSum || 0}점</p>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs text-slate-400 uppercase font-heavy">경고 부여 점수</label>
                                    <input type="number" min="1" className="input-base text-2xl font-heavy text-orange-400" value={manualPenaltyPts} onChange={e=>setManualPenaltyPts(parseInt(e.target.value)||1)}/>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs text-red-400 uppercase font-heavy">경고 사유 (필수)</label>
                                    <textarea className="input-base h-28 font-bold" value={manualPenaltyReason} onChange={e=>setManualPenaltyReason(e.target.value)} placeholder="경고 부여 사유를 입력하세요..." />
                                </div>
                                <button onClick={async ()=>{
                                    if(!manualPenaltyReason.trim()) return alert("사유를 입력해 주세요.");
                                    const recId = 'manual_' + Date.now();
                                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', recId), {
                                        sellerUid: manualPenaltyUser.uid, sellerNickname: manualPenaltyUser.nickname, sellerSn: manualPenaltyUser.sn,
                                        buyerNickname: '수동경고', buyerSn: '----', timestamp: new Date().toISOString(),
                                        totalAmount: 0, status: 'completed', auditReason: manualPenaltyReason,
                                        penaltyPoints: manualPenaltyPts, auditorName: user.nickname, auditedAt: new Date().toISOString(),
                                        isManualPenalty: true, auditMemo: '', isEdited: false
                                    });
                                    if(sendNotification) await sendNotification(manualPenaltyUser.uid, manualPenaltyUser.nickname, 'hold', `⚠️ 경고 ${manualPenaltyPts}점이 수동 부여되었습니다. 사유: ${manualPenaltyReason}`, recId);
                                    setManualPenaltyUser(null); setManualPenaltyReason(""); setManualPenaltyPts(1);
                                    showToast(`${manualPenaltyUser.nickname}에게 경고 ${manualPenaltyPts}점 부여 완료`);
                                }} className="btn w-full py-4 text-lg font-heavy" style={{background:'#ea580c',color:'#fff'}}>
                                    <Icon name="alert-triangle" size={18}/> 경고 부여 확정
                                </button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        }
        // --- My Page View ---
        function MyPageView({ user, setUser, showToast }) {
            const [nickname, setNickname] = useState(user.nickname || "");
            const [currentPw, setCurrentPw] = useState("");
            const [newPw, setNewPw]         = useState("");
            const [confirmPw, setConfirmPw] = useState("");
            const [saving, setSaving]       = useState(false);

            const saveNickname = async () => {
                if (!nickname.trim()) return alert("닉네임을 입력해 주세요.");
                if (nickname.trim() === user.nickname) return showToast("변경사항이 없습니다.");
                setSaving(true);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { nickname: nickname.trim() });
                const updated = { ...user, nickname: nickname.trim() };
                setUser(updated);
                localStorage.setItem('seolguk_user_session', JSON.stringify(updated));
                setSaving(false);
                showToast("닉네임이 변경되었습니다.");
            };

            const savePassword = async () => {
                if (!currentPw) return alert("현재 비밀번호를 입력해 주세요.");
                if (currentPw !== user.password) return alert("현재 비밀번호가 일치하지 않습니다.");
                if (!newPw) return alert("새 비밀번호를 입력해 주세요.");
                if (newPw.length > 4) return alert("비밀번호는 4자리 숫자입니다.");
                if (newPw !== confirmPw) return alert("새 비밀번호와 확인이 일치하지 않습니다.");
                setSaving(true);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { password: newPw });
                const updated = { ...user, password: newPw };
                setUser(updated);
                localStorage.setItem('seolguk_user_session', JSON.stringify(updated));
                setCurrentPw(""); setNewPw(""); setConfirmPw("");
                setSaving(false);
                showToast("비밀번호가 변경되었습니다.");
            };

            return (
                <div className="space-y-6 max-w-lg">
                    <div className="flex items-center gap-3 mb-2">
                        <div className="bg-blue-600/15 p-3 rounded-2xl"><Icon name="user-cog" className="text-blue-400" size={28}/></div>
                        <div>
                            <h1 className="text-2xl font-heavy">내 설정</h1>
                            <p className="text-sm text-slate-500 font-bold">{user.role} · #{user.sn}</p>
                        </div>
                    </div>

                    {/* 닉네임 변경 */}
                    <div className="card shadow-xl space-y-4">
                        <h2 className="text-lg font-heavy flex items-center gap-2"><Icon name="pencil" className="text-blue-400" size={18}/> 닉네임 변경</h2>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">현재 닉네임</label>
                            <div className="bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-400 font-bold text-sm">{user.nickname}</div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">새 닉네임</label>
                            <input
                                className="input-base font-bold"
                                value={nickname}
                                onChange={e => setNickname(e.target.value)}
                                placeholder="변경할 닉네임 입력"
                                maxLength={20}
                            />
                        </div>
                        <button onClick={saveNickname} disabled={saving} className="btn btn-blue w-full py-3 font-heavy">
                            <Icon name="check" size={16}/> 닉네임 저장
                        </button>
                    </div>

                    {/* 비밀번호 변경 */}
                    <div className="card shadow-xl space-y-4">
                        <h2 className="text-lg font-heavy flex items-center gap-2"><Icon name="lock" className="text-indigo-400" size={18}/> 비밀번호 변경</h2>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">현재 비밀번호</label>
                            <input
                                type="password"
                                maxLength={4}
                                className="input-base font-heavy text-center text-2xl tracking-[0.5em]"
                                value={currentPw}
                                onChange={e => setCurrentPw(e.target.value)}
                                placeholder="••••"
                            />
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">새 비밀번호 (숫자 4자리)</label>
                            <input
                                type="password"
                                maxLength={4}
                                className="input-base font-heavy text-center text-2xl tracking-[0.5em]"
                                value={newPw}
                                onChange={e => setNewPw(e.target.value)}
                                placeholder="••••"
                            />
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">새 비밀번호 확인</label>
                            <input
                                type="password"
                                maxLength={4}
                                className={`input-base font-heavy text-center text-2xl tracking-[0.5em] ${confirmPw && newPw !== confirmPw ? 'border-red-500 ring-2 ring-red-500/20' : confirmPw && newPw === confirmPw ? 'border-green-500 ring-2 ring-green-500/20' : ''}`}
                                value={confirmPw}
                                onChange={e => setConfirmPw(e.target.value)}
                                placeholder="••••"
                            />
                            {confirmPw && newPw !== confirmPw && <p className="text-xs text-red-400 font-bold pl-1">비밀번호가 일치하지 않습니다.</p>}
                            {confirmPw && newPw === confirmPw && <p className="text-xs text-green-400 font-bold pl-1">비밀번호가 일치합니다.</p>}
                        </div>
                        <button onClick={savePassword} disabled={saving || (confirmPw && newPw !== confirmPw)} className="btn btn-indigo w-full py-3 font-heavy disabled:opacity-50">
                            <Icon name="lock" size={16}/> 비밀번호 변경
                        </button>
                    </div>
                </div>
            );
        }

        function RankingView({ records, allUsers, config }) {
            const [weekOffset, setWeekOffset] = useState(0);

            const weekRange = useMemo(() => {
                const now = new Date();
                now.setDate(now.getDate() + (weekOffset * 7));
                const day = now.getDay();
                const startDay = config?.weekStartDay ?? 1;
                const diff = (day < startDay) ? (day + 7 - startDay) : (day - startDay);
                const start = new Date(now);
                start.setDate(now.getDate() - diff); start.setHours(0,0,0,0);
                const end = new Date(start);
                end.setDate(start.getDate() + 6); end.setHours(23,59,59,999);
                return { start, end };
            }, [weekOffset, config]);

            const isCurrentWeek = weekOffset === 0;
            const weekLabel = isCurrentWeek ? '이번 주' : weekOffset === -1 ? '지난 주' : `${Math.abs(weekOffset)}주 전`;

            const data = useMemo(() => {
                const excludeUids = new Set(
                    allUsers.filter(u => u.role === ROLES.EVENT || u.role === ROLES.PENDING).map(u => u.uid)
                );
                const s = {};
                records
                    .filter(r => {
                        if (excludeUids.has(r.sellerUid)) return false;
                        if (r.status === 'pending' && r.auditReason) return false;
                        const d = new Date(r.timestamp);
                        return d >= weekRange.start && d <= weekRange.end;
                    })
                    .forEach(r => {
                        const key = r.sellerUid;
                        if (!s[key]) s[key] = { name: r.sellerNickname, sn: r.sellerSn, count: 0, total: 0, deposit: 0 };
                        s[key].count++;
                        s[key].total += r.totalAmount || 0;
                        s[key].deposit += (r.totalAmount || 0) * 0.5;
                    });
                return Object.values(s).sort((a, b) => b.count - a.count);
            }, [records, allUsers, weekRange]);

            const podium = [data[1], data[0], data[2]];

            return (
                <div className="space-y-8 font-bold">
                    <div className="text-center space-y-3 py-4">
                        <div className="inline-block bg-yellow-500/10 p-4 rounded-2xl mb-2 animate-pulse font-heavy"><Icon name="award" size={48} className="text-yellow-500"/></div>
                        <h2 className="text-3xl text-white font-heavy uppercase tracking-tighter italic">설국 판매 명예의 전당</h2>
                        <div className="flex items-center justify-center gap-4 mt-2">
                            <button onClick={()=>setWeekOffset(w=>w-1)} className="p-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white transition-all"><Icon name="chevron-left" size={20}/></button>
                            <div className="flex items-center gap-2 bg-slate-900 border border-slate-800 rounded-2xl px-6 py-2.5 min-w-[240px] justify-center">
                                <span className={`text-sm font-heavy ${isCurrentWeek ? 'text-blue-400' : 'text-slate-400'}`}>{weekLabel}</span>
                                <span className="text-slate-600 text-xs font-bold">{weekRange.start.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})} ~ {weekRange.end.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}</span>
                            </div>
                            <button onClick={()=>setWeekOffset(w=>Math.min(w+1,0))} disabled={isCurrentWeek} className={`p-2 rounded-xl transition-all ${isCurrentWeek ? 'opacity-30 cursor-not-allowed bg-slate-800 text-slate-600' : 'bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white'}`}><Icon name="chevron-right" size={20}/></button>
                        </div>
                    </div>
                    {data.length === 0 ? (
                        <div className="card text-center py-16 text-slate-500 font-bold"><Icon name="inbox" size={40} className="mx-auto mb-3 opacity-30"/><p>{weekLabel} 판매 기록이 없습니다.</p></div>
                    ) : (<>
                        <div className="flex flex-wrap justify-center items-end gap-4 md:gap-8 pb-6 font-heavy">
                            {podium.map((item, i) => {
                                if (!item) return <div key={i} className="w-full max-w-[180px]"/>;
                                const cfgs = [
                                    { color:'border-slate-400', bg:'bg-slate-400/5', h:'h-44', rank:'2위', icon:'🥈', textColor:'text-slate-400' },
                                    { color:'border-yellow-500', bg:'bg-yellow-500/8', h:'h-56', rank:'1위', icon:'👑', textColor:'text-yellow-500' },
                                    { color:'border-amber-700', bg:'bg-amber-700/5', h:'h-40', rank:'3위', icon:'🥉', textColor:'text-amber-700' },
                                ];
                                const cfg = cfgs[i];
                                return (
                                    <div key={i} className={`w-full max-w-[180px] ${cfg.h} ${cfg.bg} border-t-4 ${cfg.color} rounded-t-3xl flex flex-col items-center justify-center relative shadow-xl transition-all hover:-translate-y-1`}>
                                        <div className="absolute -top-6 text-4xl">{cfg.icon}</div>
                                        <span className={`text-2xl mb-1 italic font-black ${cfg.textColor}`}>{cfg.rank}</span>
                                        <span className="text-base text-white font-heavy truncate w-full text-center px-2">{item.name}</span>
                                        <span className="text-[10px] opacity-40 font-mono">#{item.sn}</span>
                                        <span className="text-xs text-blue-400 font-heavy mt-1">{item.count}건</span>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="card p-0 overflow-hidden shadow-2xl">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left font-heavy">
                                    <thead className="bg-slate-800/50 text-slate-500 text-[10px] uppercase tracking-widest">
                                        <tr className="border-b border-slate-800">
                                            <th className="px-5 py-4 whitespace-nowrap">순위</th>
                                            <th className="px-5 py-4 whitespace-nowrap">사원명</th>
                                            <th className="px-5 py-4 text-center whitespace-nowrap">판매건수</th>
                                            <th className="px-5 py-4 text-right whitespace-nowrap">총 매출</th>
                                            <th className="px-5 py-4 text-right whitespace-nowrap">총 입금액</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800 text-white font-heavy">
                                        {data.map((item, idx) => (
                                            <tr key={idx} className={`transition-colors ${idx<3?'hover:bg-yellow-900/5':'hover:bg-slate-800/50'}`}>
                                                <td className="px-5 py-4 whitespace-nowrap"><div className={`w-9 h-9 rounded-xl flex items-center justify-center font-heavy text-sm ${idx===0?'bg-yellow-500 text-black shadow-lg':idx===1?'bg-slate-400 text-black':idx===2?'bg-amber-700 text-white':'bg-slate-800 text-slate-500'}`}>{idx+1}</div></td>
                                                <td className="px-5 py-4 whitespace-nowrap"><div className="font-heavy text-base">{item.name}</div><div className="text-[10px] text-slate-600 font-bold">#{item.sn}</div></td>
                                                <td className="px-5 py-4 text-center whitespace-nowrap"><span className="text-blue-400 font-black text-2xl">{item.count}</span><span className="text-[10px] text-slate-600 ml-1 uppercase font-bold">건</span></td>
                                                <td className="px-5 py-4 text-right font-heavy text-base whitespace-nowrap">{formatKRW(item.total)}</td>
                                                <td className="px-5 py-4 text-right text-blue-400 font-heavy text-base whitespace-nowrap">{formatKRW(item.deposit)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </>)}
                </div>
            );
        }

        // --- Audit Blacklist Tab ---
        function AuditBlacklistTab({ blacklist, user, showToast }) {
            const [blForm, setBlForm] = useState({ buyerSn:'', buyerNickname:'', reason:'', startDate:'', endDate:'' });
            const [blSaving, setBlSaving] = useState(false);
            const [releaseModal, setReleaseModal] = useState(null);
            const [releaseReason, setReleaseReason] = useState('');

            const now = new Date();
            const active   = (blacklist||[]).filter(b => !b.releasedAt && new Date(b.endDate) >= now);
            const expired  = (blacklist||[]).filter(b => !b.releasedAt && new Date(b.endDate) < now);
            const released = (blacklist||[]).filter(b => b.releasedAt);

            const formDays = calcDays(blForm.startDate, blForm.endDate);

            const saveBlacklist = async () => {
                if (!blForm.buyerSn || !blForm.buyerNickname || !blForm.reason || !blForm.startDate || !blForm.endDate)
                    return alert('모든 항목을 입력하세요.');
                setBlSaving(true);
                const id = 'bl_' + Date.now();
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'blacklist', id), {
                    ...blForm, registeredBy: user.nickname, createdAt: new Date().toISOString()
                });
                setBlForm({ buyerSn:'', buyerNickname:'', reason:'', startDate:'', endDate:'' });
                setBlSaving(false);
                showToast('블랙리스트에 등재되었습니다.');
            };

            const doRelease = async () => {
                if (!releaseReason.trim()) return alert('해제 사유를 입력하세요.');
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'blacklist', releaseModal.id), {
                    releasedAt: new Date().toISOString(),
                    releasedBy: user.nickname,
                    releaseReason: releaseReason.trim(),
                });
                setReleaseModal(null); setReleaseReason('');
                showToast('블랙리스트가 해제되었습니다.');
            };

            const deleteBlacklist = async (b) => {
                if (!window.confirm(`${b.buyerNickname}(#${b.buyerSn})의 블랙리스트 기록을 완전히 삭제하시겠습니까?\n삭제 후 복구할 수 없습니다.`)) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'blacklist', b.id));
                showToast('블랙리스트 기록이 삭제되었습니다.');
            };


            return (
                <div className="space-y-6">
                    {/* 등록 폼 */}
                    <div className="card shadow-2xl border border-red-900/30 space-y-5">
                        <h3 className="text-lg font-heavy text-red-400 flex items-center gap-2"><Icon name="shield-off" size={18}/> 블랙리스트 등재</h3>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-1.5">
                                <label className="text-xs text-slate-500 font-heavy uppercase">닉네임</label>
                                <input type="text" className="input-base font-bold" value={blForm.buyerNickname}
                                    onChange={e=>setBlForm({...blForm, buyerNickname:e.target.value})} placeholder="구매자 닉네임"/>
                            </div>
                            <div className="space-y-1.5">
                                <label className="text-xs text-slate-500 font-heavy uppercase">고유번호</label>
                                <input type="text" className="input-base font-bold" value={blForm.buyerSn}
                                    onChange={e=>setBlForm({...blForm, buyerSn:e.target.value.replace(/[^0-9]/g,'')})} placeholder="0000"/>
                            </div>
                            <div className="space-y-1.5">
                                <label className="text-xs text-slate-500 font-heavy uppercase">시작일</label>
                                <input type="date" className="input-base font-bold" value={blForm.startDate}
                                    onChange={e=>setBlForm({...blForm, startDate:e.target.value})}/>
                            </div>
                            <div className="space-y-1.5">
                                <label className="text-xs text-slate-500 font-heavy uppercase">종료일</label>
                                <input type="date" className="input-base font-bold" value={blForm.endDate}
                                    onChange={e=>setBlForm({...blForm, endDate:e.target.value})}/>
                            </div>
                            <div className="col-span-2">
                                <div className={`rounded-xl px-4 py-3 border text-center font-heavy ${formDays ? 'bg-red-900/20 border-red-700/30 text-red-300' : 'bg-slate-900 border-slate-800 text-slate-600'}`}>
                                    {formDays ? `🚫 총 ${formDays}일 제재` : '시작일과 종료일을 입력하면 기간이 표시됩니다'}
                                </div>
                            </div>
                        </div>
                        <div className="space-y-1.5">
                            <label className="text-xs text-slate-500 font-heavy uppercase">등재 사유</label>
                            <textarea className="input-base font-bold h-24 resize-none" value={blForm.reason}
                                onChange={e=>setBlForm({...blForm, reason:e.target.value})}
                                placeholder="블랙리스트 등재 사유를 상세히 기재하세요."/>
                        </div>
                        <button onClick={saveBlacklist} disabled={blSaving}
                            className="btn bg-red-700 hover:bg-red-600 text-white w-full py-3.5 font-heavy flex items-center justify-center gap-2">
                            <Icon name={blSaving?'loader':'shield-off'} size={16}/>
                            {blSaving ? '등재 중...' : '블랙리스트 등재'}
                        </button>
                    </div>

                    {/* 활성 */}
                    <div className="space-y-3">
                        <h3 className="text-sm font-heavy text-red-400 uppercase tracking-widest flex items-center gap-2"><Icon name="alert-circle" size={14}/> 현재 적용 중 ({active.length}명)</h3>
                        {active.length === 0
                            ? <div className="card text-center py-8 text-slate-600 font-bold">현재 블랙리스트 등재 고객이 없습니다.</div>
                            : active.map(b => <BLCard key={b.id} b={b} showRelease={true} onRelease={entry=>{ setReleaseModal(entry); setReleaseReason(''); }} onDelete={deleteBlacklist}/>)}
                    </div>

                    {/* 만료 */}
                    {expired.length > 0 && (
                        <div className="space-y-2">
                            <h3 className="text-sm font-heavy text-slate-600 uppercase tracking-widest">기간 만료 ({expired.length}명)</h3>
                            {expired.map(b => <BLCard key={b.id} b={b} showRelease={false} onDelete={deleteBlacklist}/>)}
                        </div>
                    )}

                    {/* 해제된 기록 */}
                    {released.length > 0 && (
                        <div className="space-y-2">
                            <h3 className="text-sm font-heavy text-green-700 uppercase tracking-widest flex items-center gap-2"><Icon name="unlock" size={13}/> 해제된 블랙리스트 ({released.length}명)</h3>
                            {released.map(b => <BLCard key={b.id} b={b} showRelease={false} onDelete={deleteBlacklist}/>)}
                        </div>
                    )}

                    {/* 해제 모달 */}
                    {releaseModal && (
                        <Modal title="🔓 블랙리스트 해제" onClose={()=>{setReleaseModal(null);setReleaseReason('');}}>
                            <div className="space-y-5 font-heavy">
                                <div className="bg-slate-900 rounded-2xl p-4 border border-slate-800 space-y-1">
                                    <p className="text-white font-heavy">{releaseModal.buyerNickname} <span className="text-slate-500 text-sm">#{releaseModal.buyerSn}</span></p>
                                    <p className="text-red-400 text-xs">{releaseModal.startDate} ~ {releaseModal.endDate}</p>
                                    <p className="text-slate-400 text-sm">{releaseModal.reason}</p>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs text-slate-500 font-heavy uppercase">해제 사유 (필수)</label>
                                    <textarea className="input-base font-bold h-24 resize-none" value={releaseReason}
                                        onChange={e=>setReleaseReason(e.target.value)}
                                        placeholder="예) 해제 비용 납부 완료 / 피해 당사자 합의 등"/>
                                </div>
                                <button onClick={doRelease} className="btn bg-green-700 hover:bg-green-600 text-white w-full py-4 font-heavy flex items-center justify-center gap-2">

                                </button>
