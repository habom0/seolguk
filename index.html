        const { useState, useEffect, useMemo } = React;

        };

        const fbApp = initializeApp(firebaseConfig);
        const db = getFirestore(fbApp);
        const auth = getAuth(fbApp);
        const appId = "seolguk-intranet-v1";

        const DEFAULT_ITEMS = {
            fullpack:  { label: '풀패키지',   max: 1,   emoji: '📦', price: 6400000000 },
            painkiller:{ label: '진통제',     max: 200, emoji: '💊', price: 3500000    },
            honeyjelly:{ label: '꿀젤리',     max: 30,  emoji: '🧸', price: 80000000   },
            honeystick:{ label: '꿀스틱',     max: 30,  emoji: '🍯', price: 80000000   },
            parachute: { label: '낙하산',     max: 20,  emoji: '🪂', price: 5000000    },
            elixir:    { label: '파워 엘릭서', max: 200, emoji: '🏺', price: 4000000    },
        };
        // 기본 순서: 풀패키지, 꿀젤리, 꿀스틱, 진통제, 낙하산, 엘릭서
        const DEFAULT_ORDER = ['fullpack', 'honeyjelly', 'honeystick', 'painkiller', 'parachute', 'elixir'];

        // 하위 호환 유지용 상수 (직접 참조하는 곳 제거 후 삭제 가능)
        const PRICES    = Object.fromEntries(Object.entries(DEFAULT_ITEMS).map(([k,v])=>[k, v.price]));
        const ITEM_INFO = Object.fromEntries(Object.entries(DEFAULT_ITEMS).map(([k,v])=>[k, { label:v.label, max:v.max, emoji:v.emoji, desc:'' }]));

        // items 반환 — itemOrder 배열이 있으면 그 순서 사용, 없으면 DEFAULT_ORDER
        const getEffectiveItems = (config) => {
            const items = config?.items || DEFAULT_ITEMS;
            const order = config?.itemOrder || DEFAULT_ORDER;
            // order 배열 순서대로 정렬된 객체 반환 (누락된 키는 뒤에 추가)
            const allKeys = [...order.filter(k => items[k]), ...Object.keys(items).filter(k => !order.includes(k))];
            const sorted = {};
            allKeys.forEach(k => { if (items[k]) sorted[k] = items[k]; });
            return sorted;
        };
        const ROLES = { PENDING: '가입신청', EMPLOYEE: '사원', AUDIT: '감사팀', ADMIN: '관리자', EVENT: '이벤트용' };
        const ACTIVE_ROLES = ['사원', '감사팀', '관리자'];
        const WEEK_DAYS = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

        // ── 공통 className 상수 ──
        const CX = {
            tdBase:   'p-4 whitespace-nowrap',
            tdCenter: 'p-4 text-center whitespace-nowrap',
            tdRight:  'p-4 text-right whitespace-nowrap',
            label:    'text-xs text-slate-500 font-heavy uppercase',
            cardBorder: 'rounded-xl border border-slate-800',
            cardDark:   'bg-slate-900 border border-slate-800 rounded-xl',
            inputRow:   'flex gap-3 items-center',
        };

        const copyToClipboard = (text) => {
            const fallback = () => {
                const el = document.createElement('textarea');
                el.value = text; el.style.position = 'fixed'; el.style.opacity = '0';
                document.body.appendChild(el); el.select();
                document.execCommand('copy'); document.body.removeChild(el);
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).catch(() => fallback());
            } else {
                fallback();
            }
        };

        const formatKRW = (amount) => {
            if (amount === 0) return "0원";
            const eok = Math.floor(amount / 100000000);
            const remain = amount % 100000000;
            const man = Math.floor(remain / 10000);
            let result = "";
            if (eok > 0) result += `${eok}억 `;
            if (man > 0) result += (man >= 1000) ? `${man / 1000}천` : `${man.toLocaleString()}만`;
            return result.trim() || "0원";
        };

        const formatDate = (isoString) => {
            if (!isoString) return "-";
            const d = new Date(isoString);
            return `${String(d.getFullYear()).slice(2)}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        const formatFullDateTime = (isoString) => {
            if (!isoString) return "-";
            const d = new Date(isoString);
            return `${String(d.getFullYear()).slice(2)}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const Modal = ({ title, children, onClose }) => {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, [onClose]);
            return (
                <div className="modal-overlay animate-fade-in" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="card w-full max-w-2xl max-h-[90vh] overflow-y-auto relative shadow-2xl border-slate-700">
                        <button onClick={onClose} className="absolute top-6 right-6 text-slate-500 hover:text-white transition-colors"><Icon name="x" size={24}/></button>
                        <h3 className="text-2xl font-heavy mb-6 flex items-center gap-2">{title}</h3>
                        {children}
                    </div>
                </div>
            );
        };

        const StatusBadge = ({ record }) => {
            let label = "";
            let colorClass = "";
            
            if (record.status === 'completed') {
                if (record.auditReason) {
                    label = "보류 후 완료";
                    colorClass = "bg-yellow-500/25 text-yellow-400 border border-yellow-600/30";
                } else {
                    label = "감사완료";
                    colorClass = "bg-green-500/20 text-green-400 border border-green-600/30";
                }
            } else if (record.status === 'pending') {
                if (record.auditReason) {
                    label = "보류";
                    colorClass = "bg-red-500/20 text-red-400 border border-red-600/30";
                } else {
                    label = "감사대기";
                    colorClass = "bg-slate-500/20 text-slate-400 border border-slate-600/30";
                }
            }
            
            return <span className={`badge ${colorClass}`}>{label}</span>;
        };


        const calcDays = (start, end) => {
            if (!start || !end) return null;
            const d = Math.round((new Date(end) - new Date(start)) / 86400000) + 1;
            return d > 0 ? d : null;
        };
        // ── 블랙리스트 카드 (공통) ──
        const BLCard = ({ b, showRelease, onRelease, onDelete }) => {
            const days = calcDays(b.startDate, b.endDate);
            return (
                <div className={`card space-y-2 ${showRelease ? 'border border-red-800/40 bg-red-950/15' : 'border border-slate-800 opacity-60'}`}>
                    <div className="flex flex-wrap justify-between items-start gap-2">
                        <div className="flex items-center gap-2">
                            <Icon name="shield-off" size={15} className={showRelease ? 'text-red-500' : 'text-slate-600'}/>
                            <span className={`font-heavy text-base ${showRelease ? 'text-white' : 'text-slate-400'}`}>{b.buyerNickname}</span>
                            <span className="text-slate-500 text-xs">#{b.buyerSn}</span>
                        </div>
                        <div className="flex items-center gap-2 flex-wrap">
                            <span className={`text-xs font-heavy px-2.5 py-1 rounded-xl border ${showRelease ? 'bg-red-900/30 border-red-700/30 text-red-400' : 'bg-slate-800 border-slate-700 text-slate-500'}`}>
                                {b.startDate} ~ {b.endDate}{days ? ` (${days}일)` : ''}
                            </span>
                            {showRelease && onRelease && (
                                <button onClick={()=>onRelease(b)}
                                    className="px-3 py-1.5 bg-green-900/20 hover:bg-green-700/30 text-green-400 border border-green-700/30 rounded-xl text-xs font-heavy flex items-center gap-1 transition-all">
                                    <Icon name="unlock" size={12}/> 해제
                                </button>
                            )}
                            {onDelete && (
                                <button onClick={()=>onDelete(b)}
                                    className="px-3 py-1.5 bg-red-900/20 hover:bg-red-700/30 text-red-500 border border-red-700/20 rounded-xl text-xs font-heavy flex items-center gap-1 transition-all">
                                    <Icon name="trash-2" size={12}/> 삭제
                                </button>
                            )}
                        </div>
                    </div>
                    <p className={`text-sm font-bold leading-relaxed pl-5 ${showRelease ? 'text-slate-300' : 'text-slate-600'}`}>{b.reason}</p>
                    {b.releasedAt && (
                        <div className="pl-5 flex items-center gap-2 text-xs text-green-600 font-bold">
                            <Icon name="unlock" size={11}/> 해제: {b.releasedBy} — {b.releaseReason} ({formatDate(b.releasedAt)})
                        </div>
                    )}
                    <p className="text-[10px] text-slate-700 font-bold pl-5">등록: {b.registeredBy} · {formatDate(b.createdAt)}</p>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [fbUser, setFbUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [records, setRecords] = useState([]);
            const [allUsers, setAllUsers] = useState([]);
            const [blacklist, setBlacklist] = useState([]);
            const [config, setConfig] = useState({ weekStartDay: 1, eventNotice: "" }); 
            const [weekOffset, setWeekOffset] = useState(0);
            const [authMode, setAuthMode] = useState('login');
            const [isInitialLoading, setIsInitialLoading] = useState(true);
            const [toast, setToast] = useState("");
            const [darkMode, setDarkMode] = useState(true);
            const [notifications, setNotifications] = useState([]);
            const [showNotifModal, setShowNotifModal] = useState(false);
            const [pendingEditRecordId, setPendingEditRecordId] = useState(null);

            useEffect(() => {
                if (darkMode) { document.body.classList.remove('light-mode'); }
                else { document.body.classList.add('light-mode'); }
            }, [darkMode]);

            useEffect(() => {
                const initFb = async () => { await signInAnonymously(auth); };
                initFb();
                const unsubscribeAuth = onAuthStateChanged(auth, (firebaseUser) => {
                    setFbUser(firebaseUser);
                    const savedUser = JSON.parse(localStorage.getItem('seolguk_user_session'));
                    if (savedUser) setUser(savedUser);
                });
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!fbUser) return;
                const usersCol = collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const unsubUsers = onSnapshot(usersCol, (snap) => {
                    const list = snap.docs.map(doc => ({ uid: doc.id, ...doc.data() }));
                    setAllUsers(list);
                    if (user) {
                        const updated = list.find(u => u.uid === user.uid);
                        if (updated) {
                            setUser(updated);
                            localStorage.setItem('seolguk_user_session', JSON.stringify(updated));
                        }
                    }
                });
                const recordsCol = collection(db, 'artifacts', appId, 'public', 'data', 'records');
                const unsubRecords = onSnapshot(recordsCol, (snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                                    .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                    setRecords(list);
                });
                const blacklistCol = collection(db, 'artifacts', appId, 'public', 'data', 'blacklist');
                const unsubBlacklist = onSnapshot(blacklistCol, (snap) => {
                    setBlacklist(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)));
                });
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                const unsubConfig = onSnapshot(configDoc, (snap) => {
                    if (snap.exists()) setConfig(snap.data());
                    else setDoc(configDoc, { weekStartDay: 1, eventNotice: "" });
                    setIsInitialLoading(false);
                });
                // 알림 구독 — 로그인한 유저의 알림만 실시간 수신
                const savedUser = JSON.parse(localStorage.getItem('seolguk_user_session'));
                let unsubNotif = () => {};
                if (savedUser) {
                    const notifCol = collection(db, 'artifacts', appId, 'public', 'data', 'notifications');
                    unsubNotif = onSnapshot(notifCol, (snap) => {
                        const list = snap.docs
                            .map(d => ({ id: d.id, ...d.data() }))
                            .filter(n => n.toUid === savedUser.uid)
                            .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                        setNotifications(list);
                    });
                }
                return () => { unsubUsers(); unsubRecords(); unsubConfig(); unsubNotif(); unsubBlacklist(); };
            }, [fbUser]);

            const weekRange = useMemo(() => {
                const now = new Date();
                now.setDate(now.getDate() + (weekOffset * 7));
                const day = now.getDay();
                const diff = (day < config.weekStartDay) ? (day + 7 - config.weekStartDay) : (day - config.weekStartDay);
                const start = new Date(now);
                start.setDate(now.getDate() - diff); start.setHours(0,0,0,0);
                const end = new Date(start);
                end.setDate(start.getDate() + 6); end.setHours(23,59,59,999);
                return { start, end };
            }, [weekOffset, config.weekStartDay]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(""), 2000);
            };

            const sendNotification = async (toUid, toNickname, type, message, recordId) => {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'notifications'), {
                    toUid, toNickname, type, message, recordId,
                    createdAt: new Date().toISOString(), read: false
                });
            };

            const markNotifRead = async (notifId) => {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notifications', notifId), { read: true });
            };

            const deleteNotif = async (notifId) => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'notifications', notifId));
            };

            const unreadCount = notifications.filter(n => !n.read).length;

            if (isInitialLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#020617] text-white">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-blue-500 mx-auto mb-4"></div>
                            <p className="font-heavy text-slate-500">데이터 로딩 중...</p>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="card login-card w-full max-w-md shadow-2xl border-slate-800 text-center font-bold">
                            <div className="text-6xl mb-4">❄️</div>
                            <h1 className="text-3xl font-heavy mb-1">설국 인트라넷</h1>
                            <p className="text-blue-400 text-xs font-heavy mb-8">ver.3.2</p>
                            <div className="flex justify-center gap-6 mb-8 text-lg border-b border-slate-800">
                                {['login', 'signup', 'changepw'].map(m => (
                                    <button key={m} onClick={()=>setAuthMode(m)} className={`pb-2 px-1 transition-all ${authMode === m ? 'text-blue-500 border-b-2 border-blue-500' : 'text-slate-500 hover:text-slate-300'}`}>
                                        {m === 'login' ? '로그인' : m === 'signup' ? '가입신청' : '비번변경'}
                                    </button>
                                ))}
                            </div>
                            <form className="space-y-4" onSubmit={async (e) => {
                                e.preventDefault();
                                const fd = new FormData(e.target);
                                const sn = fd.get('sn');
                                const pw = fd.get('password');
                                if (authMode === 'login') {
                                    const found = allUsers.find(u => u.sn === sn && u.password === pw);
                                    if (found) {
                                        setUser(found);
                                        localStorage.setItem('seolguk_user_session', JSON.stringify(found));
                                    } else {
                                        alert('정보가 올바르지 않습니다.');
                                    }
                                } else if (authMode === 'signup') {
                                    if (allUsers.find(u => u.sn === sn)) return alert('이미 등록된 번호입니다.');
                                    const uid = 'u_' + Date.now();
                                    const newUser = { sn, nickname: fd.get('nickname'), password: pw, role: sn === '0000' ? ROLES.ADMIN : ROLES.PENDING, joinDate: new Date().toISOString() };
                                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid), newUser);
                                    alert('가입 신청 완료! 관리자 승인을 기다려주세요.'); setAuthMode('login');
                                } else {
                                    const oldPw = fd.get('oldPassword');
                                    const targetUser = allUsers.find(u => u.sn === sn && u.password === oldPw);
                                    if (!targetUser) return alert('기존 정보가 일치하지 않습니다.');
                                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', targetUser.uid), { password: pw });
                                    alert('비밀번호 변경 완료!'); setAuthMode('login');
                                }
                            }}>
                                <input name="sn" placeholder="고유번호" className="input-base text-center font-bold" required />
                                {authMode === 'signup' && <input name="nickname" placeholder="닉네임" className="input-base text-center font-bold" required />}
                                {authMode === 'changepw' && <input name="oldPassword" type="password" placeholder="기존 비밀번호" className="input-base text-center font-bold" required />}
                                <input name="password" type="password" maxLength="4" placeholder="비밀번호 (숫자 4자리)" className="input-base text-center font-bold" required />
                                <button className="btn btn-blue w-full py-4 text-xl font-heavy shadow-blue-900/40 shadow-lg">입장하기</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // 가입신청 대기 화면
            if (user && user.role === ROLES.PENDING) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'#020617'}}>
                        <div className="card login-card w-full max-w-md shadow-2xl text-center space-y-6">
                            <div className="text-6xl">⏳</div>
                            <h2 className="text-2xl font-heavy text-white">가입 승인 대기 중</h2>
                            <p className="text-slate-400 font-bold leading-relaxed">
                                <span className="text-blue-400 font-heavy">{user.nickname}</span>님의 가입 승인 요청을 관리자가 확인 중입니다.<br/>
                                승인 완료 후 다시 로그인해 주세요.
                            </p>
                            <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 text-left space-y-1">
                                <p className="text-xs text-slate-500 uppercase font-bold">가입 정보</p>
                                <p className="text-sm text-white font-heavy">닉네임: {user.nickname}</p>
                                <p className="text-sm text-white font-heavy">고유번호: {user.sn}</p>
                            </div>
                            <button onClick={()=>{setUser(null); localStorage.removeItem('seolguk_user_session');}} className="btn btn-red w-full py-3 font-heavy">로그아웃</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="app-shell">
                    {toast && <div className="copy-toast font-heavy"><Icon name="check" className="inline mr-2"/> {toast}</div>}

                    {/* ── 모바일 상단바 ── */}
                    <div className="mobile-topbar">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-1.5 rounded-lg text-sm">❄️</div>
                            <div>
                                <span className="font-heavy text-white text-sm uppercase tracking-tight">설국 인트라넷</span>
                                <span className="ml-1.5 text-[9px] text-blue-400 font-heavy bg-blue-500/15 px-1.5 py-0.5 rounded-md border border-blue-500/30">ver.3.2</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={()=>setDarkMode(!darkMode)} className="p-2 rounded-lg text-slate-400 hover:text-white transition-all">
                                <Icon name={darkMode ? 'sun' : 'moon'} size={18}/>
                            </button>
                            <button onClick={()=>setShowNotifModal(true)} className="relative p-2 rounded-lg text-slate-400 hover:text-white transition-all">
                                <Icon name="bell" size={18}/>
                                {unreadCount > 0 && <span className="notif-dot"/>}
                            </button>
                        </div>
                    </div>

                    {/* ── 사이드바 (PC/태블릿) ── */}
                    <nav className="sidebar lm-nav">
                        <div className="flex items-center gap-3 py-4 px-1 mb-2">
                            <div className="bg-blue-600 p-2 rounded-xl text-base">❄️</div>
                            <div>
                                <div className="font-heavy text-white text-base uppercase tracking-tight">설국 인트라넷</div>
                                <div className="text-[9px] text-blue-400 font-heavy bg-blue-500/10 px-1.5 py-0.5 rounded-md border border-blue-500/20 w-fit mt-0.5">ver.3.2</div>
                            </div>
                        </div>
                        <div className="flex-1 space-y-1">
                            <NavItem active={activeTab==='dashboard'} onClick={()=>setActiveTab('dashboard')} icon="layout-dashboard" label="대시보드" />
                            <NavItem active={activeTab==='ledger'} onClick={()=>setActiveTab('ledger')} icon="clipboard-list" label="전체 장부" />
                            <NavItem active={activeTab==='ranking'} onClick={()=>setActiveTab('ranking')} icon="trophy" label="판매 랭킹" />
                            <NavItem active={activeTab==='blacklist'} onClick={()=>setActiveTab('blacklist')} icon="shield-off" label="블랙리스트" color="slate"
                                badge={(blacklist||[]).filter(b=>!b.releasedAt&&new Date(b.endDate)>=new Date()).length || 0}
                                badgeStyle="bg-slate-700 text-slate-400 text-[10px] font-bold px-1.5 py-0.5 rounded-full min-w-[20px] text-center leading-tight border border-slate-600" />
                            {(user.role === ROLES.AUDIT || user.role === ROLES.ADMIN) && (
                                <div className="mt-6 pt-4 border-t border-slate-800">
                                    <p className="text-[10px] text-slate-600 uppercase font-heavy px-2 mb-2 tracking-widest">관리 시스템</p>
                                    <NavItem active={activeTab==='audit'} onClick={()=>setActiveTab('audit')} icon="shield-check" label="감사 데스크" color="indigo"
                                        badge={records.filter(r => r.status === 'pending' && !r.auditReason).length || 0} />
                                    <NavItem active={activeTab==='payroll'} onClick={()=>setActiveTab('payroll')} icon="banknote" label="주급 정산" color="indigo" />
                                </div>
                            )}
                        </div>
                        <div className="pt-4 border-t border-slate-800 space-y-1">
                            <button onClick={()=>setShowNotifModal(true)} className="w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-400 hover:bg-slate-800 hover:text-white relative">
                                <Icon name="bell" size={18}/>
                                <span className="font-bold text-sm">알림</span>
                                {unreadCount > 0 && <span className="ml-auto bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full">{unreadCount}</span>}
                            </button>
                            <button onClick={()=>setDarkMode(!darkMode)} className="w-full flex items-center gap-3 p-3 rounded-xl transition-all text-slate-400 hover:bg-slate-800 hover:text-white">
                                <Icon name={darkMode ? 'sun' : 'moon'} size={18}/><span className="font-bold text-sm">{darkMode ? '라이트 모드' : '다크 모드'}</span>
                            </button>
                            {user.role === ROLES.ADMIN && <NavItem active={activeTab==='admin'} onClick={()=>setActiveTab('admin')} icon="settings" label="시스템 설정" color="slate" />}
                            <div className="mt-2 bg-slate-950/60 rounded-xl p-3 border border-slate-800">
                                <div className="text-sm font-heavy truncate text-white">{user.nickname}</div>
                                <div className="text-[10px] text-blue-400 font-bold mt-0.5">{user.role} · {user.sn}</div>
                                <button onClick={()=>setActiveTab('mypage')} className={`mt-2 w-full py-1.5 rounded-lg text-xs transition-all font-bold flex items-center justify-center gap-1.5 ${activeTab==='mypage' ? 'bg-blue-600 text-white' : 'bg-slate-800 hover:bg-slate-700 text-slate-300'}`}>
                                    <Icon name="user-cog" size={13}/> 내 설정
                                </button>
                                <button onClick={()=>{setUser(null); localStorage.removeItem('seolguk_user_session');}} className="mt-1.5 w-full py-1.5 bg-slate-800 hover:bg-red-900/30 text-red-400 rounded-lg text-xs transition-all font-bold">로그아웃</button>
                            </div>
                        </div>
                    </nav>

                    {/* ── 메인 콘텐츠 ── */}
                    <main className="main-area lm-content">
                        {activeTab === 'dashboard' && <DashboardView user={user} records={records} config={config} showToast={showToast} weekRange={weekRange} notifications={notifications} onOpenNotif={()=>setShowNotifModal(true)} pendingEditRecordId={pendingEditRecordId} clearPendingEdit={()=>setPendingEditRecordId(null)} blacklist={blacklist} />}
                        {activeTab === 'ledger' && <LedgerView records={records} range={weekRange} offset={weekOffset} setOffset={setWeekOffset} allRecords={records} allUsers={allUsers} config={config} />}
                        {activeTab === 'ranking' && <RankingView records={records} allUsers={allUsers} config={config} />}
                        {activeTab === 'blacklist' && <BlacklistView blacklist={blacklist} user={user} showToast={showToast} />}
                        {activeTab === 'audit' && <AuditView records={records} user={user} allUsers={allUsers} showToast={showToast} config={config} sendNotification={sendNotification} blacklist={blacklist} />}
                        {activeTab === 'payroll' && <PayrollView records={records} allUsers={allUsers} config={config} weekRange={weekRange} weekOffset={weekOffset} setWeekOffset={setWeekOffset} showToast={showToast} />}
                        {activeTab === 'admin' && <AdminView allUsers={allUsers} config={config} setConfig={setConfig} currentUser={user} records={records} showToast={showToast} />}
                        {activeTab === 'mypage' && <MyPageView user={user} setUser={setUser} showToast={showToast} />}
                    </main>

                    {/* ── 모바일 하단 탭바 ── */}
                    <div className="mobile-bottomnav">
                        <div className="mobile-bottomnav-inner">
                            {[
                                { tab:'dashboard', icon:'layout-dashboard', label:'대시보드' },
                                { tab:'ledger',    icon:'clipboard-list',  label:'장부'     },
                                { tab:'ranking',   icon:'trophy',           label:'랭킹'     },
                                { tab:'blacklist', icon:'shield-off',       label:'블랙'     },
                                ...(( user.role === ROLES.AUDIT || user.role === ROLES.ADMIN) ? [
                                    { tab:'audit',    icon:'shield-check', label:'감사'  },
                                    { tab:'payroll',  icon:'banknote',     label:'주급'  },
                                ] : []),
                                ...(user.role === ROLES.ADMIN    ? [{ tab:'admin', icon:'settings',     label:'설정'  }] : []),
                                { tab:'mypage', icon:'user-cog', label:'내 설정' },
                            ].map(item => {
                                const isAudit = item.tab === 'audit';
                                const pendingCount = isAudit ? records.filter(r => r.status === 'pending' && !r.auditReason).length : 0;
                                return (
                                    <button key={item.tab} onClick={()=>setActiveTab(item.tab)} className={`mob-btn relative ${activeTab===item.tab ? 'active' : ''}`}>
                                        <Icon name={item.icon} size={22}/>
                                        {isAudit && pendingCount > 0 && (
                                            <span className="absolute top-0 right-1 bg-red-500 text-white text-[9px] font-black px-1.5 py-0.5 rounded-full min-w-[18px] text-center leading-tight">{pendingCount}</span>
                                        )}
                                        <span>{item.label}</span>
                                    </button>
                                );
                            })}
                            <button onClick={()=>setShowNotifModal(true)} className={`mob-btn relative ${showNotifModal ? 'active' : ''}`}>
                                <Icon name="bell" size={22}/>
                                {unreadCount > 0 && <span className="notif-dot"/>}
                                <span>알림</span>
                            </button>
                        </div>
                    </div>

                    {/* ── 알림 모달 ── */}
                    {showNotifModal && (
                        <div className="modal-overlay" onClick={(e)=>e.target===e.currentTarget&&setShowNotifModal(false)}>
                            <div className="card w-full max-w-lg shadow-2xl lm-content" style={{maxHeight:'80vh',overflowY:'auto'}}>
                                <div className="flex items-center justify-between mb-5">
                                    <h3 className="text-xl font-heavy flex items-center gap-2"><Icon name="bell" className="text-blue-400"/> 알림 센터</h3>
                                    <button onClick={()=>setShowNotifModal(false)} className="text-slate-400 hover:text-white transition-all p-1"><Icon name="x" size={22}/></button>
                                </div>
                                {notifications.length === 0 ? (
                                    <div className="text-center py-12 text-slate-500 font-bold">
                                        <Icon name="bell-off" size={40} className="mx-auto mb-3 opacity-30"/>
                                        <p>새 알림이 없습니다.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        {notifications.map(n => {
                                            const relatedRecord = n.recordId ? records.find(r => r.id === n.recordId) : null;
                                            const isResubmitted = relatedRecord?.resubmitted === true;
                                            const isRecordGone = n.recordId && !relatedRecord; // 장부 삭제됨
                                            const showDelete = isResubmitted || isRecordGone;
                                            return (
                                            <div key={n.id}
                                                onClick={() => {
                                                    if (!n.read) markNotifRead(n.id);
                                                    if (n.recordId && n.type === 'hold' && !isResubmitted) {
                                                        setShowNotifModal(false);
                                                        setActiveTab('dashboard');
                                                        setPendingEditRecordId(n.recordId);
                                                    }
                                                }}
                                                className={`rounded-2xl border transition-all ${n.recordId && n.type === 'hold' && !showDelete ? 'cursor-pointer hover:border-red-600/50' : ''} ${isResubmitted ? 'bg-green-900/10 border-green-800/30 opacity-80' : isRecordGone ? 'bg-slate-900/40 border-slate-700/30 opacity-70' : n.read ? 'bg-slate-950/40 border-slate-800 opacity-60' : 'bg-red-900/10 border-red-700/30'}`}>
                                                <div className="p-4 flex items-start gap-3">
                                                    <div className={`p-2 rounded-xl flex-shrink-0 mt-0.5 ${isResubmitted ? 'bg-green-500/20 text-green-400' : isRecordGone ? 'bg-slate-700/40 text-slate-500' : n.type==='hold' ? 'bg-red-500/20 text-red-400' : 'bg-blue-500/20 text-blue-400'}`}>
                                                        <Icon name={isResubmitted ? 'refresh-cw' : isRecordGone ? 'trash-2' : n.type==='hold' ? 'alert-triangle' : 'message-circle'} size={16}/>
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <p className="font-heavy text-sm leading-relaxed break-words whitespace-pre-wrap text-white">{n.message}</p>
                                                        <div className="flex items-center justify-between mt-2 gap-2 flex-wrap">
                                                            <p className="text-[10px] text-slate-500 font-bold">{formatFullDateTime(n.createdAt)}</p>
                                                            {showDelete ? (
                                                                <div className="flex items-center gap-2">
                                                                    {isResubmitted && <span className="text-[11px] text-green-400 font-heavy bg-green-500/10 border border-green-500/20 px-2 py-0.5 rounded-lg flex items-center gap-1"><Icon name="check-circle" size={10}/> 재제출 완료</span>}
                                                                    {isRecordGone && <span className="text-[11px] text-slate-500 font-heavy bg-slate-800 border border-slate-700 px-2 py-0.5 rounded-lg flex items-center gap-1"><Icon name="trash-2" size={10}/> 장부 삭제됨</span>}
                                                                    <button
                                                                        onClick={e => { e.stopPropagation(); deleteNotif(n.id); }}
                                                                        className="text-[11px] text-slate-400 hover:text-red-400 font-heavy bg-slate-800 hover:bg-red-500/10 border border-slate-700 hover:border-red-500/30 px-2 py-0.5 rounded-lg flex items-center gap-1 transition-all">
                                                                        <Icon name="trash-2" size={10}/> 삭제
                                                                    </button>
                                                                </div>
                                                            ) : n.recordId && n.type === 'hold' ? (
                                                                <span className="text-[11px] text-red-300 font-heavy bg-red-500/15 border border-red-500/30 px-2.5 py-1 rounded-lg flex items-center gap-1.5">
                                                                    <Icon name="edit-2" size={11}/> 탭하여 장부 수정하기
                                                                </span>
                                                            ) : null}
                                                        </div>
                                                    </div>
                                                    {!n.read && !showDelete && <span className="w-2 h-2 bg-red-400 rounded-full flex-shrink-0 mt-1.5"></span>}
                                                </div>
                                            </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const NavItem = ({ active, onClick, icon, label, color = "blue", badge, badgeStyle }) => (
            <button onClick={onClick} className={`w-full flex items-center gap-3 p-4 rounded-xl transition-all ${active ? (color === 'indigo' ? 'bg-indigo-600' : color === 'slate' ? 'bg-slate-700' : 'bg-blue-600') + ' text-white shadow-lg' : 'text-slate-500 hover:bg-slate-800 hover:text-slate-300'}`}>
                <Icon name={icon}/>
                <span className="font-bold flex-1 text-left">{label}</span>
                {badge > 0 && <span className={badgeStyle || "bg-red-500 text-white text-[10px] font-black px-1.5 py-0.5 rounded-full min-w-[20px] text-center leading-tight"}>{badge}</span>}
            </button>
        );

        // --- Dashboard View ---
        function DashboardView({ user, records, config, showToast, weekRange, notifications, onOpenNotif, pendingEditRecordId, clearPendingEdit, blacklist }) {
            const items = getEffectiveItems(config);
            const itemKeys = Object.keys(items);
            const initialForm = { buyerSn: '', buyerNickname: '', note: '', ...Object.fromEntries(itemKeys.map(k=>[k,0])) };
            const [form, setForm] = useState(initialForm);
            const [showPrices, setShowPrices] = useState(false);
            const [showManual, setShowManual] = useState(false);
            const [showGuide, setShowGuide] = useState(false);
            const [editing, setEditing] = useState(null);
            const [reason, setReason] = useState("");

            // 알림에서 넘어온 보류 장부 — 주간 필터 무관하게 전체에서 찾아 수정 모달 오픈
            useEffect(() => {
                if (pendingEditRecordId && records.length > 0) {
                    const rec = records.find(r => r.id === pendingEditRecordId);
                    if (rec && rec.sellerUid === user.uid) {
                        // 감사완료(booked)가 아닌 건만 수정 가능
                        if (!(rec.status === 'completed' && !rec.auditReason)) {
                            setEditing({...rec});
                        } else {
                            showToast("이미 감사 완료된 건은 수정할 수 없습니다.");
                        }
                        clearPendingEdit();
                    }
                }
            }, [pendingEditRecordId, records]);

            const total = useMemo(() => itemKeys.reduce((s, k) => s + (parseInt(form[k]) || 0) * (items[k].price || 0), 0), [form, items]);
            const isExceeded = useMemo(() => itemKeys.some(k => (parseInt(form[k]) || 0) > (items[k].max || 9999)), [form, items]);

            // 이번 주 내 판매 기록 전체
            const myWeekRecords = useMemo(() => {
                if (!weekRange) return records.filter(r => r.sellerUid === user.uid);
                return records.filter(r => {
                    if (r.sellerUid !== user.uid) return false;
                    const d = new Date(r.timestamp);
                    return d >= weekRange.start && d <= weekRange.end;
                });
            }, [records, user.uid, weekRange]);

            // 이번 주 품목별 합계
            const weekItemTotals = useMemo(() => {
                const totals = {};
                itemKeys.forEach(k => { totals[k] = 0; });
                myWeekRecords.forEach(r => {
                    itemKeys.forEach(k => { totals[k] += (parseInt(r[k]) || 0); });
                });
                return totals;
            }, [myWeekRecords, itemKeys]);

            const weekTotalAmount = useMemo(() => myWeekRecords.reduce((s, r) => s + (r.totalAmount || 0), 0), [myWeekRecords]);

            // 이번 주 판매내역 날짜별 페이징
            const [myRecPage, setMyRecPage] = useState(0);
            const myRecByDate = useMemo(() => {
                const groups = {};
                myWeekRecords.forEach(r => {
                    const d = formatDate(r.timestamp);
                    if (!groups[d]) groups[d] = [];
                    groups[d].push(r);
                });
                return Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]));
            }, [myWeekRecords]);
            useEffect(() => { setMyRecPage(0); }, [myWeekRecords]);
            const myRecTotalPages = myRecByDate.length;
            const myRecPaged = myRecByDate[myRecPage] ? myRecByDate[myRecPage][1] : myWeekRecords;

            const copyAmount = () => {
                const amount = String(Math.round(total * 0.5));
                copyToClipboard(amount);
                showToast("입금액이 복사되었습니다.");
            };

            const copyReason = () => {
                const itemSummary = itemKeys.filter(k => parseInt(form[k]) > 0).map(k => `${items[k].emoji}${form[k]}`).join(' ');
                const text = `${form.buyerNickname}(${form.buyerSn}) - ${itemSummary || '품목미입력'}`;
                copyToClipboard(text);
                showToast("입금 사유가 복사되었습니다.");
            };

            const copyRecordReason = (r) => {
                const itemSummary = itemKeys.filter(k => parseInt(r[k]) > 0).map(k => `${items[k].emoji}${r[k]}`).join(' ');
                const text = `${r.buyerNickname}(${r.buyerSn}) - ${itemSummary || '품목미입력'}`;
                copyToClipboard(text);
                showToast("입금 사유가 복사되었습니다.");
            };

            const copyRecordAmount = (r) => {
                const amount = String(Math.round(r.totalAmount * 0.5));
                copyToClipboard(amount);
                showToast("입금액이 복사되었습니다.");
            };

            const buyerSnRef = React.useRef(null);
            const buyerNickRef = React.useRef(null);
            const debounceRef = React.useRef(null);

            // 오늘 판매건에서 중복 구매 확인 (debounce)
            const [dupCheck, setDupCheck] = useState(null);
            const checkDuplicate = (nickname, sn) => {
                if (debounceRef.current) clearTimeout(debounceRef.current);
                if (!nickname && !sn) { setDupCheck(null); return; }
                debounceRef.current = setTimeout(() => {
                    // 블랙리스트 확인
                    const now = new Date();
                    const blEntry = (blacklist||[]).find(b =>
                        (sn && b.buyerSn === sn) || (nickname && b.buyerNickname === nickname)
                    );
                    const isBlacklisted = blEntry && new Date(blEntry.endDate) >= now;

                    // 오늘 중복 구매 확인
                    const today = new Date(); today.setHours(0,0,0,0);
                    const todayEnd = new Date(today); todayEnd.setDate(today.getDate()+1);
                    const todayRecs = records.filter(r => {
                        const d = new Date(r.timestamp);
                        return d >= today && d < todayEnd;
                    });
                    const matched = todayRecs.filter(r =>
                        (sn && r.buyerSn === sn) || (nickname && r.buyerNickname === nickname)
                    );
                    setDupCheck({ found: matched.length > 0, recs: matched, isBlacklisted, blEntry });
                }, 300);
            };

            const submitForm = async () => {
                if (total === 0 || isExceeded) return;
                const recId = 'r_' + Date.now();
                const newRec = { ...form, timestamp: new Date().toISOString(), sellerUid: user.uid, sellerNickname: user.nickname, sellerSn: user.sn, totalAmount: total, status: 'pending', auditReason: '', auditMemo: '', isEdited: false, penaltyPoints: 0 };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', recId), newRec);
                setForm(initialForm);
                setDupCheck(null);
                showToast("장부가 제출되었습니다.");
                // 닉네임 필드로 바로 포커스 — 한글 상태 유지
                setTimeout(() => { if (buyerNickRef.current) buyerNickRef.current.focus(); }, 80);
            };

            const handleEditSave = async (e) => {
                e.preventDefault();
                if(!reason.trim()) return alert("수정 사유를 입력하세요.");
                let nt = 0; itemKeys.forEach(k => nt += (parseInt(editing[k])||0) * (items[k].price||0));
                const wasHold = !!(editing.auditReason); // 보류건 재제출 여부
                const updated = {
                    ...editing,
                    totalAmount: nt,
                    note: `${editing.note || ""}\n[수정사유: ${reason}]`.trim(),
                    isEdited: true,
                    status: 'pending',
                    auditReason: '',    // 보류 사유 초기화 → 감사대기열에 다시 노출
                    auditMemo: '',
                    resubmitted: wasHold, // 보류 후 재제출 플래그
                    resubmittedAt: wasHold ? new Date().toISOString() : (editing.resubmittedAt || null),
                };
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', editing.id), updated);
                setEditing(null); setReason(""); showToast("재제출 완료! 감사대기열로 이동되었습니다.");
            };

            return (
                <div className="space-y-5 font-bold">
                    {/* 공지사항 — 최상단 */}
                    {config.eventNotice && (
                        <div className="event-gradient p-4 rounded-2xl border border-blue-500/30 flex items-center justify-center gap-3 shadow-xl">
                            <Icon name="sparkles" className="text-yellow-400 animate-pulse" />
                            <p className="text-white text-base font-heavy text-center">{config.eventNotice}</p>
                            <Icon name="sparkles" className="text-yellow-400 animate-pulse" />
                        </div>
                    )}

                    {/* 알림 미리보기 카드 */}
                    {notifications && notifications.filter(n=>!n.read).length > 0 && (
                        <div onClick={onOpenNotif} className="card cursor-pointer border-blue-700/40 bg-blue-900/10 hover:bg-blue-900/20 transition-all shadow-lg">
                            <div className="flex items-center justify-between gap-3">
                                <div className="flex items-center gap-3 min-w-0">
                                    <div className="bg-blue-500/20 p-2.5 rounded-xl relative flex-shrink-0">
                                        <Icon name="bell" className="text-blue-400" size={20}/>
                                        <span className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 text-white text-[9px] font-black rounded-full flex items-center justify-center">{notifications.filter(n=>!n.read).length}</span>
                                    </div>
                                    <div className="min-w-0">
                                        <p className="text-blue-400 text-xs font-heavy uppercase tracking-widest mb-0.5">새 알림 {notifications.filter(n=>!n.read).length}건</p>
                                        <p className="text-sm font-heavy text-white truncate">{notifications.filter(n=>!n.read)[0]?.message}</p>
                                    </div>
                                </div>
                                <Icon name="chevron-right" className="text-blue-600 flex-shrink-0" size={20}/>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {/* Guide Card */}
                        <div onClick={()=>setShowPrices(true)} className="card cursor-pointer hover:bg-slate-800 flex justify-between items-center group shadow-lg transition-all">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600/10 p-4 rounded-2xl group-hover:bg-blue-600/20 transition-all">
                                    <Icon name="scroll" className="text-blue-500" size={32}/>
                                </div>
                                <div>
                                    <p className="text-blue-500 text-xs font-heavy uppercase tracking-widest mb-1">Guide</p>
                                    <p className="text-xl font-heavy text-white">가격표 및 배달료 확인</p>
                                </div>
                            </div>
                            <Icon name="chevron-right" className="text-slate-700 group-hover:text-blue-500 transition-all" />
                        </div>

                        {/* Rule Card */}
                        <div onClick={()=>setShowGuide(true)} className="card cursor-pointer hover:bg-slate-800 flex justify-between items-center group shadow-lg transition-all border border-yellow-700/20">
                            <div className="flex items-center gap-4">
                                <div className="bg-yellow-500/10 p-4 rounded-2xl group-hover:bg-yellow-500/20 transition-all">
                                    <Icon name="book-open" className="text-yellow-400" size={32}/>
                                </div>
                                <div>
                                    <p className="text-yellow-400 text-xs font-heavy uppercase tracking-widest mb-1">필독</p>
                                    <p className="text-xl font-heavy text-white">장부 작성 방법 안내</p>
                                    <p className="text-[10px] text-slate-500 font-bold mt-1">작성법 · 수정법 · 유의사항</p>
                                </div>
                            </div>
                            <Icon name="chevron-right" className="text-slate-700 group-hover:text-yellow-400 transition-all" />
                        </div>
                    </div>

                    {/* 판매 전 로그 확인 필수 — 장부 작성 바로 위, 컴팩트 */}
                    <div className="flex items-center gap-3 bg-red-950/40 border border-red-700/50 rounded-2xl px-4 py-3">
                        <Icon name="alert-circle" className="text-red-500 flex-shrink-0" size={20}/>
                        <div className="flex items-center gap-2 flex-1">
                            <span className="text-red-400 text-[10px] font-heavy uppercase tracking-widest">Rule</span>
                            <span className="text-white font-heavy text-sm">당일 판매 로그 확인 필수</span>
                            <span className="text-slate-600 text-[10px] font-bold">— 위반 시 내부경고 부여</span>
                        </div>
                    </div>

                    <div className="card shadow-2xl">
                        <h2 className="text-2xl font-heavy mb-8 flex items-center gap-2 font-heavy text-white"><Icon name="edit-3" className="text-blue-500"/> 판매 장부 작성</h2>
                        <form onSubmit={e=>e.preventDefault()} className="grid grid-cols-1 lg:grid-cols-5 gap-8">
                            <div className="lg:col-span-3 space-y-6 font-bold">
                                <div className="grid grid-cols-2 gap-4 font-bold">
                                    <div>
                                        <label className="text-sm text-slate-400 block mb-2 font-heavy ml-1">구매자 닉네임</label>
                                        <input ref={buyerNickRef} className={`input-base font-bold text-lg ${dupCheck?.found ? 'border-orange-500 ring-2 ring-orange-500/20' : ''}`} value={form.buyerNickname}
                                            onChange={e=>{ setForm({...form, buyerNickname: e.target.value}); checkDuplicate(e.target.value, form.buyerSn); }}
                                            required placeholder="닉네임" autoComplete="off" />
                                    </div>
                                    <div>
                                        <label className="text-sm text-slate-400 block mb-2 font-heavy ml-1">구매자 고유번호</label>
                                        <input ref={buyerSnRef} type="text" className={`input-base font-bold text-lg ${dupCheck?.isBlacklisted ? 'border-red-500 ring-2 ring-red-500/20' : dupCheck?.found ? 'border-orange-500 ring-2 ring-orange-500/20' : ''}`} value={form.buyerSn}
                                            onChange={e=>{ const v=e.target.value.replace(/[^0-9]/g,''); setForm({...form, buyerSn: v}); checkDuplicate(form.buyerNickname, v); }}
                                            required placeholder="0000" />
                                    </div>
                                </div>
                                {/* 블랙리스트 경고 — 최우선 표시 */}
                                {dupCheck?.isBlacklisted && (
                                    <div className="flex items-start gap-2 bg-red-900/30 border-2 border-red-500/60 rounded-xl px-3 py-3 -mt-2">
                                        <Icon name="shield-off" size={16} className="text-red-400 flex-shrink-0 mt-0.5"/>
                                        <div className="flex-1 min-w-0">
                                            <p className="text-red-300 font-heavy text-sm">🚫 블랙리스트 등재 고객 — 판매 불가</p>
                                            <p className="text-red-400 text-xs font-bold mt-1">{dupCheck.blEntry.buyerNickname} (#{dupCheck.blEntry.buyerSn}) · {dupCheck.blEntry.startDate} ~ {dupCheck.blEntry.endDate}</p>
                                            <p className="text-red-500 text-xs font-bold mt-0.5">사유: {dupCheck.blEntry.reason}</p>
                                        </div>
                                    </div>
                                )}
                                {/* 중복 구매 경고 */}
                                {dupCheck?.found && !dupCheck?.isBlacklisted && (
                                    <div className="flex items-start gap-2 bg-orange-900/20 border border-orange-600/40 rounded-xl px-3 py-2.5 -mt-2">
                                        <Icon name="alert-triangle" size={14} className="text-orange-400 flex-shrink-0 mt-0.5"/>
                                        <div className="flex-1 min-w-0">
                                            <span className="text-orange-300 font-heavy text-xs">오늘 구매 이력 {dupCheck.recs.length}건 있음 — 중복 구매 확인 필요</span>
                                            <div className="flex flex-wrap gap-1.5 mt-1">
                                                {dupCheck.recs.map((r,i) => {
                                                    const summary = itemKeys.filter(k=>parseInt(r[k])>0).map(k=>`${items[k]?.emoji}${r[k]}`).join(' ');
                                                    return <span key={i} className="text-[10px] bg-orange-950/50 border border-orange-800/30 text-orange-300 px-2 py-0.5 rounded-md font-bold">{new Date(r.timestamp).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})} {summary||'-'}</span>;
                                                })}
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {dupCheck && !dupCheck.found && !dupCheck.isBlacklisted && (form.buyerNickname || form.buyerSn) && (
                                    <div className="flex items-center gap-2 bg-green-900/15 border border-green-700/30 rounded-xl px-3 py-2 -mt-2">
                                        <Icon name="check-circle" size={13} className="text-green-400 flex-shrink-0"/>
                                        <span className="text-green-400 font-heavy text-xs">오늘 구매 이력 없음 · 블랙리스트 미등재</span>
                                    </div>
                                )}
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                                    {itemKeys.map(k => (
                                        <div key={k}>
                                            <label className="text-base text-slate-300 mb-2 flex items-center gap-1 font-heavy ml-1">{items[k].emoji} {items[k].label}</label>
                                            <input
                                                type="text"
                                               
                                               
                                                className={`input-base font-heavy text-xl ${(parseInt(form[k]) > items[k].max) ? 'border-red-500 ring-2 ring-red-500/20 text-red-500' : ''}`}
                                                value={form[k]||""}
                                                onChange={e => { const v = e.target.value.replace(/[^0-9]/g,''); setForm({...form, [k]: v}); }}
                                                placeholder={`최대 ${items[k].max}`}
                                            />
                                        </div>
                                    ))}
                                </div>
                                <div>
                                    <label className="text-sm text-slate-400 block mb-2 font-heavy ml-1">비고 (특이사항)</label>
                                    <input className="input-base font-bold" value={form.note} onChange={e=>setForm({...form, note: e.target.value})} placeholder={config.notePlaceholder || "특이사항 기재"} />
                                </div>
                            </div>
                            <div className="lg:col-span-2 bg-slate-950 p-6 rounded-3xl border border-slate-800 flex flex-col gap-4 shadow-inner font-heavy">
                                <div className="space-y-3 font-heavy">
                                    <div className="flex justify-between items-center"><span className="text-slate-500 font-heavy text-base">총 매출액</span><p className="text-2xl text-white font-heavy">{formatKRW(total)}</p></div>
                                    <div className="h-px bg-slate-900"/>
                                    <div className="flex justify-between items-center"><span className="text-blue-500 font-heavy text-base">공계 입금액(50%)</span><p className="text-2xl text-blue-400 font-heavy">{formatKRW(total * 0.5)}</p></div>
                                </div>
                                <div className="flex flex-col gap-2">
                                    <button type="button" onClick={copyAmount} className="w-full flex items-center justify-center gap-2 py-3.5 bg-blue-600/15 hover:bg-blue-600/30 text-blue-400 rounded-xl text-sm font-heavy transition-all border border-blue-500/30">
                                        <Icon name="copy" size={16}/> 금액 복사
                                    </button>
                                    <button type="button" onClick={copyReason} disabled={!form.buyerNickname && !form.buyerSn}
                                        className="w-full flex items-center justify-center gap-2 py-3.5 bg-green-600/15 hover:bg-green-600/30 text-green-400 rounded-xl text-sm font-heavy transition-all border border-green-500/30 disabled:opacity-30">
                                        <Icon name="clipboard-copy" size={16}/> 사유 복사
                                    </button>
                                </div>
                                {isExceeded && <p className="text-red-500 text-center text-sm font-bold animate-bounce">⚠️ 최대 수량 초과!</p>}
                                <button type="button" onClick={submitForm} disabled={isExceeded} className={`btn w-full py-5 text-2xl font-heavy shadow-xl ${isExceeded ? 'bg-red-600 opacity-50' : 'btn-blue'}`}>장부 제출하기</button>
                            </div>
                        </form>
                    </div>

                    {/* 이번 주 실적 현황 보드 */}
                    <div className="card shadow-2xl">
                        <div className="flex items-center justify-between mb-5">
                            <h2 className="text-xl font-heavy flex items-center gap-2"><Icon name="bar-chart-2" className="text-blue-500"/> 이번 주 실적 현황</h2>
                            <span className="text-[10px] text-slate-500 font-bold uppercase">
                                {weekRange ? `${weekRange.start.toLocaleDateString()} ~ ${weekRange.end.toLocaleDateString()}` : '-'}
                            </span>
                        </div>

                        {/* 상단 요약 3개 */}
                        <div className="grid grid-cols-3 gap-3 mb-5">
                            <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 text-center shadow-inner">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">총 판매 건수</p>
                                <p className="text-3xl font-heavy text-white">{myWeekRecords.length}<span className="text-sm text-slate-500 ml-1">건</span></p>
                            </div>
                            <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 text-center shadow-inner">
                                <p className="text-[10px] text-slate-500 uppercase font-bold mb-1">총 매출액</p>
                                <p className="text-2xl font-heavy text-white">{formatKRW(weekTotalAmount)}</p>
                            </div>
                            <div className="bg-blue-900/20 border border-blue-700/30 rounded-2xl p-4 text-center shadow-inner">
                                <p className="text-[10px] text-blue-400 uppercase font-bold mb-1">공계 입금액 (50%)</p>
                                <p className="text-2xl font-heavy text-blue-400">{formatKRW(weekTotalAmount * 0.5)}</p>
                            </div>
                        </div>

                        {/* 품목별 판매 수량 */}
                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
                            {itemKeys.map(k => {
                                const qty = weekItemTotals[k] || 0;
                                const itemRevenue = qty * (items[k].price || 0);
                                return (
                                    <div key={k} className={`bg-slate-950 border rounded-2xl p-3 space-y-2 shadow-inner transition-all ${qty > 0 ? 'border-blue-800/50 bg-blue-950/20' : 'border-slate-800'}`}>
                                        <div className="flex justify-between items-center">
                                            <span className="text-lg">{items[k].emoji}</span>
                                            <span className={`text-[11px] font-heavy px-2 py-0.5 rounded-lg ${qty > 0 ? 'bg-blue-500/20 text-blue-400' : 'bg-slate-800 text-slate-600'}`}>
                                                {qty > 0 ? `${qty}개` : '—'}
                                            </span>
                                        </div>
                                        <p className="text-[11px] text-slate-400 font-heavy leading-tight">{items[k].label}</p>
                                        {qty > 0 && <p className="text-[10px] text-blue-300 font-bold">{formatKRW(itemRevenue)}</p>}
                                    </div>
                                );
                            })}
                        </div>

                        {myWeekRecords.length === 0 && (
                            <div className="text-center py-8 text-slate-600 text-sm font-bold mt-2">이번 주 판매 기록이 없습니다.</div>
                        )}
                    </div>

                    {/* 이번 주 나의 전체 판매 내역 */}
                    <div className="card overflow-x-auto font-heavy">
                        <div className="flex items-center justify-between mb-5 gap-3 flex-wrap">
                            <h2 className="text-xl font-heavy flex items-center gap-2 text-white"><Icon name="list" className="text-indigo-400"/> 이번 주 나의 판매 내역</h2>
                            {myRecTotalPages > 1 && (
                                <div className="flex items-center gap-2">
                                    <button onClick={()=>setMyRecPage(p=>Math.max(p-1,0))} disabled={myRecPage===0}
                                        className={`px-2.5 py-1.5 rounded-lg text-xs font-heavy transition-all flex items-center gap-1 ${myRecPage===0?'text-slate-700 cursor-not-allowed':'text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700'}`}>
                                        <Icon name="chevron-left" size={13}/> 이전
                                    </button>
                                    <span className="text-xs text-slate-400 font-heavy whitespace-nowrap">
                                        {myRecByDate[myRecPage]?.[0] || ''} <span className="text-slate-600">({myRecPage+1}/{myRecTotalPages})</span>
                                    </span>
                                    <button onClick={()=>setMyRecPage(p=>Math.min(p+1,myRecTotalPages-1))} disabled={myRecPage===myRecTotalPages-1}
                                        className={`px-2.5 py-1.5 rounded-lg text-xs font-heavy transition-all flex items-center gap-1 ${myRecPage===myRecTotalPages-1?'text-slate-700 cursor-not-allowed':'text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700'}`}>
                                        다음 <Icon name="chevron-right" size={13}/>
                                    </button>
                                </div>
                            )}
                        </div>
                        {myWeekRecords.length === 0 ? (
                            <div className="text-center py-10 text-slate-600 font-bold">이번 주 판매 기록이 없습니다.</div>
                        ) : (
                        <table className="w-full text-left font-bold">
                            <thead className="text-slate-500 text-[11px] border-b border-slate-800 uppercase tracking-widest font-heavy"><tr className="font-heavy"><th className="p-4 whitespace-nowrap">날짜</th><th className="p-4 whitespace-nowrap">구매자</th><th className="p-4 text-center whitespace-nowrap">품목</th><th className="p-4 text-center whitespace-nowrap">매출</th><th className="p-4 text-center whitespace-nowrap">상태</th><th className="p-4 text-center whitespace-nowrap">복사</th><th className="p-4 text-center whitespace-nowrap">수정</th></tr></thead>
                            <tbody className="text-white font-bold">
                                {myRecPaged.map(r => {
                                    const itemSummary = itemKeys.filter(k => parseInt(r[k]) > 0).map(k => `${items[k].emoji}${r[k]}`).join(' ');
                                    return (
                                    <tr key={r.id} className="border-b border-slate-800/50 hover:bg-slate-800/30 transition-colors font-heavy">
                                        <td className="p-4 text-xs font-mono text-slate-500 whitespace-nowrap">{formatDate(r.timestamp)}</td>
                                        <td className="p-4 whitespace-nowrap">{r.buyerNickname} <span className="text-slate-600 text-xs">({r.buyerSn})</span></td>
                                        <td className="p-4 text-center text-sm whitespace-nowrap">{itemSummary || '-'}</td>
                                        <td className="p-4 text-center font-heavy whitespace-nowrap">{formatKRW(r.totalAmount)}</td>
                                        <td className="p-4 text-center whitespace-nowrap">
                                            <div className="flex flex-col items-center gap-1 font-heavy">
                                                <StatusBadge record={r} />
                                                {r.isEdited && <span className="text-[9px] bg-blue-500/20 text-blue-400 px-1.5 py-0.5 rounded-md font-heavy">수정됨</span>}
                                                {r.resubmitted && <span className="text-[9px] bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded-md font-heavy">재제출</span>}
                                            </div>
                                        </td>
                                        <td className="p-4 text-center whitespace-nowrap">
                                            <div className="flex items-center justify-center gap-1.5">
                                                <button onClick={()=>copyRecordAmount(r)} title="입금액 복사"
                                                    className="p-2 bg-blue-600/10 hover:bg-blue-600/25 text-blue-400 rounded-lg transition-all">
                                                    <Icon name="copy" size={14}/>
                                                </button>
                                                <button onClick={()=>copyRecordReason(r)} title="입금 사유 복사"
                                                    className="p-2 bg-green-600/10 hover:bg-green-600/25 text-green-400 rounded-lg transition-all">
                                                    <Icon name="clipboard-copy" size={14}/>
                                                </button>
                                            </div>
                                        </td>
                                        <td className="p-4 text-center font-heavy whitespace-nowrap">
                                            {r.status === 'completed' && !r.auditReason ? (
                                                <span className="p-2.5 rounded-xl bg-slate-800/40 text-slate-700 cursor-not-allowed inline-flex" title="감사 완료된 건은 수정할 수 없습니다"><Icon name="lock" size={16}/></span>
                                            ) : (
                                                <button onClick={()=>setEditing({...r})} className="p-2.5 bg-slate-800 hover:bg-blue-600 rounded-xl transition-all font-heavy"><Icon name="edit-2" size={16}/></button>
                                            )}
                                        </td>
                                    </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                        )}
                    </div>

                    {showPrices && (
                        <Modal title="설국 가격표 및 가이드" onClose={()=>setShowPrices(false)}>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                                {itemKeys.map(k => (
                                    <div key={k} className="bg-slate-950 p-5 rounded-3xl flex items-center gap-4 border border-slate-800">
                                        <div className="text-4xl">{items[k].emoji}</div>
                                        <div className="flex-1 font-bold"><div className="flex justify-between font-heavy"><span className="text-white text-lg font-bold">{items[k].label}</span><span className="text-blue-400">{formatKRW(items[k].price)}</span></div><p className="text-[10px] text-slate-500 uppercase font-bold">일일 최대 {items[k].max}개</p></div>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-blue-900/10 p-8 rounded-3xl border border-blue-500/20 font-bold">
                                <h4 className="text-xl text-blue-400 flex items-center gap-2 font-heavy mb-4"><Icon name="truck" size={24}/> 배달료 안내</h4>
                                <div className="space-y-3 font-bold">
                                    <div className="flex justify-between p-4 bg-slate-950 rounded-2xl border border-slate-800 font-bold"><span className="text-slate-300">남부 배달</span><span className="text-white font-heavy text-lg">10억</span></div>
                                    <div className="flex justify-between p-4 bg-slate-950 rounded-2xl border border-slate-800 font-bold"><span className="text-slate-300">북부 배달</span><span className="text-white font-heavy text-lg">20억</span></div>
                                    <div className="p-4 bg-green-500/10 rounded-2xl border border-green-500/20 text-center text-green-400 font-heavy">💡 설국 앞 사유지 콜 시 배달료 면제</div>
                                </div>
                            </div>
                        </Modal>
                    )}

                    {showManual && (
                        <Modal title="중복판매 조치 및 경고 규정" onClose={()=>setShowManual(false)}>
                            <div className="space-y-6 py-4">
                                <div className="bg-red-500/10 p-6 rounded-2xl border border-red-500/20">
                                    <h4 className="text-lg text-red-500 font-black mb-2 flex items-center gap-2">
                                        <Icon name="shield-alert" /> 중요 안내
                                    </h4>
                                    <p className="text-white text-lg font-heavy leading-relaxed">
                                        <span className="text-red-500 underline underline-offset-4 decoration-2">중복 판매 확인 시 즉시 회수</span>하는 것이 설국 인트라넷의 운영 매뉴얼입니다.
                                    </p>
                                </div>
                                
                                <div className="bg-slate-950 p-6 rounded-2xl border border-slate-800 space-y-4">
                                    <h5 className="text-blue-400 font-heavy">매뉴얼 및 지원 안내</h5>
                                    <p className="text-slate-300 font-heavy leading-relaxed">
                                        회수 절차나 구체적인 조치 방법을 모를 경우에는 임의로 판단하지 마시고, 즉시 <span className="text-indigo-400 font-black">감사팀</span>에 문의하여 안내를 받으시기 바랍니다.
                                    </p>
                                    <div className="h-px bg-slate-900"></div>
                                    <p className="text-sm text-red-400 font-bold">
                                        ※ 중복판매나 장부기입 누락 시 규정에 따라 내부경고가 부여될 수 있습니다.
                                    </p>
                                </div>
                                
                                <button onClick={()=>setShowManual(false)} className="btn btn-blue w-full py-4 text-xl font-heavy shadow-lg">확인했습니다</button>
                            </div>
                        </Modal>
                    )}

                    {showGuide && (
                        <Modal title="📖 필독 — 장부 작성 방법" onClose={()=>setShowGuide(false)}>
                            <div className="space-y-5 font-bold">
                                {/* 유의사항 — 최상단 */}
                                <div className="bg-red-900/20 border-2 border-red-600/40 rounded-2xl p-5 space-y-3">
                                    <h4 className="text-lg font-heavy text-red-400 flex items-center gap-2"><Icon name="alert-triangle" size={20}/> 유의사항</h4>
                                    {((config.guideContent?.warnings) || [
                                        '판매 전 반드시 전체 장부 > 오늘의 판매건에서 해당 구매자의 당일 구매 이력을 검색하여 중복 여부를 확인하세요.',
                                        '장부를 누락한 경우, 이후 발생하는 중복 구매 사고에 대한 경고 및 사후 처리는 장부를 누락한 사원이 책임집니다.',
                                        '중복 판매가 확인된 경우 즉시 회수하고 감사팀에 보고하세요.',
                                        '구매자 고유번호와 닉네임을 반드시 정확하게 확인 후 기재하세요.',
                                        '당일 장부는 반드시 당일 제출해야 합니다.',
                                        '처리 방법을 모르거나 애매한 상황은 임의 처리하지 말고 반드시 감사팀에 문의 후 처리하세요.',
                                    ]).map((text, i) => (
                                        <div key={i} className="flex items-start gap-2">
                                            <span className="text-red-400 mt-0.5 flex-shrink-0">•</span>
                                            <p className={`text-base leading-relaxed ${i < 2 ? 'text-white font-heavy' : 'text-slate-200'}`}>{text}</p>
                                        </div>
                                    ))}
                                </div>

                                {/* 장부 작성 순서 */}
