                                        <th className="p-4 whitespace-nowrap">판매 사원</th>
                                        <th className="p-4 whitespace-nowrap">구매자</th>
                                        <th className="p-4 text-right whitespace-nowrap">매출액</th>
                                        <th className="p-4 text-right whitespace-nowrap">입금액</th>
                                        <th className="p-4 text-center whitespace-nowrap">상태</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800 text-white font-heavy">
                                    {filtered.map(r => (
                                        <tr key={r.id} className="hover:bg-slate-800/50 transition-colors">
                                            <td className="p-4 text-xs text-slate-500 font-mono whitespace-nowrap">{formatDate(r.timestamp)}</td>
                                            <td className="p-4 whitespace-nowrap"><div className="text-sm">{r.sellerNickname}</div><div className="text-[10px] text-slate-600">({r.sellerSn})</div></td>
                                            <td className="p-4 whitespace-nowrap"><div className="text-sm">{r.buyerNickname}</div><div className="text-[10px] text-slate-600">({r.buyerSn})</div></td>
                                            <td className="p-4 text-right font-heavy text-sm whitespace-nowrap">{formatKRW(r.totalAmount)}</td>
                                            <td className="p-4 text-right text-blue-400 font-heavy text-sm whitespace-nowrap">{formatKRW(r.totalAmount * 0.5)}</td>
                                            <td className="p-4 text-center whitespace-nowrap"><StatusBadge record={r} /></td>
                                        </tr>
                                    ))}
                                    {filtered.length === 0 && (
                                        <tr><td colSpan="6" className="p-10 text-center text-slate-600 font-bold">기록이 없습니다.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Audit View ---
        function AuditView({ records, user, allUsers, showToast, config, sendNotification }) {
            const [tab, setAuditTab] = useState('queue');
            const [viewItem, setViewItem] = useState(null);
            const [rsnModal, setRsnModal] = useState(null);
            const [penaltyDetailUser, setPenaltyDetailUser] = useState(null);
            const [reasonText, setReasonText] = useState("");
            const [penaltyInput, setPenaltyInput] = useState(0);
            const [editMemo, setEditMemo] = useState("");
            const [editPenalty, setEditPenalty] = useState(0);
            const [historyFilter, setHistoryFilter] = useState('all'); 
            const [historyOffset, setHistoryOffset] = useState(0);
            const [deleteConfirm, setDeleteConfirm] = useState(null);
            const [userSalesModal, setUserSalesModal] = useState(null);
            const [salesTab, setSalesTab] = useState('all');
            const [salesDetailRecord, setSalesDetailRecord] = useState(null);
            const [manualPenaltyUser, setManualPenaltyUser] = useState(null);
            const [manualPenaltyReason, setManualPenaltyReason] = useState("");
            const [manualPenaltyPts, setManualPenaltyPts] = useState(1);

            const historyRange = useMemo(() => {
                const now = new Date();
                now.setDate(now.getDate() + (historyOffset * 7));
                const day = now.getDay();
                const diff = (day < config.weekStartDay) ? (day + 7 - config.weekStartDay) : (day - config.weekStartDay);
                const start = new Date(now);
                start.setDate(now.getDate() - diff); start.setHours(0,0,0,0);
                const end = new Date(start);
                end.setDate(start.getDate() + 6); end.setHours(23,59,59,999);
                return { start, end };
            }, [historyOffset, config.weekStartDay]);

            const pending = records.filter(r => r.status === 'pending' && !r.auditReason);
            
            const history = useMemo(() => {
                return records.filter(r => (r.status === 'completed' || r.auditReason)).filter(r => {
                    const d = new Date(r.auditedAt || r.timestamp);
                    const matchRange = d >= historyRange.start && d <= historyRange.end;
                    const matchFilter =
                        historyFilter === 'all' ||
                        (historyFilter === 'onhold'    && r.status === 'pending'   && r.auditReason) ||
                        (historyFilter === 'holdDone'  && r.status === 'completed' && r.auditReason);
                    return matchRange && matchFilter;
                });
            }, [records, historyRange, historyFilter]);

            const warningSortedUsers = useMemo(() => {
                const result = allUsers
                    .filter(u => u.uid && u.nickname && u.role !== ROLES.ADMIN && u.role !== ROLES.EVENT && u.role !== ROLES.PENDING)
                    .map(u => {
                        const score = records.filter(r => r.sellerUid === u.uid).reduce((s, r) => s + (parseInt(r.penaltyPoints) || 0), 0);
                        return { ...u, warningSum: score };
                    });
                return {
                    punished: result.filter(u => u.warningSum > 0).sort((a,b) => b.warningSum - a.warningSum),
                    clean: result.filter(u => u.warningSum === 0).sort((a,b) => a.nickname.localeCompare(b.nickname, 'ko'))
                };
            }, [allUsers, records]);

            const auditorRanking = useMemo(() => {
                // 감사 처리 건수 집계 (auditorName 기준)
                const counts = {};
                records.forEach(r => { if (r.auditorName) counts[r.auditorName] = (counts[r.auditorName] || 0) + 1; });
                // 감사 권한자(AUDIT+ADMIN) 전원 포함 — 0건도 표시
                const auditUsers = allUsers.filter(u => u.role === ROLES.AUDIT || u.role === ROLES.ADMIN);
                const result = auditUsers.map(u => ({
                    name: u.nickname,
                    sn: u.sn,
                    role: u.role,
                    count: counts[u.nickname] || 0
                }));
                return result.sort((a, b) => b.count - a.count);
            }, [records, allUsers]);

            return (
                <div className="space-y-8 animate-fade-in font-bold">
                    <div className="flex flex-wrap gap-4 border-b border-slate-800 pb-4">
                        <button onClick={()=>setAuditTab('queue')} className={`px-6 py-3 rounded-2xl transition-all font-bold ${tab === 'queue' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>감사 대기열 ({pending.length})</button>
                        <button onClick={()=>setAuditTab('history')} className={`px-6 py-3 rounded-2xl transition-all font-bold ${tab === 'history' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>처리 기록</button>
                        <button onClick={()=>setAuditTab('warning')} className={`px-6 py-3 rounded-2xl transition-all font-bold ${tab === 'warning' ? 'bg-red-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>경고 현황</button>
                        <button onClick={()=>setAuditTab('team')} className={`px-6 py-3 rounded-2xl transition-all font-bold ${tab === 'team' ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-white'}`}>감사팀 랭킹</button>
                    </div>

                    {tab === 'queue' && (
                        <div className="grid grid-cols-1 gap-6">
                            {pending.map(r => {
                                const qItems = getEffectiveItems(config);
                                const qSummary = Object.keys(qItems).filter(k=>parseInt(r[k])>0).map(k=>(
                                    <span key={k} className="inline-flex items-center gap-1 bg-blue-600/15 border border-blue-700/30 text-blue-300 px-2.5 py-1 rounded-lg text-sm font-heavy">
                                        {qItems[k].emoji} {qItems[k].label} <span className="text-blue-400 font-black">×{r[k]}</span>
                                    </span>
                                ));
                                return (
                                <div key={r.id} className="card border-l-8 border-l-blue-600 flex flex-col md:flex-row justify-between items-center gap-8 shadow-xl">
                                    <div className="flex-1 space-y-4">
                                        <div className="flex flex-wrap gap-4 items-center">
                                            <div className="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700">
                                                <p className="text-[10px] text-slate-500 uppercase font-heavy">판매 사원</p>
                                                <p className="text-lg font-heavy text-white">{r.sellerNickname} <span className="text-xs text-slate-400">({r.sellerSn})</span></p>
                                            </div>
                                            <div className="bg-blue-900/40 px-5 py-3 rounded-xl border-2 border-blue-600 shadow-[0_0_15px_rgba(37,99,235,0.2)]">
                                                <p className="text-[10px] text-blue-400 uppercase font-black mb-1">🔍 구매자 확인 (대조 필수)</p>
                                                <p className="text-xl font-black text-blue-50 tracking-tight">{r.buyerNickname} <span className="text-sm font-bold text-blue-400">#{r.buyerSn}</span></p>
                                            </div>
                                            <div className="text-xs text-slate-400 bg-slate-950/50 px-3 py-1.5 rounded-lg border border-slate-800">
                                                <Icon name="clock" size={12} className="inline mr-1 mb-0.5" />
                                                작성: <span className="text-white">{formatFullDateTime(r.timestamp)}</span>
                                            </div>
                                        </div>
                                        {/* 품목 뱃지 */}
                                        {qSummary.length > 0 && (
                                            <div className="flex flex-wrap gap-2 pl-1">
                                                {qSummary}
                                            </div>
                                        )}
                                        <div className="flex gap-12 font-heavy pl-1">
                                            <div><p className="text-[10px] text-slate-600 uppercase">매출액</p><p className="text-2xl">{formatKRW(r.totalAmount)}</p></div>
                                            <div><p className="text-[10px] text-blue-500 uppercase">입금액</p><p className="text-2xl text-blue-400">{formatKRW(r.totalAmount * 0.5)}</p></div>
                                        </div>
                                    </div>
                                    <div className="flex flex-col gap-3 min-w-[240px]">
                                        <button onClick={async ()=>{ await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', r.id), { status: 'completed', auditedAt: new Date().toISOString(), auditorName: user.nickname }); showToast("감사 승인 완료"); }} className="btn btn-blue py-5 text-xl font-heavy shadow-lg"><Icon name="check-circle"/> 감사 승인</button>
                                        <button onClick={()=>setRsnModal(r)} className="btn btn-red py-4 text-lg font-heavy"><Icon name="alert-triangle"/> 보류/경고부여</button>
                                    </div>
                                </div>
                                );
                            })}
                        </div>
                    )}

                    {tab === 'history' && (
                        <div className="space-y-6">
                            <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                <div className="flex items-center gap-2 bg-slate-900 lm-pill-wrap p-1 rounded-xl border border-slate-800">
                                    <button onClick={()=>setHistoryFilter('all')}      className={`px-4 py-2 rounded-lg text-xs transition-all font-heavy ${historyFilter==='all'      ? 'bg-blue-600 text-white'   : 'text-slate-500 hover:text-slate-300 lm-pill-inactive'}`}>전체 내역</button>
                                    <button onClick={()=>setHistoryFilter('onhold')}   className={`px-4 py-2 rounded-lg text-xs transition-all font-heavy ${historyFilter==='onhold'   ? 'bg-yellow-600 text-white'  : 'text-slate-500 hover:text-slate-300 lm-pill-inactive'}`}>보류건</button>
                                    <button onClick={()=>setHistoryFilter('holdDone')} className={`px-4 py-2 rounded-lg text-xs transition-all font-heavy ${historyFilter==='holdDone' ? 'bg-green-600 text-white'   : 'text-slate-500 hover:text-slate-300 lm-pill-inactive'}`}>보류 후 완료건</button>
                                </div>
                                <div className="flex items-center gap-4 bg-slate-900 px-6 py-3 rounded-2xl border border-slate-800 shadow-xl font-heavy">
                                    <button onClick={()=>setHistoryOffset(historyOffset-1)} className="hover:text-blue-500 transition-all font-heavy"><Icon name="chevron-left" size={24}/></button>
                                    <span className="text-blue-400 whitespace-nowrap text-sm font-heavy">{historyRange.start.toLocaleDateString()} ~ {historyRange.end.toLocaleDateString()}</span>
                                    <button onClick={()=>setHistoryOffset(historyOffset+1)} className="hover:text-blue-500 transition-all font-heavy"><Icon name="chevron-right" size={24}/></button>
                                </div>
                            </div>
                            <div className="card p-0 overflow-hidden font-heavy shadow-2xl">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left font-heavy">
                                        <thead className="bg-slate-800 text-slate-400 text-xs uppercase tracking-wider font-heavy"><tr className="border-b border-slate-700"><th className="px-5 py-4 whitespace-nowrap">처리일</th><th className="px-5 py-4 whitespace-nowrap">판매자</th><th className="px-5 py-4 whitespace-nowrap">구매자</th><th className="px-5 py-4 whitespace-nowrap">판매 품목</th><th className="px-5 py-4 text-right whitespace-nowrap">매출액</th><th className="px-5 py-4 text-right whitespace-nowrap text-blue-400">공계 입금</th><th className="px-5 py-4 text-center whitespace-nowrap">상태</th><th className="px-5 py-4 text-center whitespace-nowrap">감사관</th><th className="px-5 py-4 text-center whitespace-nowrap">상세</th></tr></thead>
                                        <tbody className="divide-y divide-slate-800 text-white font-heavy">
                                            {history.map(r => {
                                                const effectiveItems = getEffectiveItems(config);
                                                const itemSummary = Object.keys(effectiveItems).filter(k => parseInt(r[k]) > 0).map(k => `${effectiveItems[k].emoji}${r[k]}`).join(' ');
                                                return (
                                                <tr key={r.id} className="hover:bg-slate-800/40 transition-colors">
                                                    <td className="px-5 py-4 text-sm text-slate-400 font-mono whitespace-nowrap">{formatDate(r.auditedAt || r.timestamp)}</td>
                                                    <td className="px-5 py-4 whitespace-nowrap"><div className="text-base font-heavy">{r.sellerNickname}</div><div className="text-xs text-slate-500 mt-0.5">#{r.sellerSn}</div></td>
                                                    <td className="px-5 py-4 whitespace-nowrap"><div className="text-base font-heavy">{r.buyerNickname}</div><div className="text-xs text-blue-500 mt-0.5">#{r.buyerSn}</div></td>
                                                    <td className="px-5 py-4 whitespace-nowrap">
                                                        <span className="text-base tracking-wide">{itemSummary || <span className="text-slate-600">—</span>}</span>
                                                    </td>
                                                    <td className="px-5 py-4 text-right whitespace-nowrap">
                                                        <span className="text-base font-heavy">{formatKRW(r.totalAmount)}</span>
                                                    </td>
                                                    <td className="px-5 py-4 text-right whitespace-nowrap">
                                                        <span className="text-base font-heavy text-blue-400">{formatKRW(r.totalAmount * 0.5)}</span>
                                                    </td>
                                                    <td className="px-5 py-4 text-center whitespace-nowrap">
                                                        <StatusBadge record={r} />
                                                    </td>
                                                    <td className="px-5 py-4 text-center text-sm text-blue-400 font-heavy whitespace-nowrap">{r.auditorName || '-'}</td>
                                                    <td className="px-5 py-4 text-center whitespace-nowrap">
                                                        <button onClick={()=>{ setViewItem({...r}); setEditMemo(r.auditMemo||''); setEditPenalty(r.penaltyPoints||0); }} className="p-2.5 bg-slate-800 hover:bg-indigo-600 rounded-xl transition-all"><Icon name="zoom-in" size={18}/></button>
                                                    </td>
                                                </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'warning' && (
                        <div className="space-y-6">
                            {/* 집중 관리 사원 */}
                            <section className="card shadow-2xl border border-red-900/30">
                                <h2 className="text-lg text-red-400 font-heavy mb-4 flex items-center gap-2"><Icon name="alert-circle" size={20}/> 집중 관리 사원 <span className="text-sm text-red-600 font-bold">(경고 1점 이상)</span></h2>
                                {warningSortedUsers.punished.length === 0 ? (
                                    <p className="text-slate-600 text-sm font-bold text-center py-6">경고 보유 사원이 없습니다 ✅</p>
                                ) : (
                                <div className="space-y-3">
                                    {warningSortedUsers.punished.map(u => (
                                        <div key={u.uid} className="bg-slate-950 p-4 rounded-2xl border border-red-900/20 flex flex-wrap justify-between items-center gap-3">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 bg-red-600/10 rounded-full flex items-center justify-center font-black text-red-500 border border-red-500/20 text-sm flex-shrink-0">{u.sn.slice(-2)}</div>
                                                <div>
                                                    <p className="text-base text-white font-heavy">{u.nickname} <span className="text-xs text-slate-500 ml-1">#{u.sn}</span></p>
                                                    <p className="text-xs text-red-400 font-bold mt-0.5">경고 {u.warningSum}점 누적</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2 flex-wrap">
                                                <button onClick={()=>{ setUserSalesModal(u); }} className="px-3 py-2 rounded-xl text-xs font-heavy bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 border border-blue-700/30 transition-all flex items-center gap-1"><Icon name="bar-chart-2" size={14}/> 판매현황</button>
                                                <button onClick={()=>setPenaltyDetailUser(u)} className="px-3 py-2 rounded-xl text-xs font-heavy bg-red-600/10 hover:bg-red-600 text-red-400 hover:text-white border border-red-500/20 transition-all flex items-center gap-1"><Icon name="file-warning" size={14}/> 경고내역</button>
                                                <button onClick={()=>setManualPenaltyUser(u)} className="px-3 py-2 rounded-xl text-xs font-heavy bg-orange-600/10 hover:bg-orange-600 text-orange-400 hover:text-white border border-orange-500/20 transition-all flex items-center gap-1"><Icon name="plus" size={14}/> 경고부여</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                )}
                            </section>

                            {/* 클린 사원 리스트 */}
                            <section className="card shadow-2xl border border-green-900/20">
                                <h2 className="text-lg text-green-400 font-heavy mb-4 flex items-center gap-2"><Icon name="shield-check" size={20}/> 전체 사원 현황 <span className="text-sm text-green-600 font-bold">(경고 0점)</span></h2>
                                {warningSortedUsers.clean.length === 0 ? (
                                    <p className="text-slate-600 text-sm font-bold text-center py-6">사원이 없습니다.</p>
                                ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    {warningSortedUsers.clean.map(u => {
                                        const salesCount = records.filter(r => r.sellerUid === u.uid).length;
                                        return (
                                        <div key={u.uid} className="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex justify-between items-center gap-3 hover:border-slate-700 transition-all">
                                            <div className="flex items-center gap-3">
                                                <div className="w-9 h-9 bg-green-600/10 rounded-full flex items-center justify-center font-black text-green-500 border border-green-500/10 text-xs flex-shrink-0">{u.sn.slice(-2)}</div>
                                                <div>
                                                    <p className="text-sm text-white font-heavy">{u.nickname}</p>
                                                    <p className="text-[10px] text-slate-500 font-bold">#{u.sn} · {salesCount}건 판매</p>
                                                </div>
                                            </div>
                                            <div className="flex gap-2 flex-shrink-0">
                                                <button onClick={()=>setUserSalesModal(u)} className="p-2 rounded-xl text-xs font-heavy bg-blue-600/10 hover:bg-blue-600/20 text-blue-400 border border-blue-700/20 transition-all"><Icon name="bar-chart-2" size={14}/></button>
                                                <button onClick={()=>setManualPenaltyUser(u)} className="p-2 rounded-xl text-xs font-heavy bg-orange-600/10 hover:bg-orange-600 text-orange-400 hover:text-white border border-orange-500/20 transition-all"><Icon name="alert-triangle" size={14}/></button>
                                            </div>
                                        </div>
                                        );
                                    })}
                                </div>
                                )}
                            </section>
                        </div>
                    )}

                    {tab === 'team' && (
                        <div className="card shadow-2xl font-heavy">
                            <h2 className="text-xl text-indigo-400 font-heavy mb-6 flex items-center gap-2"><Icon name="shield-check" size={20}/> 감사팀 업무 실적 순위</h2>
                            <div className="space-y-3">
                                {auditorRanking.map((auditor, idx) => (
                                    <div key={idx} className="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex justify-between items-center hover:bg-slate-900 transition-all">
                                        <div className="flex items-center gap-4">
                                            <div className={`w-11 h-11 rounded-xl flex items-center justify-center font-heavy text-lg flex-shrink-0
                                                ${idx === 0 && auditor.count > 0 ? 'bg-yellow-500 text-black shadow-lg shadow-yellow-500/20'
                                                : 'bg-slate-800 text-slate-500'}`}>{idx+1}</div>
                                            <div>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-lg font-heavy text-white">{auditor.name}</span>
                                                    <span className={`text-[10px] px-2 py-0.5 rounded-md font-heavy
                                                        ${auditor.role === ROLES.ADMIN ? 'bg-amber-500/20 text-amber-400'
                                                        : 'bg-indigo-500/20 text-indigo-400'}`}>
                                                        {auditor.role}
                                                    </span>
                                                </div>
                                                <span className="text-[10px] text-slate-600 font-bold">#{auditor.sn}</span>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[10px] text-slate-600 uppercase block tracking-widest font-heavy">처리건수</span>
                                            <span className={`text-2xl font-black ${auditor.count > 0 ? 'text-indigo-400' : 'text-slate-700'}`}>{auditor.count}건</span>
                                        </div>
                                    </div>
                                ))}
                                {auditorRanking.length === 0 && (
                                    <p className="text-center text-slate-600 py-8 font-bold">감사 권한 보유 사원이 없습니다.</p>
                                )}
                            </div>
                        </div>
                    )}

                    {rsnModal && (
                        <Modal title="보류 사유 및 경고 설정" onClose={()=>setRsnModal(null)}>
                            <div className="space-y-6 font-heavy">
                                <div className="space-y-2"><label className="text-sm text-red-400 font-heavy uppercase">보류 사유</label><textarea className="input-base h-32 font-heavy" value={reasonText} onChange={e=>setReasonText(e.target.value)} required /></div>
                                <div className="space-y-2"><label className="text-sm text-red-500 font-heavy uppercase">경고 점수 부여</label><input type="number" className="input-base text-2xl font-heavy text-red-500" value={penaltyInput} onChange={e=>setPenaltyInput(parseInt(e.target.value||0))} /></div>
                                <button onClick={async ()=>{
                                    if(!reasonText.trim()) return alert("사유를 입력해 주세요.");
                                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', rsnModal.id), { status:'pending', auditReason:reasonText, penaltyPoints:penaltyInput, auditedAt:new Date().toISOString(), auditorName:user.nickname });
                                    if (sendNotification) {
                                        const msg = `📋 장부가 보류 처리되었습니다. 사유: ${reasonText}${penaltyInput > 0 ? ` / 경고 ${penaltyInput}점 부여` : ''}`;
                                        await sendNotification(rsnModal.sellerUid, rsnModal.sellerNickname, 'hold', msg, rsnModal.id);
                                    }
                                    setRsnModal(null); setReasonText(""); setPenaltyInput(0); showToast("보류 및 경고 처리되었습니다.");
                                }} className="btn btn-red w-full py-5 text-xl font-heavy shadow-lg">보류 확정</button>
                            </div>
                        </Modal>
                    )}

                    {viewItem && (
                        <Modal title="장부 상세 분석 리포트" onClose={()=>setViewItem(null)}>
                            <div className="space-y-6 font-heavy">
                                <div className="grid grid-cols-3 gap-4 font-heavy">
                                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-inner font-heavy"><p className="text-[10px] text-slate-600 uppercase mb-1">작성 시각</p><p className="text-sm font-heavy">{formatFullDateTime(viewItem.timestamp)}</p></div>
                                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-inner font-heavy"><p className="text-[10px] text-blue-600 uppercase mb-1 font-heavy">감사관</p><p className="text-sm text-blue-400 font-heavy">{viewItem.auditorName || '미지정'}</p></div>
                                    <div className="bg-slate-950 p-4 rounded-2xl border border-slate-800 shadow-inner font-heavy"><p className="text-[10px] text-slate-600 uppercase mb-1">상태</p><p className="text-sm font-heavy">{viewItem.status === 'completed' ? '감사완료' : '진행중'}</p></div>
                                </div>
                                <div className="bg-slate-950 p-6 rounded-2xl border border-slate-800 font-heavy"><p className="text-[10px] text-slate-500 uppercase mb-2">사원 기재 비고</p><p className="text-lg font-heavy leading-relaxed">{viewItem.note || '내용 없음'}</p></div>
                                {viewItem.auditReason && <div className="bg-red-500/10 p-6 rounded-3xl border border-red-500/20 font-heavy"><p className="text-[10px] text-red-500 uppercase mb-2">보류 및 경고 사유</p><p className="text-lg text-red-400 font-heavy leading-relaxed">{viewItem.auditReason}</p></div>}
                                
                                <div className="bg-slate-950 p-8 rounded-3xl border border-indigo-900/30 space-y-6 font-heavy shadow-inner font-heavy">
                                    <h4 className="text-sm text-indigo-500 uppercase font-heavy tracking-widest border-b border-indigo-900/20 pb-3">감사팀 후속 조치 및 메모</h4>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 items-end">
                                        <div className="space-y-2"><label className="text-xs text-slate-500 font-heavy">감사팀 전용 메모</label><textarea className="input-base h-24 text-indigo-100 font-heavy" value={editMemo} onChange={e=>setEditMemo(e.target.value)} /></div>
                                        <div className="space-y-4">
                                            <div className="space-y-2 font-heavy"><label className="text-xs text-red-500 font-heavy uppercase tracking-widest">경고 점수 수정</label><input type="number" className="input-base text-2xl text-red-500 font-heavy" value={editPenalty} onChange={e=>setEditPenalty(parseInt(e.target.value||0))} /></div>
                                            <button onClick={async ()=>{ await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', viewItem.id), { auditMemo: editMemo, penaltyPoints: editPenalty }); showToast("정보가 저장되었습니다."); }} className="btn btn-indigo w-full py-4 text-lg font-heavy shadow-lg">메모/경고 저장</button>
                                        </div>
                                    </div>
                                    <div className="pt-6 flex gap-4 border-t border-indigo-900/20 font-heavy">
                                        <button onClick={async ()=>{ await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', viewItem.id), { status:'completed', auditedAt: new Date().toISOString(), auditMemo:editMemo, penaltyPoints:editPenalty, auditorName:user.nickname }); setViewItem(null); showToast("감사 승인 완료"); }} className="flex-1 bg-green-600 hover:bg-green-500 text-white py-6 rounded-2xl font-heavy text-2xl shadow-xl transition-all">최종 감사 승인</button>
                                        <button onClick={async ()=>{ await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', viewItem.id), { status:'pending', auditorName:user.nickname }); setViewItem(null); showToast("보류 상태로 전환됨"); }} className="flex-1 bg-red-900/40 hover:bg-red-600 text-red-500 hover:text-white py-6 rounded-2xl font-heavy text-xl border border-red-600/30 transition-all">감사 보류로 전환</button>
                                    </div>
                                </div>
                                <div className="border-t border-red-900/30 pt-4">
                                    <button onClick={()=>setDeleteConfirm(viewItem)} className="w-full flex items-center justify-center gap-2 py-4 bg-red-900/10 hover:bg-red-900/30 border border-red-800/40 text-red-500 hover:text-red-300 rounded-2xl font-heavy text-lg transition-all">
                                        <Icon name="trash-2" size={20}/> 장부 기입건 삭제
                                    </button>
                                </div>
                                <button onClick={()=>setViewItem(null)} className="btn bg-slate-800 w-full py-4 text-lg font-heavy mt-2 font-heavy">닫기</button>
                            </div>
                        </Modal>
                    )}

                    {deleteConfirm && (
                        <Modal title="⚠️ 장부 삭제 확인" onClose={()=>setDeleteConfirm(null)}>
                            <div className="space-y-6 font-heavy">
                                <div className="bg-red-950/40 border border-red-700/40 rounded-2xl p-6 space-y-4">
                                    <p className="text-red-400 font-heavy text-lg text-center">정말로 이 장부 기입건을 삭제하시겠습니까?<br/><span className="text-xs text-red-600 font-bold">삭제 후 복구는 불가능합니다.</span></p>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                                            <p className="text-[10px] text-slate-600 uppercase mb-1">날짜</p>
                                            <p className="text-sm text-white font-heavy">{formatFullDateTime(deleteConfirm.timestamp)}</p>
                                        </div>
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                                            <p className="text-[10px] text-slate-600 uppercase mb-1">매출액</p>
                                            <p className="text-sm text-white font-heavy">{formatKRW(deleteConfirm.totalAmount)}</p>
                                        </div>
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                                            <p className="text-[10px] text-blue-600 uppercase mb-1">판매자</p>
                                            <p className="text-sm text-white font-heavy">{deleteConfirm.sellerNickname} <span className="text-slate-500 text-xs">#{deleteConfirm.sellerSn}</span></p>
                                        </div>
                                        <div className="bg-slate-950 p-4 rounded-xl border border-slate-800">
                                            <p className="text-[10px] text-blue-600 uppercase mb-1">구매자</p>
                                            <p className="text-sm text-white font-heavy">{deleteConfirm.buyerNickname} <span className="text-slate-500 text-xs">#{deleteConfirm.buyerSn}</span></p>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={()=>setDeleteConfirm(null)} className="flex-1 py-4 bg-slate-800 hover:bg-slate-700 rounded-2xl font-heavy text-lg transition-all">취소</button>
                                    <button onClick={async ()=>{
                                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', deleteConfirm.id));
                                        setDeleteConfirm(null); setViewItem(null); showToast("장부 기입건이 삭제되었습니다.");
                                    }} className="flex-1 py-4 bg-red-600 hover:bg-red-500 rounded-2xl font-heavy text-lg text-white transition-all flex items-center justify-center gap-2">
                                        <Icon name="trash-2" size={18}/> 삭제 확정
                                    </button>
                                </div>
                            </div>
                        </Modal>
                    )}

                    {penaltyDetailUser && (
                        <Modal title={`${penaltyDetailUser.nickname} 사원 경고 상세 이력`} onClose={()=>setPenaltyDetailUser(null)}>
                            <div className="space-y-4 font-heavy">
                                {records.filter(r => r.sellerUid === penaltyDetailUser.uid && (parseInt(r.penaltyPoints) > 0)).map(r => (
                                    <div key={r.id} className="bg-slate-950 p-6 rounded-[2rem] border border-slate-800 font-heavy shadow-inner">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="space-y-1">
                                                <div className="text-[10px] text-slate-600 uppercase tracking-widest">{formatFullDateTime(r.timestamp)} / 감사관: {r.auditorName || '미지정'}</div>
                                                <div className="text-xl text-white font-heavy">상태: <StatusBadge record={r} /></div>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-3xl text-red-500 font-black">{r.penaltyPoints || 0}점</div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-900/50 p-4 rounded-xl border border-red-900/20 mt-4">
                                            <span className="text-[10px] text-red-500 block mb-1 uppercase font-bold">Warning Reason</span>
                                            <p className="text-red-400 font-heavy leading-relaxed">{r.auditReason || '사유 없음'}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </Modal>
                    )}

                    {/* 판매현황 모달 */}
                    {userSalesModal && (() => {
                        const auditItems = getEffectiveItems(config);
                        const auditItemKeys = Object.keys(auditItems);
                        const userRecords = records.filter(r => r.sellerUid === userSalesModal.uid);
                        const totalAmt = userRecords.reduce((s, r) => s + (r.totalAmount||0), 0);
                        const itemTotals = {};
                        auditItemKeys.forEach(k => { itemTotals[k] = userRecords.reduce((s,r) => s + (parseInt(r[k])||0), 0); });

                        const holdRecords     = userRecords.filter(r => r.status === 'pending'   && r.auditReason);
                        const holdDoneRecords = userRecords.filter(r => r.status === 'completed' && r.auditReason);
                        const shownRecords    = salesTab === 'onhold' ? holdRecords : salesTab === 'holdDone' ? holdDoneRecords : userRecords;

                        return (
                        <Modal title={`${userSalesModal.nickname} 판매현황`} onClose={()=>{ setUserSalesModal(null); setSalesTab('all'); }}>
                            <div className="space-y-5 font-heavy">

                                {/* 요약 카드 */}
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 text-center">
                                        <p className="text-[10px] text-slate-500 uppercase mb-1">총 판매건</p>
                                        <p className="text-3xl font-heavy text-white">{userRecords.length}<span className="text-sm text-slate-500 ml-1">건</span></p>
                                    </div>
                                    <div className="bg-slate-950 border border-slate-800 rounded-2xl p-4 text-center">
                                        <p className="text-[10px] text-slate-500 uppercase mb-1">총 매출</p>
                                        <p className="text-xl font-heavy text-white">{formatKRW(totalAmt)}</p>
                                    </div>
                                    <div className="bg-blue-900/20 border border-blue-700/30 rounded-2xl p-4 text-center">
                                        <p className="text-[10px] text-blue-400 uppercase mb-1">공계 입금</p>
                                        <p className="text-xl font-heavy text-blue-400">{formatKRW(totalAmt * 0.5)}</p>
                                    </div>
                                </div>

                                {/* 품목별 합계 */}
                                <div className="grid grid-cols-3 gap-2">
                                    {auditItemKeys.map(k => (
                                        <div key={k} className={`bg-slate-950 border rounded-xl p-3 ${itemTotals[k]>0 ? 'border-blue-800/40' : 'border-slate-800'}`}>
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-base">{auditItems[k].emoji}</span>
                                                <span className={`text-[11px] font-heavy ${itemTotals[k]>0 ? 'text-blue-400' : 'text-slate-600'}`}>{itemTotals[k]}개</span>
                                            </div>
                                            <p className="text-[10px] text-slate-500 font-bold">{auditItems[k].label}</p>
                                        </div>
                                    ))}
                                </div>

                                {/* 판매 내역 탭 */}
                                <div>
                                    <div className="flex items-center gap-2 bg-slate-900 p-1 rounded-xl border border-slate-800 mb-3">
                                        {[
                                            { key:'all',      label:`전체 (${userRecords.length})`,      color:'bg-blue-600'   },
                                            { key:'onhold',   label:`보류건 (${holdRecords.length})`,    color:'bg-yellow-600' },
                                            { key:'holdDone', label:`보류 후 완료 (${holdDoneRecords.length})`, color:'bg-green-600'  },
                                        ].map(t => (
                                            <button key={t.key} onClick={()=>setSalesTab(t.key)}
                                                className={`flex-1 px-2 py-2 rounded-lg text-[11px] font-heavy transition-all ${salesTab===t.key ? t.color+' text-white' : 'text-slate-500 hover:text-slate-300'}`}>
                                                {t.label}
                                            </button>
                                        ))}
                                    </div>

                                    <div className="max-h-64 overflow-y-auto space-y-2 pr-1">
                                        {shownRecords.length === 0 ? (
                                            <p className="text-center text-slate-600 text-sm py-6 font-bold">해당 내역이 없습니다.</p>
                                        ) : shownRecords.map(r => {
                                            const itemSummary = auditItemKeys.filter(k=>parseInt(r[k])>0).map(k=>`${auditItems[k].emoji}${r[k]}`).join(' ');
                                            return (
                                            <div key={r.id} className="bg-slate-950 border border-slate-800 rounded-xl p-3 space-y-2">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-slate-400 font-mono text-xs">{formatFullDateTime(r.timestamp)}</span>
                                                    <StatusBadge record={r} />
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <div>
                                                        <span className="font-heavy text-sm text-white">{r.buyerNickname}</span>
                                                        <span className="text-slate-500 text-xs ml-1">#{r.buyerSn}</span>
                                                    </div>
                                                    <span className="text-blue-400 font-heavy text-sm">{formatKRW(r.totalAmount)}</span>
                                                </div>
                                                {itemSummary && <p className="text-sm tracking-wide">{itemSummary}</p>}
                                                <div className="flex justify-between items-center pt-1 border-t border-slate-800">
                                                    <span className="text-[10px] text-slate-600">감사관: {r.auditorName || '미지정'}</span>
                                                    <button onClick={()=>{ setUserSalesModal(null); setSalesTab('all'); setViewItem({...r}); setEditMemo(r.auditMemo||''); setEditPenalty(r.penaltyPoints||0); }}
                                                        className="px-3 py-1 rounded-lg text-[11px] font-heavy bg-indigo-600/20 hover:bg-indigo-600 text-indigo-400 hover:text-white border border-indigo-700/30 transition-all flex items-center gap-1">
                                                        <Icon name="zoom-in" size={12}/> 상세보기
                                                    </button>
                                                </div>
                                            </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        </Modal>
                        );
                    })()}

                    {/* 수동 경고 부여 모달 */}
                    {manualPenaltyUser && (
                        <Modal title={`경고 부여 — ${manualPenaltyUser.nickname}`} onClose={()=>{ setManualPenaltyUser(null); setManualPenaltyReason(""); setManualPenaltyPts(1); }}>
                            <div className="space-y-5 font-heavy">
                                <div className="bg-orange-950/30 border border-orange-700/30 rounded-2xl p-4 flex items-center gap-3">
                                    <Icon name="alert-triangle" className="text-orange-400 flex-shrink-0" size={20}/>
                                    <div>
                                        <p className="text-orange-300 font-heavy text-sm">{manualPenaltyUser.nickname} <span className="text-slate-400 font-bold">#{manualPenaltyUser.sn}</span></p>
                                        <p className="text-[11px] text-orange-500 font-bold">현재 누적 경고: {manualPenaltyUser.warningSum || 0}점</p>
                                    </div>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs text-slate-400 uppercase font-heavy">경고 부여 점수</label>
                                    <input type="number" min="1" className="input-base text-2xl font-heavy text-orange-400" value={manualPenaltyPts} onChange={e=>setManualPenaltyPts(parseInt(e.target.value)||1)}/>
                                </div>
                                <div className="space-y-2">
                                    <label className="text-xs text-red-400 uppercase font-heavy">경고 사유 (필수)</label>
                                    <textarea className="input-base h-28 font-bold" value={manualPenaltyReason} onChange={e=>setManualPenaltyReason(e.target.value)} placeholder="경고 부여 사유를 입력하세요..." />
                                </div>
                                <button onClick={async ()=>{
                                    if(!manualPenaltyReason.trim()) return alert("사유를 입력해 주세요.");
                                    const recId = 'manual_' + Date.now();
                                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'records', recId), {
                                        sellerUid: manualPenaltyUser.uid, sellerNickname: manualPenaltyUser.nickname, sellerSn: manualPenaltyUser.sn,
                                        buyerNickname: '수동경고', buyerSn: '----', timestamp: new Date().toISOString(),
                                        totalAmount: 0, status: 'completed', auditReason: manualPenaltyReason,
                                        penaltyPoints: manualPenaltyPts, auditorName: user.nickname, auditedAt: new Date().toISOString(),
                                        isManualPenalty: true, auditMemo: '', isEdited: false
                                    });
                                    if(sendNotification) await sendNotification(manualPenaltyUser.uid, manualPenaltyUser.nickname, 'hold', `⚠️ 경고 ${manualPenaltyPts}점이 수동 부여되었습니다. 사유: ${manualPenaltyReason}`, recId);
                                    setManualPenaltyUser(null); setManualPenaltyReason(""); setManualPenaltyPts(1);
                                    showToast(`${manualPenaltyUser.nickname}에게 경고 ${manualPenaltyPts}점 부여 완료`);
                                }} className="btn w-full py-4 text-lg font-heavy" style={{background:'#ea580c',color:'#fff'}}>
                                    <Icon name="alert-triangle" size={18}/> 경고 부여 확정
                                </button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        }
        // --- My Page View ---
        function MyPageView({ user, setUser, showToast }) {
            const [nickname, setNickname] = useState(user.nickname || "");
            const [currentPw, setCurrentPw] = useState("");
            const [newPw, setNewPw]         = useState("");
            const [confirmPw, setConfirmPw] = useState("");
            const [saving, setSaving]       = useState(false);

            const saveNickname = async () => {
                if (!nickname.trim()) return alert("닉네임을 입력해 주세요.");
                if (nickname.trim() === user.nickname) return showToast("변경사항이 없습니다.");
                setSaving(true);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { nickname: nickname.trim() });
                const updated = { ...user, nickname: nickname.trim() };
                setUser(updated);
                localStorage.setItem('seolguk_user_session', JSON.stringify(updated));
                setSaving(false);
                showToast("닉네임이 변경되었습니다.");
            };

            const savePassword = async () => {
                if (!currentPw) return alert("현재 비밀번호를 입력해 주세요.");
                if (currentPw !== user.password) return alert("현재 비밀번호가 일치하지 않습니다.");
                if (!newPw) return alert("새 비밀번호를 입력해 주세요.");
                if (newPw.length > 4) return alert("비밀번호는 4자리 숫자입니다.");
                if (newPw !== confirmPw) return alert("새 비밀번호와 확인이 일치하지 않습니다.");
                setSaving(true);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), { password: newPw });
                const updated = { ...user, password: newPw };
                setUser(updated);
                localStorage.setItem('seolguk_user_session', JSON.stringify(updated));
                setCurrentPw(""); setNewPw(""); setConfirmPw("");
                setSaving(false);
                showToast("비밀번호가 변경되었습니다.");
            };

            return (
                <div className="space-y-6 max-w-lg">
                    <div className="flex items-center gap-3 mb-2">
                        <div className="bg-blue-600/15 p-3 rounded-2xl"><Icon name="user-cog" className="text-blue-400" size={28}/></div>
                        <div>
                            <h1 className="text-2xl font-heavy">내 설정</h1>
                            <p className="text-sm text-slate-500 font-bold">{user.role} · #{user.sn}</p>
                        </div>
                    </div>

                    {/* 닉네임 변경 */}
                    <div className="card shadow-xl space-y-4">
                        <h2 className="text-lg font-heavy flex items-center gap-2"><Icon name="pencil" className="text-blue-400" size={18}/> 닉네임 변경</h2>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">현재 닉네임</label>
                            <div className="bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-400 font-bold text-sm">{user.nickname}</div>
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">새 닉네임</label>
                            <input
                                className="input-base font-bold"
                                value={nickname}
                                onChange={e => setNickname(e.target.value)}
                                placeholder="변경할 닉네임 입력"
                                maxLength={20}
                            />
                        </div>
                        <button onClick={saveNickname} disabled={saving} className="btn btn-blue w-full py-3 font-heavy">
                            <Icon name="check" size={16}/> 닉네임 저장
                        </button>
                    </div>

                    {/* 비밀번호 변경 */}
                    <div className="card shadow-xl space-y-4">
                        <h2 className="text-lg font-heavy flex items-center gap-2"><Icon name="lock" className="text-indigo-400" size={18}/> 비밀번호 변경</h2>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">현재 비밀번호</label>
                            <input
                                type="password"
                                maxLength={4}
                                className="input-base font-heavy text-center text-2xl tracking-[0.5em]"
                                value={currentPw}
                                onChange={e => setCurrentPw(e.target.value)}
                                placeholder="••••"
                            />
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">새 비밀번호 (숫자 4자리)</label>
                            <input
                                type="password"
                                maxLength={4}
                                className="input-base font-heavy text-center text-2xl tracking-[0.5em]"
                                value={newPw}
                                onChange={e => setNewPw(e.target.value)}
                                placeholder="••••"
                            />
                        </div>
                        <div className="space-y-2">
                            <label className="text-xs text-slate-400 uppercase font-heavy">새 비밀번호 확인</label>
                            <input
                                type="password"
                                maxLength={4}
                                className={`input-base font-heavy text-center text-2xl tracking-[0.5em] ${confirmPw && newPw !== confirmPw ? 'border-red-500 ring-2 ring-red-500/20' : confirmPw && newPw === confirmPw ? 'border-green-500 ring-2 ring-green-500/20' : ''}`}
                                value={confirmPw}
                                onChange={e => setConfirmPw(e.target.value)}
                                placeholder="••••"
                            />
                            {confirmPw && newPw !== confirmPw && <p className="text-xs text-red-400 font-bold pl-1">비밀번호가 일치하지 않습니다.</p>}
                            {confirmPw && newPw === confirmPw && <p className="text-xs text-green-400 font-bold pl-1">비밀번호가 일치합니다.</p>}
                        </div>
                        <button onClick={savePassword} disabled={saving || (confirmPw && newPw !== confirmPw)} className="btn btn-indigo w-full py-3 font-heavy disabled:opacity-50">
                            <Icon name="lock" size={16}/> 비밀번호 변경
                        </button>
                    </div>
                </div>
            );
        }

        function RankingView({ records, allUsers, config }) {
            const [weekOffset, setWeekOffset] = useState(0);

            // 주간 범위 계산 (config.weekStartDay 기준)
            const weekRange = useMemo(() => {
                const now = new Date();
                now.setDate(now.getDate() + (weekOffset * 7));
                const day = now.getDay();
                const startDay = config?.weekStartDay ?? 1;
                const diff = (day < startDay) ? (day + 7 - startDay) : (day - startDay);
                const start = new Date(now);
                start.setDate(now.getDate() - diff); start.setHours(0,0,0,0);
                const end = new Date(start);
                end.setDate(start.getDate() + 6); end.setHours(23,59,59,999);
                return { start, end };
            }, [weekOffset, config]);

            const isCurrentWeek = weekOffset === 0;
            const weekLabel = isCurrentWeek ? '이번 주' : weekOffset === -1 ? '지난 주' : `${Math.abs(weekOffset)}주 전`;

            // 집계: 이벤트용·가입신청 제외, 나머지 모든 권한(사원·감사팀·관리자) 포함
            const data = useMemo(() => {
                const excludeUids = new Set(
                    allUsers.filter(u => u.role === ROLES.EVENT || u.role === ROLES.PENDING).map(u => u.uid)
                );
                const s = {};
                records
                    .filter(r => {
                        if (excludeUids.has(r.sellerUid)) return false;
                        if (r.status === 'pending' && r.auditReason) return false; // 보류건 제외
                        const d = new Date(r.timestamp);
                        return d >= weekRange.start && d <= weekRange.end;
                    })
                    .forEach(r => {
                        const key = r.sellerUid;
                        if (!s[key]) s[key] = { name: r.sellerNickname, sn: r.sellerSn, count: 0, total: 0, deposit: 0 };
                        s[key].count++;
                        s[key].total += r.totalAmount || 0;
                        s[key].deposit += (r.totalAmount || 0) * 0.5;
                    });
                return Object.values(s).sort((a, b) => b.count - a.count);
            }, [records, allUsers, weekRange]);

            const podium = [data[1], data[0], data[2]]; // 2위, 1위, 3위 순서로 시상대

            return (
                <div className="space-y-8 font-bold">
                    {/* 헤더 */}
                    <div className="text-center space-y-3 py-4">
                        <div className="inline-block bg-yellow-500/10 p-4 rounded-2xl mb-2 animate-pulse font-heavy">
                            <Icon name="award" size={48} className="text-yellow-500"/>
                        </div>
                        <h2 className="text-3xl text-white font-heavy uppercase tracking-tighter italic">설국 판매 명예의 전당</h2>
                        {/* 주간 네비게이션 */}
                        <div className="flex items-center justify-center gap-4 mt-2">
                            <button onClick={()=>setWeekOffset(w=>w-1)} className="p-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white transition-all">
                                <Icon name="chevron-left" size={20}/>
                            </button>
                            <div className="flex items-center gap-2 bg-slate-900 border border-slate-800 rounded-2xl px-6 py-2.5 min-w-[240px] justify-center">
                                <span className={`text-sm font-heavy ${isCurrentWeek ? 'text-blue-400' : 'text-slate-400'}`}>{weekLabel}</span>
                                <span className="text-slate-600 text-xs font-bold">
                                    {weekRange.start.toLocaleDateString('ko-KR', {month:'short', day:'numeric'})} ~ {weekRange.end.toLocaleDateString('ko-KR', {month:'short', day:'numeric'})}
                                </span>
                            </div>
                            <button onClick={()=>setWeekOffset(w=>Math.min(w+1, 0))} disabled={isCurrentWeek}
                                className={`p-2 rounded-xl transition-all ${isCurrentWeek ? 'opacity-30 cursor-not-allowed bg-slate-800 text-slate-600' : 'bg-slate-800 hover:bg-slate-700 text-slate-400 hover:text-white'}`}>
                                <Icon name="chevron-right" size={20}/>
                            </button>
                        </div>
                    </div>

                    {data.length === 0 ? (
                        <div className="card text-center py-16 text-slate-500 font-bold">
                            <Icon name="inbox" size={40} className="mx-auto mb-3 opacity-30"/>
                            <p>{weekLabel} 판매 기록이 없습니다.</p>
                        </div>
                    ) : (
                    <>
                        {/* 시상대 (1~3위) */}
                        <div className="flex flex-wrap justify-center items-end gap-4 md:gap-8 pb-6 font-heavy">
                            {podium.map((item, i) => {
                                if (!item) return <div key={i} className="w-full max-w-[180px]"/>;
                                const cfgs = [
                                    { color:'border-slate-400',  bg:'bg-slate-400/5',  h:'h-44', rank:'2위', icon:'🥈', textColor:'text-slate-400'  },
                                    { color:'border-yellow-500', bg:'bg-yellow-500/8', h:'h-56', rank:'1위', icon:'👑', textColor:'text-yellow-500' },
                                    { color:'border-amber-700',  bg:'bg-amber-700/5',  h:'h-40', rank:'3위', icon:'🥉', textColor:'text-amber-700'  },
                                ];
                                const cfg = cfgs[i];
                                const realIdx = i === 0 ? 1 : i === 1 ? 0 : 2;
                                return (
                                    <div key={i} className={`w-full max-w-[180px] ${cfg.h} ${cfg.bg} border-t-4 ${cfg.color} rounded-t-3xl flex flex-col items-center justify-center relative shadow-xl transition-all hover:-translate-y-1`}>
                                        <div className="absolute -top-6 text-4xl">{cfg.icon}</div>
                                        <span className={`text-2xl mb-1 italic font-black ${cfg.textColor}`}>{cfg.rank}</span>
                                        <span className="text-base text-white font-heavy truncate w-full text-center px-2">{item.name}</span>
                                        <span className="text-[10px] opacity-40 font-mono">#{item.sn}</span>
                                        <span className="text-xs text-blue-400 font-heavy mt-1">{item.count}건</span>
                                    </div>
                                );
                            })}
                        </div>

                        {/* 전체 순위 테이블 */}
                        <div className="card p-0 overflow-hidden shadow-2xl">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left font-heavy">
                                    <thead className="bg-slate-800/50 text-slate-500 text-[10px] uppercase tracking-widest">
                                        <tr className="border-b border-slate-800">
                                            <th className="px-5 py-4 whitespace-nowrap">순위</th>
                                            <th className="px-5 py-4 whitespace-nowrap">사원명</th>
                                            <th className="px-5 py-4 text-center whitespace-nowrap">판매 건수</th>
                                            <th className="px-5 py-4 text-right whitespace-nowrap">총 매출액</th>
                                            <th className="px-5 py-4 text-right text-blue-400 whitespace-nowrap">공계 입금액</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-800/50 text-white font-heavy">
                                        {data.map((item, idx) => (
                                            <tr key={idx} className={`${idx < 3 ? 'bg-blue-600/[0.02]' : ''} hover:bg-slate-800/50 transition-colors`}>
                                                <td className="px-5 py-4">
                                                    <span className={`w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black
                                                        ${idx === 0 ? 'bg-yellow-500 text-black shadow-lg shadow-yellow-500/20'
                                                        : idx === 1 ? 'bg-slate-400 text-black'
                                                        : idx === 2 ? 'bg-amber-700 text-white'
                                                        : 'bg-slate-800 text-slate-500'}`}>
                                                        {idx+1}
                                                    </span>
                                                </td>
                                                <td className="px-5 py-4 whitespace-nowrap">
                                                    <div className="text-base font-heavy">{item.name}</div>
                                                    <div className="text-[10px] text-slate-600 font-bold">#{item.sn}</div>
                                                </td>
                                                <td className="px-5 py-4 text-center whitespace-nowrap">
                                                    <span className="text-blue-400 font-black text-2xl">{item.count}</span>
                                                    <span className="text-[10px] text-slate-600 ml-1 uppercase font-bold">건</span>
                                                </td>
                                                <td className="px-5 py-4 text-right font-heavy text-base whitespace-nowrap">{formatKRW(item.total)}</td>
                                                <td className="px-5 py-4 text-right text-blue-400 font-heavy text-base whitespace-nowrap">{formatKRW(item.deposit)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </>
                    )}
                </div>
            );
        }


        // --- Admin/Audit Member Management View ---
        function AdminView({ allUsers, config, setConfig, currentUser, records, showToast }) {
            const [showPw, setShowPw] = useState({});
            const isAdmin = currentUser.role === ROLES.ADMIN;
            const [noticeText, setNoticeText] = useState(config.eventNotice || "");

            useEffect(() => { setNoticeText(config.eventNotice || ""); }, [config.eventNotice]);

            const saveNotice = async () => {
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, { eventNotice: noticeText });
                showToast("공지사항이 반영되었습니다.");
            };

            const [itemDraft, setItemDraft] = useState(null); // 편집 중인 품목 초안
            const [itemSaving, setItemSaving] = useState(false);

            // 편집 초안 초기화 (config.items 변경 시 동기화)
            useEffect(() => {
                setItemDraft(JSON.parse(JSON.stringify(getEffectiveItems(config))));
            }, [config.items]);

            const saveItems = async () => {
                if (!itemDraft) return;
                setItemSaving(true);
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, { items: itemDraft });
                setItemSaving(false);
                showToast("품목 설정이 저장되었습니다.");
            };

            const resetItemsToDefault = async () => {
                if (!window.confirm("품목 설정을 기본값으로 초기화하시겠습니까?")) return;
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, { items: DEFAULT_ITEMS });
                showToast("품목 설정이 기본값으로 초기화되었습니다.");
            };

            const saveWeekStartDay = async (day) => {
                const configDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                await updateDoc(configDoc, { weekStartDay: day });
                showToast("정산 기준 요일이 변경되었습니다.");
            };

            const updateItemField = (key, field, value) => {
                setItemDraft(prev => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
            };

            const updateUser = async (uid, data) => {
                if(!isAdmin) return alert("관리자만 수정할 수 있습니다.");
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', uid), data);
            };

            const getRoleStyles = (role) => {
                switch(role) {
                    case ROLES.ADMIN:    return "bg-amber-500 text-black";
                    case ROLES.AUDIT:    return "bg-indigo-600 text-white";
                    case ROLES.EVENT:    return "bg-purple-600 text-white";
                    case ROLES.PENDING:  return "bg-yellow-600 text-white";
                    default:             return "bg-slate-700 text-slate-200";
                }
            };



            return (
                <div className="space-y-10 animate-fade-in font-bold">

                    {/* 메인 공지사항 관리 */}
                    <section className="card shadow-2xl space-y-4">
                        <h2 className="text-xl text-white flex items-center gap-3 font-heavy"><Icon name="megaphone" className="text-blue-400"/> 메인 공지사항 관리</h2>
                        <textarea
                            className="input-base h-28 font-bold resize-none"
                            value={noticeText}
                            onChange={e=>setNoticeText(e.target.value)}
                            placeholder="대시보드 상단에 표시할 공지사항을 입력하세요..."
                        />
                        <div className="flex justify-end">
                            <button onClick={saveNotice} className="btn btn-blue px-8 py-3 font-heavy shadow-lg">반영하기</button>
                        </div>
                    </section>

                    {/* 주간 정산 기준 요일 설정 */}
                    <section className="card shadow-2xl space-y-4">
                        <h2 className="text-xl text-white flex items-center gap-3 font-heavy"><Icon name="calendar" className="text-indigo-400"/> 주간 정산 기준 요일 설정</h2>
                        <div className="flex flex-wrap gap-3">
                            {WEEK_DAYS.map((label, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => saveWeekStartDay(idx)}
                                    className={`px-5 py-3 rounded-2xl font-heavy text-sm transition-all ${config.weekStartDay === idx ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/30' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 border border-slate-700'}`}
                                >
                                    매주 {label}
                                </button>
                            ))}
                        </div>
                    </section>

                    {/* 품목 설정 */}
                    <section className="card shadow-2xl space-y-5">
                        <div className="flex items-center justify-between">
                            <h2 className="text-xl flex items-center gap-3 font-heavy"><Icon name="package" className="text-green-400"/> 품목 설정</h2>
                            <button onClick={resetItemsToDefault} className="text-xs text-slate-500 hover:text-slate-300 underline underline-offset-2 font-bold transition-all">기본값 초기화</button>
                        </div>
                        <p className="text-xs text-slate-500 font-bold">품목명, 일일 최대 수량, 가격을 수정합니다. 저장 전에는 적용되지 않습니다.</p>

                        {itemDraft && (
                        <div className="space-y-3">
                            {/* 헤더 */}
                            <div className="grid grid-cols-12 gap-2 px-1">
                                <div className="col-span-1 text-[10px] text-slate-600 uppercase font-heavy text-center">아이콘</div>
                                <div className="col-span-4 text-[10px] text-slate-600 uppercase font-heavy">품목명</div>
                                <div className="col-span-3 text-[10px] text-slate-600 uppercase font-heavy">일일 최대 수량</div>
                                <div className="col-span-4 text-[10px] text-slate-600 uppercase font-heavy">단가 (원)</div>
                            </div>

                            {Object.keys(itemDraft).map(k => (
                                <div key={k} className="grid grid-cols-12 gap-2 items-center bg-slate-950 border border-slate-800 rounded-2xl p-3 hover:border-slate-700 transition-all">
                                    {/* 이모지 */}
                                    <div className="col-span-1 text-center">
                                        <input
                                            type="text"
                                            value={itemDraft[k].emoji}
                                            onChange={e => updateItemField(k, 'emoji', e.target.value)}
                                            className="w-10 h-10 text-center text-xl bg-slate-800 border border-slate-700 rounded-xl focus:outline-none focus:border-blue-500"
                                            maxLength={2}
                                        />
                                    </div>
                                    {/* 품목명 */}
                                    <div className="col-span-4">
                                        <input
                                            type="text"
                                            value={itemDraft[k].label}
                                            onChange={e => updateItemField(k, 'label', e.target.value)}
                                            className="input-base py-2 text-sm font-heavy"
                                            placeholder="품목명"
                                        />
                                    </div>
                                    {/* 최대 수량 */}
                                    <div className="col-span-3">
                                        <input
                                            type="number"
                                            value={itemDraft[k].max}
                                            onChange={e => updateItemField(k, 'max', parseInt(e.target.value)||1)}
                                            className="input-base py-2 text-sm font-heavy text-center"
                                            min="1"
                                        />
                                    </div>
                                    {/* 단가 */}
                                    <div className="col-span-4">
                                        <div className="relative">
                                            <input
                                                type="number"
                                                value={itemDraft[k].price}
                                                onChange={e => updateItemField(k, 'price', parseInt(e.target.value)||0)}
                                                className="input-base py-2 text-sm font-heavy pr-8"
                                                min="0"
                                            />
                                            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-slate-500 pointer-events-none">₩</span>
                                        </div>
                                        <p className="text-[9px] text-blue-400 mt-1 pl-1 font-bold">{formatKRW(itemDraft[k].price)}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                        )}

                        <div className="flex justify-end pt-2">
                            <button
                                onClick={saveItems}
                                disabled={itemSaving}
